<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clinical Colors — dental-pms.v1</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  body { font-family: var(--font-display); background: var(--color-bg-canvas); color: var(--color-text-primary); padding: var(--space-8); }
  h1 { font-size: var(--text-2xl); margin-bottom: var(--space-6); }
  .ramp { display: flex; gap: var(--space-2); flex-wrap: wrap; }
  .swatch { width: 80px; text-align: center; }
  .swatch-box { height: 60px; border-radius: var(--radius-md); border: 1px solid var(--color-border-subtle); }
  .swatch-label { font-size: var(--text-xs); color: var(--color-text-secondary); margin-top: var(--space-1); }
</style>
</head>
<body>
<h1>Clinical Color Ramp</h1>
<div class="ramp">
  <div class="swatch"><div class="swatch-box" style="background:var(--ds-clinical-50)"></div><div class="swatch-label">50<br>#FAFBFC</div></div>
  <div class="swatch"><div class="swatch-box" style="background:var(--ds-clinical-100)"></div><div class="swatch-label">100<br>#F3F5F7</div></div>
  <div class="swatch"><div class="swatch-box" style="background:var(--ds-clinical-200)"></div><div class="swatch-label">200<br>#E8ECEF</div></div>
  <div class="swatch"><div class="swatch-box" style="background:var(--ds-clinical-300)"></div><div class="swatch-label">300<br>#D4DAE0</div></div>
  <div class="swatch"><div class="swatch-box" style="background:var(--ds-clinical-400)"></div><div class="swatch-label">400<br>#B8C2CC</div></div>
  <div class="swatch"><div class="swatch-box" style="background:var(--ds-clinical-500)"></div><div class="swatch-label">500<br>#8E9BAA</div></div>
  <div class="swatch"><div class="swatch-box" style="background:var(--ds-clinical-600)"></div><div class="swatch-label">600<br>#6B7A8D</div></div>
  <div class="swatch"><div class="swatch-box" style="background:var(--ds-clinical-700)"></div><div class="swatch-label">700<br>#4E5D6E</div></div>
  <div class="swatch"><div class="swatch-box" style="background:var(--ds-clinical-800)"></div><div class="swatch-label">800<br>#334050</div></div>
  <div class="swatch"><div class="swatch-box" style="background:var(--ds-clinical-900)"></div><div class="swatch-label">900<br>#0F1722</div></div>
</div>
</body>
</html>
