<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mono Type — dental-pms.v1</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  body { font-family: var(--font-display); background: var(--color-bg-canvas); color: var(--color-text-primary); padding: var(--space-8); }
  .label { font-size: var(--text-xs); color: var(--color-text-secondary); margin-bottom: var(--space-1); }
  .row { margin-bottom: var(--space-6); }
  .mono { font-family: var(--font-mono); background: var(--color-bg-clinical); padding: var(--space-3) var(--space-4); border-radius: var(--radius-md); border: 1px solid var(--color-border-subtle); }
</style>
</head>
<body>
<div class="row"><div class="label">Procedure codes — --font-mono / --text-sm</div>
  <div class="mono" style="font-size:var(--text-sm)">01202  Recall exam — comprehensive<br>11101  Scaling — per tooth<br>21310  Composite resin — 1 surface</div></div>
<div class="row"><div class="label">Invoice number — --font-mono / --text-base</div>
  <div class="mono" style="font-size:var(--text-base)">INV-2026-004821</div></div>
<div class="row"><div class="label">Patient ID — --font-mono / --text-xs</div>
  <div class="mono" style="font-size:var(--text-xs);color:var(--color-text-secondary)">PT-00012847</div></div>
</body>
</html>
