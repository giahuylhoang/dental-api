<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Outline Button — dental-pms.v1</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  body { font-family: var(--font-display); background: var(--color-bg-canvas); color: var(--color-text-primary); padding: var(--space-8); }
  h1 { font-size: var(--text-2xl); margin-bottom: var(--space-6); }
  .btn-outline {
    display: inline-flex; align-items: center; gap: var(--space-2);
    background: transparent; color: var(--color-action);
    padding: var(--space-2) var(--space-5);
    border-radius: var(--radius-md); border: 1.5px solid var(--color-action); cursor: pointer;
    font-family: var(--font-display); font-size: var(--text-sm); font-weight: 500;
    transition: background var(--duration-base) var(--ease-out);
  }
  .btn-outline:hover { background: var(--ds-action-50); }
  .btn-outline-danger {
    display: inline-flex; align-items: center; gap: var(--space-2);
    background: transparent; color: var(--color-danger);
    padding: var(--space-2) var(--space-5);
    border-radius: var(--radius-md); border: 1.5px solid var(--color-danger); cursor: pointer;
    font-family: var(--font-display); font-size: var(--text-sm); font-weight: 500;
    transition: background var(--duration-base) var(--ease-out);
  }
  .btn-outline-danger:hover { background: var(--ds-danger-50); }
  .row { display: flex; gap: var(--space-4); align-items: center; flex-wrap: wrap; margin-bottom: var(--space-6); }
  .label { font-size: var(--text-xs); color: var(--color-text-secondary); font-family: var(--font-mono); }
</style>
</head>
<body>
<h1>Outline Button</h1>
<div class="row">
  <button class="btn-outline">Add note</button>
  <button class="btn-outline">Reschedule</button>
  <button class="btn-outline-danger">Cancel appointment</button>
</div>
<div class="label">border: --color-action | color: --color-action | danger variant: --color-danger</div>
</body>
</html>
