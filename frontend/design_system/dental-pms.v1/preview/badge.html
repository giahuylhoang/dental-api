<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Badge — dental-pms.v1</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  body { font-family: var(--font-display); background: var(--color-bg-canvas); color: var(--color-text-primary); padding: var(--space-8); }
  h1 { font-size: var(--text-2xl); margin-bottom: var(--space-6); }
  .row { display: flex; gap: var(--space-3); flex-wrap: wrap; align-items: center; margin-bottom: var(--space-6); }
  .badge {
    display: inline-flex; align-items: center;
    padding: 2px var(--space-2);
    border-radius: var(--radius-sm);
    font-size: var(--text-xs); font-weight: 500; line-height: var(--leading-normal);
  }
  .badge-success { background: var(--ds-accent-100); color: var(--ds-accent-700); }
  .badge-warning { background: var(--ds-warn-100); color: var(--ds-warn-700); }
  .badge-danger  { background: var(--ds-danger-100); color: var(--ds-danger-700); }
  .badge-neutral { background: var(--ds-clinical-200); color: var(--ds-clinical-700); }
  .badge-action  { background: var(--ds-action-100); color: var(--ds-action-700); }
</style>
</head>
<body>
<h1>Badge</h1>
<div class="row">
  <span class="badge badge-success">Confirmed</span>
  <span class="badge badge-success">Paid</span>
  <span class="badge badge-warning">Pending</span>
  <span class="badge badge-warning">Overdue</span>
  <span class="badge badge-danger">Cancelled</span>
  <span class="badge badge-danger">Urgent</span>
  <span class="badge badge-neutral">Draft</span>
  <span class="badge badge-action">In progress</span>
</div>
</body>
</html>
