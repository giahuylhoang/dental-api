<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shadows — dental-pms.v1</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  body { font-family: var(--font-display); background: var(--ds-clinical-200); color: var(--color-text-primary); padding: var(--space-8); }
  h1 { font-size: var(--text-2xl); margin-bottom: var(--space-8); }
  .grid { display: flex; flex-wrap: wrap; gap: var(--space-8); }
  .card { background: white; border-radius: var(--radius-lg); padding: var(--space-6); width: 140px; text-align: center; }
  .label { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-text-secondary); margin-top: var(--space-3); }
</style>
</head>
<body>
<h1>Shadows</h1>
<div class="grid">
  <div class="card" style="box-shadow:var(--shadow-xs)"><div class="label">--shadow-xs</div></div>
  <div class="card" style="box-shadow:var(--shadow-sm)"><div class="label">--shadow-sm</div></div>
  <div class="card" style="box-shadow:var(--shadow-md)"><div class="label">--shadow-md</div></div>
  <div class="card" style="box-shadow:var(--shadow-lg)"><div class="label">--shadow-lg</div></div>
  <div class="card" style="box-shadow:var(--shadow-xl)"><div class="label">--shadow-xl</div></div>
  <div class="card" style="box-shadow:var(--shadow-2xl)"><div class="label">--shadow-2xl</div></div>
  <div class="card" style="box-shadow:var(--shadow-inset)"><div class="label">--shadow-inset</div></div>
</div>
</body>
</html>
