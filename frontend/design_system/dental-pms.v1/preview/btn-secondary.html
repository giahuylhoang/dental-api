<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secondary Button — dental-pms.v1</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  body { font-family: var(--font-display); background: var(--color-bg-canvas); color: var(--color-text-primary); padding: var(--space-8); }
  h1 { font-size: var(--text-2xl); margin-bottom: var(--space-6); }
  .btn-secondary {
    display: inline-flex; align-items: center; gap: var(--space-2);
    background: var(--color-bg-clinical); color: var(--color-text-primary);
    padding: var(--space-2) var(--space-5);
    border-radius: var(--radius-md); border: 1px solid var(--color-border-default); cursor: pointer;
    font-family: var(--font-display); font-size: var(--text-sm); font-weight: 500;
    transition: background var(--duration-base) var(--ease-out);
  }
  .btn-secondary:hover { background: var(--ds-clinical-200); }
  .row { display: flex; gap: var(--space-4); align-items: center; flex-wrap: wrap; margin-bottom: var(--space-6); }
  .label { font-size: var(--text-xs); color: var(--color-text-secondary); font-family: var(--font-mono); }
</style>
</head>
<body>
<h1>Secondary Button</h1>
<div class="row">
  <button class="btn-secondary">Cancel</button>
  <button class="btn-secondary">Export</button>
  <button class="btn-secondary">View history</button>
</div>
<div class="label">background: --color-bg-clinical | border: --color-border-default | radius: --radius-md</div>
</body>
</html>
