<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Display Type — dental-pms.v1</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  body { font-family: var(--font-display); background: var(--color-bg-canvas); color: var(--color-text-primary); padding: var(--space-8); }
  .label { font-size: var(--text-xs); color: var(--color-text-secondary); margin-bottom: var(--space-1); }
  .row { margin-bottom: var(--space-6); border-bottom: 1px solid var(--color-border-subtle); padding-bottom: var(--space-4); }
</style>
</head>
<body>
<div class="row"><div class="label">--text-6xl / --leading-display / --tracking-tight</div>
  <div style="font-size:var(--text-6xl);line-height:var(--leading-display);letter-spacing:var(--tracking-tight);font-weight:700">Patient Dashboard</div></div>
<div class="row"><div class="label">--text-5xl / --leading-display</div>
  <div style="font-size:var(--text-5xl);line-height:var(--leading-display);font-weight:700">Today's Schedule</div></div>
<div class="row"><div class="label">--text-4xl / --leading-tight</div>
  <div style="font-size:var(--text-4xl);line-height:var(--leading-tight);font-weight:600">Billing Summary</div></div>
<div class="row"><div class="label">--text-3xl / --leading-snug</div>
  <div style="font-size:var(--text-3xl);line-height:var(--leading-snug);font-weight:600">Treatment Plan</div></div>
<div class="row"><div class="label">--text-2xl / --leading-snug</div>
  <div style="font-size:var(--text-2xl);line-height:var(--leading-snug);font-weight:600">Patient Record</div></div>
<div class="row"><div class="label">--text-xl / --leading-normal</div>
  <div style="font-size:var(--text-xl);line-height:var(--leading-normal);font-weight:500">Section Heading</div></div>
</body>
</html>
