<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Primary Button — dental-pms.v1</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  body { font-family: var(--font-display); background: var(--color-bg-canvas); color: var(--color-text-primary); padding: var(--space-8); }
  h1 { font-size: var(--text-2xl); margin-bottom: var(--space-6); }
  .btn-primary {
    display: inline-flex; align-items: center; gap: var(--space-2);
    background: var(--color-action); color: white;
    padding: var(--space-2) var(--space-5);
    border-radius: var(--radius-md); border: none; cursor: pointer;
    font-family: var(--font-display); font-size: var(--text-sm); font-weight: 500;
    box-shadow: var(--shadow-sm);
    transition: background var(--duration-base) var(--ease-out);
  }
  .btn-primary:hover { background: var(--color-action-hover); }
  .row { display: flex; gap: var(--space-4); align-items: center; flex-wrap: wrap; margin-bottom: var(--space-6); }
  .label { font-size: var(--text-xs); color: var(--color-text-secondary); font-family: var(--font-mono); }
</style>
</head>
<body>
<h1>Primary Button</h1>
<div class="row">
  <button class="btn-primary">Save changes</button>
  <button class="btn-primary">Book appointment</button>
  <button class="btn-primary">Send reminder</button>
</div>
<div class="label">background: --color-action | hover: --color-action-hover | radius: --radius-md | shadow: --shadow-sm</div>
</body>
</html>
