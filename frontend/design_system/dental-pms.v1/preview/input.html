<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Input — dental-pms.v1</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  body { font-family: var(--font-display); background: var(--color-bg-canvas); color: var(--color-text-primary); padding: var(--space-8); max-width: 480px; }
  h1 { font-size: var(--text-2xl); margin-bottom: var(--space-6); }
  .field { margin-bottom: var(--space-5); }
  label { display: block; font-size: var(--text-sm); font-weight: 500; margin-bottom: var(--space-1); }
  input, select {
    width: 100%; box-sizing: border-box;
    padding: var(--space-2) var(--space-3);
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-md);
    font-family: var(--font-display); font-size: var(--text-sm);
    color: var(--color-text-primary); background: white;
    transition: border-color var(--duration-base) var(--ease-out), box-shadow var(--duration-base) var(--ease-out);
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--color-action);
    box-shadow: 0 0 0 3px var(--ds-action-100);
  }
  .helper { font-size: var(--text-xs); color: var(--color-text-secondary); margin-top: var(--space-1); }
  .error-input { border-color: var(--color-danger); }
  .error-msg { font-size: var(--text-xs); color: var(--color-danger); margin-top: var(--space-1); }
</style>
</head>
<body>
<h1>Input</h1>
<div class="field">
  <label for="name">Patient name</label>
  <input id="name" type="text" placeholder="Sarah Mitchell">
  <div class="helper">First and last name</div>
</div>
<div class="field">
  <label for="dob">Date of birth</label>
  <input id="dob" type="date">
</div>
<div class="field">
  <label for="phone">Phone</label>
  <input id="phone" type="tel" placeholder="+1 (555) 000-0000" class="error-input">
  <div class="error-msg">Please enter a valid phone number</div>
</div>
<div class="field">
  <label for="doctor">Assigned doctor</label>
  <select id="doctor">
    <option>Dr. Chen</option>
    <option>Dr. Patel</option>
    <option>Dr. Williams</option>
  </select>
</div>
</body>
</html>
