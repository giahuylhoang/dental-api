<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radii — dental-pms.v1</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  body { font-family: var(--font-display); background: var(--color-bg-canvas); color: var(--color-text-primary); padding: var(--space-8); }
  h1 { font-size: var(--text-2xl); margin-bottom: var(--space-6); }
  .row { display: flex; align-items: center; gap: var(--space-6); margin-bottom: var(--space-6); }
  .box { width: 80px; height: 80px; background: var(--ds-action-100); border: 2px solid var(--color-action); }
  .label { font-family: var(--font-mono); font-size: var(--text-sm); color: var(--color-text-secondary); }
</style>
</head>
<body>
<h1>Border Radii</h1>
<div class="row"><div class="box" style="border-radius:var(--radius-none)"></div><div class="label">--radius-none (0)</div></div>
<div class="row"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="label">--radius-sm (0.25rem / 4px)</div></div>
<div class="row"><div class="box" style="border-radius:var(--radius-md)"></div><div class="label">--radius-md (0.5rem / 8px)</div></div>
<div class="row"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="label">--radius-lg (0.75rem / 12px)</div></div>
<div class="row"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="label">--radius-xl (1rem / 16px)</div></div>
</body>
</html>
