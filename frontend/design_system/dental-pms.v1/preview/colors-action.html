<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Action Colors — dental-pms.v1</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  body { font-family: var(--font-display); background: var(--color-bg-canvas); color: var(--color-text-primary); padding: var(--space-8); }
  h1 { font-size: var(--text-2xl); margin-bottom: var(--space-6); }
  .ramp { display: flex; gap: var(--space-2); flex-wrap: wrap; }
  .swatch { width: 80px; text-align: center; }
  .swatch-box { height: 60px; border-radius: var(--radius-md); }
  .swatch-label { font-size: var(--text-xs); color: var(--color-text-secondary); margin-top: var(--space-1); }
</style>
</head>
<body>
<h1>Action Color Ramp</h1>
<div class="ramp">
  <div class="swatch"><div class="swatch-box" style="background:var(--ds-action-50)"></div><div class="swatch-label">50<br>#EBF3FF</div></div>
  <div class="swatch"><div class="swatch-box" style="background:var(--ds-action-100)"></div><div class="swatch-label">100<br>#CCE2FF</div></div>
  <div class="swatch"><div class="swatch-box" style="background:var(--ds-action-200)"></div><div class="swatch-label">200<br>#99C5FF</div></div>
  <div class="swatch"><div class="swatch-box" style="background:var(--ds-action-300)"></div><div class="swatch-label">300<br>#66A8FF</div></div>
  <div class="swatch"><div class="swatch-box" style="background:var(--ds-action-400)"></div><div class="swatch-label">400<br>#3388FF</div></div>
  <div class="swatch"><div class="swatch-box" style="background:var(--ds-action-500)"></div><div class="swatch-label">500<br>#0066CC</div></div>
  <div class="swatch"><div class="swatch-box" style="background:var(--ds-action-600)"></div><div class="swatch-label">600<br>#0055AA</div></div>
  <div class="swatch"><div class="swatch-box" style="background:var(--ds-action-700)"></div><div class="swatch-label">700<br>#004488</div></div>
  <div class="swatch"><div class="swatch-box" style="background:var(--ds-action-800)"></div><div class="swatch-label">800<br>#003366</div></div>
  <div class="swatch"><div class="swatch-box" style="background:var(--ds-action-900)"></div><div class="swatch-label">900<br>#001F44</div></div>
</div>
</body>
</html>
