<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Select · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); font-family: var(--font-ui); display: flex; flex-direction: column; gap: 22px; max-width: 480px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .lbl { font-size: .82rem; font-weight: 600; color: var(--rr-ink); }
  .trigger {
    display: flex; align-items: center; justify-content: space-between;
    background: #fff; border: 1.5px solid var(--rr-mist); border-radius: 6px;
    padding: 10px 14px; cursor: pointer; outline: none;
    font-family: var(--font-ui); font-size: .9rem; color: var(--rr-ink);
    transition: border-color var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out);
  }
  .trigger:focus-visible, .trigger.open { border-color: hsl(var(--ring)); box-shadow: var(--shadow-ring); }
  .chev { color: var(--rr-slate); transition: transform var(--duration-fast) var(--ease-out); }
  .trigger.open .chev { transform: rotate(180deg); }
  .menu {
    background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px;
    padding: 6px; box-shadow: var(--shadow-md);
    margin-top: 6px; display: flex; flex-direction: column; gap: 2px;
    max-height: 240px; overflow-y: auto;
  }
  .opt {
    padding: 8px 12px; border-radius: 4px; cursor: pointer;
    font-size: .9rem; color: var(--rr-ink); display: flex; justify-content: space-between; align-items: center;
  }
  .opt:hover, .opt.highlight { background: var(--rr-steel-050); }
  .opt.selected { background: var(--rr-steel-100); color: var(--rr-steel-600); font-weight: 600; }
  .opt-sub { font-size: .7rem; color: var(--rr-slate-dark); }
</style></head><body>
<div class="field">
  <label class="lbl">Provider</label>
  <div class="trigger open" tabindex="0"><span>Dr Hau Le · DDS</span>
    <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
  </div>
  <div class="menu">
    <div class="opt selected">Dr Hau Le · DDS<span class="opt-sub">Operatory 1</span></div>
    <div class="opt highlight">Dr Sara Lim · DMD<span class="opt-sub">Operatory 2</span></div>
    <div class="opt">Hygienist Renu<span class="opt-sub">Hygiene chair</span></div>
    <div class="opt">Dr Marc Tessier · DDS<span class="opt-sub">Locum · Tu/Th</span></div>
  </div>
</div>

<div class="field">
  <label class="lbl">Treatment plan status</label>
  <div class="trigger" tabindex="0"><span style="color:var(--rr-slate)">Select status…</span>
    <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
  </div>
</div>
</body></html>
