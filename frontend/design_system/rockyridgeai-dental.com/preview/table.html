<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Table · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); font-family: var(--font-ui); }
  .wrap { background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; box-shadow: var(--shadow-xs); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  thead { background: var(--rr-off-white); }
  th { font-weight: 600; text-align: left; padding: 12px 16px; color: var(--rr-slate-dark); font-size: .72rem; letter-spacing: .08em; text-transform: uppercase; border-bottom: 1px solid var(--rr-parchment); }
  td { padding: 14px 16px; border-bottom: 1px solid var(--rr-parchment); color: var(--rr-ink); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--rr-off-white); cursor: pointer; }
  .id { font-family: var(--font-mono); font-size: .82rem; color: var(--rr-slate-dark); }
  .ava { width: 28px; height: 28px; border-radius: 999px; background: hsl(var(--primary)); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; font-size: .68rem; margin-right: 8px; vertical-align: middle; }
  .badge { font-size: .66rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; padding: 3px 10px; border-radius: 4px; display: inline-block; }
  .badge.ok  { background: var(--rr-success-bg); color: var(--rr-success); }
  .badge.warn{ background: var(--rr-warning-bg); color: var(--rr-warning); }
  .badge.err { background: var(--rr-error-bg); color: var(--rr-error); }
  .num { font-family: var(--font-mono); text-align: right; }
  .actions button { background: none; border: none; cursor: pointer; color: var(--rr-slate-dark); padding: 4px 8px; border-radius: 4px; }
  .actions button:hover { background: var(--rr-parchment); color: var(--rr-ink); }
</style></head><body>
<div class="wrap">
  <table>
    <thead><tr><th>Patient</th><th>ID</th><th>DOB</th><th>Insurance</th><th>Status</th><th class="num">Balance</th><th></th></tr></thead>
    <tbody>
      <tr><td><span class="ava">AS</span>Alice Stevens</td><td class="id">P-018342</td><td>1984-03-12</td><td>Alberta Blue Cross</td><td><span class="badge ok">Active</span></td><td class="num">$ 0.00</td><td class="actions"><button>⋯</button></td></tr>
      <tr><td><span class="ava" style="background:var(--rr-navy-600)">PK</span>Priya Khanna</td><td class="id">P-018501</td><td>1992-06-29</td><td>Manulife</td><td><span class="badge ok">Active</span></td><td class="num">$ 620.00</td><td class="actions"><button>⋯</button></td></tr>
      <tr><td><span class="ava" style="background:var(--rr-warning)">MD</span>Marcus Doan</td><td class="id">P-018298</td><td>1971-09-04</td><td>Sun Life</td><td><span class="badge warn">Recall</span></td><td class="num">$ 0.00</td><td class="actions"><button>⋯</button></td></tr>
      <tr><td><span class="ava" style="background:var(--rr-error)">DO</span>Daniel Okafor</td><td class="id">P-016102</td><td>1988-07-08</td><td>Pacific Blue Cross</td><td><span class="badge err">Inactive</span></td><td class="num">$ 1,840.50</td><td class="actions"><button>⋯</button></td></tr>
    </tbody>
  </table>
</div>
</body></html>
