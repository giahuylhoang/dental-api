<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Input · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); display: flex; flex-direction: column; gap: 22px; font-family: var(--font-ui); max-width: 520px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: .82rem; font-weight: 600; color: var(--rr-ink); }
  .field-help  { font-size: .72rem; color: var(--rr-slate-dark); }
  .input {
    font-family: var(--font-ui); font-size: .9rem; color: var(--rr-ink);
    background: #fff; border: 1.5px solid var(--rr-mist);
    border-radius: var(--radius-md); padding: 10px 14px;
    width: 100%; outline: none;
    transition: border-color var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out);
  }
  .input::placeholder { color: var(--rr-slate); }
  .input:focus { border-color: hsl(var(--ring)); box-shadow: var(--shadow-ring); }
  .input.error { border-color: var(--rr-error); }
  .input:disabled { background: var(--rr-off-white); color: var(--rr-slate-dark); cursor: not-allowed; }
  .err { font-size: .72rem; color: var(--rr-error); display: inline-flex; align-items: center; gap: 6px; }
  .with-icon { position: relative; }
  .with-icon .input { padding-left: 38px; }
  .with-icon svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--rr-slate); }
</style></head><body>
<div class="field">
  <label class="field-label">Patient first name</label>
  <input class="input" placeholder="Alice">
</div>
<div class="field">
  <label class="field-label">Email · with icon</label>
  <div class="with-icon">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
    <input class="input" placeholder="alice@example.com">
  </div>
</div>
<div class="field">
  <label class="field-label">Insurance ID</label>
  <input class="input error" value="ABC-99-NOPE">
  <span class="err">Format must be ABC-XXXXXXX (3 letters + 7 digits).</span>
</div>
<div class="field">
  <label class="field-label">Patient ID</label>
  <input class="input" value="P-018342" disabled>
  <span class="field-help">Generated by the system — read-only.</span>
</div>
</body></html>
