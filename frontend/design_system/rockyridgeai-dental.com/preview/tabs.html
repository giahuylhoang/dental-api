<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Tabs · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); font-family: var(--font-ui); }
  .tabs { display: inline-flex; gap: 0; background: var(--rr-off-white); border: 1px solid var(--rr-parchment); border-radius: 6px; padding: 4px; }
  .tab { padding: 7px 14px; border-radius: 4px; border: none; background: transparent; cursor: pointer; font-family: var(--font-ui); font-size: .82rem; color: var(--rr-slate-dark); display: inline-flex; align-items: center; gap: 6px; }
  .tab:hover { color: var(--rr-ink); }
  .tab.active { background: #fff; color: var(--rr-ink); box-shadow: var(--shadow-xs); font-weight: 600; }
  .tab .count { background: var(--rr-mist); color: var(--rr-slate-dark); font-size: .65rem; padding: 1px 6px; border-radius: 999px; }
  .tab.active .count { background: var(--rr-steel-100); color: var(--rr-steel-600); }
  .panel { margin-top: 18px; background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; padding: 22px; min-height: 160px; }
  /* Underlined variant */
  .tabs-line { display: flex; gap: 0; border-bottom: 1px solid var(--rr-parchment); margin-top: 30px; }
  .tab-line { padding: 10px 18px; cursor: pointer; font-family: var(--font-ui); font-size: .88rem; color: var(--rr-slate-dark); position: relative; }
  .tab-line:hover { color: var(--rr-ink); }
  .tab-line.active { color: hsl(var(--primary)); font-weight: 600; }
  .tab-line.active::after { content: ''; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px; background: hsl(var(--primary)); }
</style></head><body>
<div class="tabs">
  <button class="tab active">Overview</button>
  <button class="tab">Appointments<span class="count">12</span></button>
  <button class="tab">Treatment plans<span class="count">3</span></button>
  <button class="tab">Lab<span class="count">1</span></button>
  <button class="tab">Insurance</button>
  <button class="tab">Notes</button>
</div>
<div class="panel">
  <div style="font-family:var(--font-display);font-weight:700;font-size:1.1rem;color:var(--rr-navy-800);margin-bottom:6px">Overview</div>
  <div style="font-size:.88rem;color:var(--rr-ink-light);line-height:1.7">Active patient since 2018-09-04. Last visit was 2026-04-21 (recall + scaling). Next recall scheduled for 2026-10-21. No outstanding balance.</div>
</div>

<div class="tabs-line">
  <div class="tab-line active">Detail</div>
  <div class="tab-line">Materials</div>
  <div class="tab-line">Implants</div>
  <div class="tab-line">Activity</div>
</div>
</body></html>
