<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Logo · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { font-family: var(--font-ui); }
  .half { padding: 36px 44px; display: flex; align-items: center; gap: 36px; flex-wrap: wrap; }
  .light { background: hsl(var(--background)); }
  .dark  { background: var(--rr-navy-800); }
  .logo { height: 48px; width: auto; }
  .meta { font-family: var(--font-ui); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--rr-slate-dark); }
  .dark .meta { color: var(--rr-slate); }
  .sample { display: flex; flex-direction: column; gap: 8px; }
  .rule { height: 1px; background: var(--rr-parchment); }
</style></head><body>
<div class="half light">
  <div class="sample">
    <span class="meta">On light · 12px gap · ROCKYRIDGE / DENTAL AI</span>
    <a class="rr-wordmark" href="#">
      <img class="logo" src="../assets/RR_logo_blue.svg" alt="Rockyridge Dental AI">
      <span class="rr-wordmark__lock">
        <span class="rr-wordmark__brand" style="font-size:1.2rem">ROCKYRIDGE</span>
        <span class="rr-wordmark__sub" style="font-size:1rem">DENTAL AI</span>
      </span>
    </a>
  </div>
</div>
<div class="rule"></div>
<div class="half dark">
  <div class="sample">
    <span class="meta">On dark (login portal)</span>
    <a class="rr-wordmark" href="#">
      <img class="logo" src="../assets/RR_logo_white.svg" alt="Rockyridge Dental AI">
      <span class="rr-wordmark__lock">
        <span class="rr-wordmark__brand" style="font-size:1.2rem;color:var(--rr-warm-white)">ROCKYRIDGE</span>
        <span class="rr-wordmark__sub" style="font-size:1rem;color:rgba(250,249,246,0.7)">DENTAL AI</span>
      </span>
    </a>
  </div>
</div>
</body></html>
