<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Menubar · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); font-family: var(--font-ui); }
  .mb { display: inline-flex; gap: 0; background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; padding: 4px; box-shadow: var(--shadow-xs); }
  .mb-item { padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: .85rem; color: var(--rr-ink); }
  .mb-item:hover { background: var(--rr-off-white); }
  .mb-item.open { background: var(--rr-steel-100); color: var(--rr-steel-600); font-weight: 600; }
  .menu { position: absolute; top: 78px; left: 32px; background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; padding: 6px; box-shadow: var(--shadow-md); min-width: 220px; }
  .item { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; border-radius: 4px; cursor: pointer; font-size: .85rem; color: var(--rr-ink); }
  .item:hover { background: var(--rr-steel-050); }
  .kbd { font-family: var(--font-mono); font-size: .68rem; color: var(--rr-slate-dark); padding: 1px 6px; background: var(--rr-off-white); border-radius: 3px; }
  .sep { height: 1px; background: var(--rr-parchment); margin: 4px 0; }
</style></head><body>
<div class="mb">
  <div class="mb-item">File</div>
  <div class="mb-item open">Patient</div>
  <div class="mb-item">Schedule</div>
  <div class="mb-item">Lab</div>
  <div class="mb-item">View</div>
  <div class="mb-item">Help</div>
</div>
<div class="menu">
  <div class="item">New patient<span class="kbd">⌘N</span></div>
  <div class="item">Open patient…<span class="kbd">⌘O</span></div>
  <div class="sep"></div>
  <div class="item">New appointment<span class="kbd">⌘⇧A</span></div>
  <div class="item">New treatment plan</div>
  <div class="item">New lab case</div>
  <div class="sep"></div>
  <div class="item">Export chart…</div>
</div>
</body></html>
