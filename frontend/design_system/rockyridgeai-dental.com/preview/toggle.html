<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Toggle · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); font-family: var(--font-ui); display: flex; flex-direction: column; gap: 28px; }
  h2 { font-size: .72rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--rr-slate-dark); margin: 0; }
  .group { display: inline-flex; gap: 0; background: var(--rr-off-white); border: 1px solid var(--rr-parchment); border-radius: 6px; padding: 4px; }
  .toggle { padding: 8px 14px; border-radius: 4px; border: none; background: transparent; cursor: pointer; font-family: var(--font-ui); font-size: .82rem; color: var(--rr-slate-dark); display: inline-flex; align-items: center; gap: 6px; }
  .toggle:hover { color: var(--rr-ink); }
  .toggle.on { background: #fff; color: var(--rr-ink); box-shadow: var(--shadow-xs); font-weight: 600; }
  .toggle:focus-visible { outline: none; box-shadow: var(--shadow-ring); }
</style></head><body>
<div><h2>Toggle group · view</h2>
  <div class="group">
    <button class="toggle on">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Grid
    </button>
    <button class="toggle">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      List
    </button>
    <button class="toggle">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/><path d="M3 9h6"/><path d="M3 15h6"/></svg>
      Kanban
    </button>
  </div>
</div>
<div><h2>Single toggle</h2>
  <div style="display:flex;gap:10px">
    <button class="toggle on">Bold</button>
    <button class="toggle">Italic</button>
    <button class="toggle">Underline</button>
  </div>
</div>
</body></html>
