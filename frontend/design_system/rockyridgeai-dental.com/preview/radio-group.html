<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Radio Group · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); font-family: var(--font-ui); display: flex; flex-direction: column; gap: 24px; max-width: 540px; }
  .legend { font-size: .82rem; font-weight: 600; color: var(--rr-ink); margin-bottom: 8px; }
  .group { display: flex; flex-direction: column; gap: 6px; }
  .row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; }
  .rb {
    appearance: none; -webkit-appearance: none;
    width: 18px; height: 18px; border: 1.5px solid var(--rr-mist);
    border-radius: 999px; background: #fff; cursor: pointer; position: relative;
    flex-shrink: 0; margin-top: 2px;
  }
  .rb:checked { border-color: hsl(var(--primary)); }
  .rb:checked::after { content: ''; position: absolute; inset: 3px; background: hsl(var(--primary)); border-radius: 999px; }
  .rb:focus-visible { outline: none; box-shadow: var(--shadow-ring); }
  .lbl { font-size: .9rem; color: var(--rr-ink); cursor: pointer; }
  .help { font-size: .72rem; color: var(--rr-slate-dark); display: block; margin-top: 2px; }
  /* Card variant — tile */
  .tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .tile { border: 1.5px solid var(--rr-mist); border-radius: 6px; padding: 14px; cursor: pointer; transition: border-color var(--duration-fast) var(--ease-out); }
  .tile.checked { border-color: hsl(var(--primary)); background: var(--rr-steel-050); }
  .tile-title { font-size: .82rem; font-weight: 600; color: var(--rr-ink); }
  .tile-sub { font-size: .72rem; color: var(--rr-slate-dark); margin-top: 4px; }
</style></head><body>
<div class="group">
  <div class="legend">Visit type</div>
  <div class="row"><input class="rb" type="radio" name="v" id="v1" checked><label class="lbl" for="v1">Routine recall<span class="help">30 min · Hygiene + dental exam</span></label></div>
  <div class="row"><input class="rb" type="radio" name="v" id="v2"><label class="lbl" for="v2">New patient consult<span class="help">60 min · full history + radiographs</span></label></div>
  <div class="row"><input class="rb" type="radio" name="v" id="v3"><label class="lbl" for="v3">Emergency<span class="help">15 min · triage · same-day</span></label></div>
</div>

<div class="group">
  <div class="legend">Reminder cadence — card variant</div>
  <div class="tiles">
    <div class="tile checked"><div class="tile-title">Default</div><div class="tile-sub">24h + 2h before</div></div>
    <div class="tile"><div class="tile-title">Aggressive</div><div class="tile-sub">7d + 24h + 2h</div></div>
    <div class="tile"><div class="tile-title">Off</div><div class="tile-sub">No automated reminders</div></div>
  </div>
</div>
</body></html>
