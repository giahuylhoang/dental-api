<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Drawer · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; height: 100%; }
  body { background: hsl(var(--background)); font-family: var(--font-ui); }
  .overlay { position: fixed; inset: 0; background: rgba(10, 25, 47, 0.4); }
  .drawer { position: fixed; top: 0; bottom: 0; right: 0; width: min(560px, 100%); background: #fff; box-shadow: var(--shadow-xl); display: flex; flex-direction: column; }
  .header { padding: 22px 28px; border-bottom: 1px solid var(--rr-parchment); display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
  .meta { font-size: .68rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: hsl(var(--primary)); }
  .title { font-family: var(--font-display); font-weight: 700; font-size: 1.4rem; color: var(--rr-navy-800); letter-spacing: -.02em; margin: 4px 0 6px; }
  .sub   { font-family: var(--font-mono); font-size: .78rem; color: var(--rr-slate-dark); }
  .x { background: none; border: none; cursor: pointer; padding: 6px; color: var(--rr-slate-dark); border-radius: 4px; }
  .x:hover { background: var(--rr-off-white); color: var(--rr-ink); }
  .body { flex: 1; padding: 22px 28px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }
  .row { display: grid; grid-template-columns: 120px 1fr; gap: 14px; padding: 10px 0; border-bottom: 1px solid var(--rr-parchment); }
  .row:last-child { border-bottom: none; }
  .row .k { font-size: .72rem; font-weight: 600; color: var(--rr-slate-dark); letter-spacing: .04em; text-transform: uppercase; padding-top: 2px; }
  .row .v { font-size: .9rem; color: var(--rr-ink); }
  .footer { padding: 16px 28px; border-top: 1px solid var(--rr-parchment); display: flex; gap: 10px; justify-content: flex-end; background: var(--rr-off-white); }
</style></head><body>
<div class="overlay"></div>
<aside class="drawer" role="dialog">
  <div class="header">
    <div>
      <div class="meta">Patient detail</div>
      <div class="title">Alice Stevens</div>
      <div class="sub">P-018342 · DOB 1984-03-12</div>
    </div>
    <button class="x">×</button>
  </div>
  <div class="body">
    <div class="row"><span class="k">Phone</span><span class="v">+1 (403) 555-0142</span></div>
    <div class="row"><span class="k">Email</span><span class="v">alice@example.com</span></div>
    <div class="row"><span class="k">Insurance</span><span class="v">Alberta Blue Cross · #99917-04</span></div>
    <div class="row"><span class="k">Last visit</span><span class="v">2026-04-21 · Hygiene + recall</span></div>
    <div class="row"><span class="k">Next recall</span><span class="v">2026-10-21 · 6-month cycle</span></div>
    <div class="row"><span class="k">Notes</span><span class="v">Prefers morning slots · sensitivity on #36 · referred by P. Khanna.</span></div>
  </div>
  <div class="footer">
    <button class="btn btn-ghost btn-md">Close</button>
    <button class="btn btn-primary btn-md">Open chart</button>
  </div>
</aside>
</body></html>
