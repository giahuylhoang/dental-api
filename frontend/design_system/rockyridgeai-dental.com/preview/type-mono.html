<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Mono Type · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px 40px; background: hsl(var(--background)); display: flex; flex-direction: column; gap: 22px; }
  .meta { font-family: var(--font-ui); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--rr-slate-dark); margin-bottom: 8px; }
  .row { font-family: var(--font-mono); font-size: 1rem; color: var(--rr-ink); }
  .row.dim { color: var(--rr-slate-dark); }
  .codeblock { background: var(--rr-off-white); border: 1px solid var(--rr-parchment); border-radius: 6px; padding: 18px 22px; font-family: var(--font-mono); font-size: .9rem; line-height: 1.7; color: var(--rr-ink); }
  .tok { color: var(--rr-steel-600); }
  .num { color: var(--rr-warning); }
</style></head><body>
<div>
  <div class="meta">Mono · Patient & clinical references</div>
  <div class="row">PATIENT  <span style="color:var(--rr-slate)">·</span>  P-018342</div>
  <div class="row">CHART    <span style="color:var(--rr-slate)">·</span>  Tooth 36 · MOD composite</div>
  <div class="row">LAB CASE <span style="color:var(--rr-slate)">·</span>  LC-2026-0481 · ETA 2026-05-12</div>
  <div class="row dim">UDI/LOT  <span style="color:var(--rr-slate)">·</span>  IM-Z3-08177-A2</div>
</div>
<div>
  <div class="meta">Mono · Code block</div>
  <pre class="codeblock"><span class="tok">POST</span> /api/calendar/events
  <span class="tok">"patient_id"</span>: <span class="num">"P-018342"</span>,
  <span class="tok">"start"</span>: <span class="num">"2026-05-04T10:30:00-06:00"</span>,
  <span class="tok">"duration_min"</span>: <span class="num">45</span></pre>
</div>
</body></html>
