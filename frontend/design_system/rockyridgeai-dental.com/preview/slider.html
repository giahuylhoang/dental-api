<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Slider · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); font-family: var(--font-ui); display: flex; flex-direction: column; gap: 32px; max-width: 540px; }
  .field { display: flex; flex-direction: column; gap: 14px; }
  .meta { display: flex; justify-content: space-between; font-size: .82rem; color: var(--rr-ink); }
  .meta .val { font-family: var(--font-mono); color: hsl(var(--primary)); font-weight: 600; }
  .track { position: relative; height: 6px; background: var(--rr-mist); border-radius: 3px; }
  .fill  { position: absolute; left: 0; top: 0; bottom: 0; background: hsl(var(--primary)); border-radius: 3px; }
  .knob  { position: absolute; top: 50%; width: 18px; height: 18px; border-radius: 999px; background: #fff; border: 2px solid hsl(var(--primary)); transform: translate(-50%, -50%); box-shadow: var(--shadow-sm); cursor: grab; }
  .ticks { display: flex; justify-content: space-between; font-size: .68rem; color: var(--rr-slate); margin-top: 4px; font-family: var(--font-mono); }
</style></head><body>
<div class="field">
  <div class="meta"><span>Appointment duration</span><span class="val">45 min</span></div>
  <div class="track"><div class="fill" style="width:45%"></div><div class="knob" style="left:45%"></div></div>
  <div class="ticks"><span>15</span><span>30</span><span>45</span><span>60</span><span>90</span><span>120</span></div>
</div>
<div class="field">
  <div class="meta"><span>Recall window</span><span class="val">3 – 6 months</span></div>
  <div class="track"><div class="fill" style="left:25%; width:25%"></div><div class="knob" style="left:25%"></div><div class="knob" style="left:50%"></div></div>
  <div class="ticks"><span>1mo</span><span>3mo</span><span>6mo</span><span>9mo</span><span>12mo</span></div>
</div>
</body></html>
