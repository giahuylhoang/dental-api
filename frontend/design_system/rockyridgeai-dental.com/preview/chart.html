<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Chart · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); font-family: var(--font-ui); display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .panel { background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; padding: 20px 22px; box-shadow: var(--shadow-xs); }
  .panel h3 { font-family: var(--font-display); font-weight: 700; font-size: 1rem; color: var(--rr-navy-800); margin-bottom: 4px; }
  .panel .sub { font-size: .72rem; color: var(--rr-slate-dark); margin-bottom: 14px; }
  .axis-y { font-family: var(--font-mono); font-size: .68rem; fill: var(--rr-slate); }
  .axis-x { font-family: var(--font-ui); font-size: .68rem; fill: var(--rr-slate-dark); }
  .grid-line { stroke: var(--rr-parchment); stroke-width: 1; }
</style></head><body>
<div class="panel">
  <h3>Bookings · last 7 days</h3>
  <div class="sub">Confirmed · pending · cancelled</div>
  <svg viewBox="0 0 320 160" width="100%" height="160" preserveAspectRatio="none">
    <line class="grid-line" x1="40" y1="20"  x2="320" y2="20"/>
    <line class="grid-line" x1="40" y1="60"  x2="320" y2="60"/>
    <line class="grid-line" x1="40" y1="100" x2="320" y2="100"/>
    <line class="grid-line" x1="40" y1="140" x2="320" y2="140"/>
    <text class="axis-y" x="32" y="142" text-anchor="end">0</text>
    <text class="axis-y" x="32" y="103" text-anchor="end">10</text>
    <text class="axis-y" x="32" y="63"  text-anchor="end">20</text>
    <text class="axis-y" x="32" y="23"  text-anchor="end">30</text>
    <g fill="hsl(var(--chart-1))">
      <rect x="50"  y="58"  width="28" height="82"/>
      <rect x="90"  y="48"  width="28" height="92"/>
      <rect x="130" y="36"  width="28" height="104"/>
      <rect x="170" y="74"  width="28" height="66"/>
      <rect x="210" y="42"  width="28" height="98"/>
      <rect x="250" y="92"  width="28" height="48"/>
      <rect x="290" y="118" width="22" height="22"/>
    </g>
    <text class="axis-x" x="64" y="156">Mon</text>
    <text class="axis-x" x="104" y="156">Tue</text>
    <text class="axis-x" x="144" y="156">Wed</text>
    <text class="axis-x" x="184" y="156">Thu</text>
    <text class="axis-x" x="224" y="156">Fri</text>
    <text class="axis-x" x="264" y="156">Sat</text>
    <text class="axis-x" x="301" y="156">Sun</text>
  </svg>
</div>
<div class="panel">
  <h3>Revenue · MTD</h3>
  <div class="sub">Steel = collected · Navy = outstanding</div>
  <svg viewBox="0 0 320 160" width="100%" height="160" preserveAspectRatio="none">
    <line class="grid-line" x1="40" y1="20"  x2="320" y2="20"/>
    <line class="grid-line" x1="40" y1="60"  x2="320" y2="60"/>
    <line class="grid-line" x1="40" y1="100" x2="320" y2="100"/>
    <line class="grid-line" x1="40" y1="140" x2="320" y2="140"/>
    <polyline points="40,130 80,108 120,90 160,72 200,60 240,52 280,38 320,30" fill="none" stroke="hsl(var(--chart-1))" stroke-width="2"/>
    <polyline points="40,140 80,128 120,118 160,108 200,96 240,94 280,84 320,72" fill="none" stroke="hsl(var(--chart-2))" stroke-width="2" stroke-dasharray="4 4"/>
    <text class="axis-x" x="42" y="156">Apr 1</text>
    <text class="axis-x" x="282" y="156">Apr 30</text>
  </svg>
</div>
</body></html>
