<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Radii · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); font-family: var(--font-ui); }
  .row { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 64px; height: 64px; background: var(--rr-navy-800); }
  .token { font-size: 11px; font-weight: 600; color: var(--rr-slate-dark); text-align: center; line-height: 1.4; }
  .val { font-size: 10px; color: var(--rr-slate); font-family: var(--font-mono); }
</style></head><body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:var(--radius-none)"></div><span class="token">none<br><span class="val">0</span></span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="token">xs<br><span class="val">2px</span></span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="token">sm<br><span class="val">4px</span></span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="token">md · default<br><span class="val">6px</span></span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="token">lg<br><span class="val">10px</span></span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="token">xl<br><span class="val">14px</span></span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><span class="token">pill<br><span class="val">999px</span></span></div>
</div>
</body></html>
