<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Switch · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); font-family: var(--font-ui); display: flex; flex-direction: column; gap: 16px; max-width: 520px; }
  .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--rr-parchment); gap: 16px; }
  .row:last-child { border-bottom: none; }
  .lbl { font-size: .9rem; color: var(--rr-ink); }
  .help { display: block; font-size: .72rem; color: var(--rr-slate-dark); margin-top: 2px; }
  .sw { position: relative; width: 40px; height: 22px; background: var(--rr-mist); border-radius: 999px; cursor: pointer; transition: background-color var(--duration-fast) var(--ease-out); flex-shrink: 0; }
  .sw::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: #fff; border-radius: 999px; box-shadow: var(--shadow-xs); transition: transform var(--duration-fast) var(--ease-out); }
  .sw.on { background: hsl(var(--primary)); }
  .sw.on::after { transform: translateX(18px); }
</style></head><body>
<div class="row"><div><div class="lbl">SMS reminders</div><span class="help">Twilio · 24h + 2h before</span></div><div class="sw on"></div></div>
<div class="row"><div><div class="lbl">Email reminders</div><span class="help">SendGrid · 24h before</span></div><div class="sw on"></div></div>
<div class="row"><div><div class="lbl">Auto-claim insurance</div><span class="help">Submit claim within 30 min of completion</span></div><div class="sw"></div></div>
<div class="row"><div><div class="lbl">Show secondary providers</div><span class="help">Locum + hygiene in scheduler view</span></div><div class="sw on"></div></div>
</body></html>
