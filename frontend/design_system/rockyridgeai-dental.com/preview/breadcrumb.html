<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Breadcrumb · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); font-family: var(--font-ui); display: flex; flex-direction: column; gap: 22px; }
  .crumb { display: inline-flex; align-items: center; gap: 8px; font-size: .82rem; color: var(--rr-slate-dark); }
  .crumb a { color: var(--rr-slate-dark); text-decoration: none; cursor: pointer; transition: color var(--duration-fast); }
  .crumb a:hover { color: hsl(var(--primary)); text-decoration-color: currentColor; }
  .crumb .current { color: var(--rr-ink); font-weight: 500; }
  .crumb .sep { color: var(--rr-mist); }
  .ava { width: 22px; height: 22px; border-radius: 999px; background: hsl(var(--primary)); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; font-size: .62rem; vertical-align: middle; margin-right: 4px; }
</style></head><body>
<nav class="crumb"><a>Patients</a><span class="sep">›</span><span class="current">Alice Stevens</span></nav>
<nav class="crumb"><a>Patients</a><span class="sep">›</span><a><span class="ava">AS</span>Alice Stevens</a><span class="sep">›</span><span class="current">Treatment plans</span></nav>
<nav class="crumb"><a>Lab</a><span class="sep">›</span><a>Active cases</a><span class="sep">›</span><a>LC-2026-0481</a><span class="sep">›</span><span class="current">Materials</span></nav>
</body></html>
