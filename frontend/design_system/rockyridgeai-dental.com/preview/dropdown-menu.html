<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Dropdown Menu · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); font-family: var(--font-ui); }
  .trigger { background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; padding: 8px 14px; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: .88rem; color: var(--rr-ink); }
  .trigger:hover { background: var(--rr-off-white); }
  .menu { position: absolute; top: 70px; left: 32px; background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; padding: 6px; box-shadow: var(--shadow-md); min-width: 240px; }
  .item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 4px; cursor: pointer; font-size: .85rem; color: var(--rr-ink); }
  .item:hover { background: var(--rr-steel-050); }
  .item .ico { width: 16px; height: 16px; color: var(--rr-slate-dark); }
  .item:hover .ico { color: hsl(var(--primary)); }
  .item.checked .ico { color: hsl(var(--primary)); }
  .head { padding: 6px 10px; }
  .name { font-weight: 600; font-size: .85rem; color: var(--rr-ink); }
  .sub  { font-family: var(--font-mono); font-size: .7rem; color: var(--rr-slate-dark); }
  .sep { height: 1px; background: var(--rr-parchment); margin: 4px 0; }
</style></head><body>
<button class="trigger">
  <span style="display:inline-flex;align-items:center;gap:6px"><span style="width:24px;height:24px;border-radius:999px;background:hsl(var(--primary));color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:600">HL</span>Dr Hau Le</span>
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m6 9 6 6 6-6"/></svg>
</button>
<div class="menu" role="menu">
  <div class="head"><div class="name">Dr Hau Le</div><div class="sub">hau@oakdentalcalgary.com</div></div>
  <div class="sep"></div>
  <div class="item"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</div>
  <div class="item"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</div>
  <div class="item checked"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>Compact density</div>
  <div class="sep"></div>
  <div class="item"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign out</div>
</div>
</body></html>
