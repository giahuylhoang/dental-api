<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Context Menu · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); font-family: var(--font-ui); }
  .surface { width: 480px; height: 280px; background: #fff; border: 1px dashed var(--rr-mist); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--rr-slate-dark); }
  .menu {
    position: absolute; top: 110px; left: 220px;
    background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px;
    padding: 6px; box-shadow: var(--shadow-md); min-width: 220px;
    display: flex; flex-direction: column; gap: 1px;
  }
  .item { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; border-radius: 4px; cursor: pointer; font-size: .85rem; color: var(--rr-ink); }
  .item:hover { background: var(--rr-steel-050); }
  .item.danger { color: var(--rr-error); }
  .item.danger:hover { background: var(--rr-error-bg); }
  .item .kbd { font-family: var(--font-mono); font-size: .68rem; color: var(--rr-slate-dark); padding: 1px 6px; background: var(--rr-off-white); border-radius: 3px; }
  .sub { padding: 4px 10px; font-size: .68rem; color: var(--rr-slate); letter-spacing: .04em; text-transform: uppercase; }
  .sep { height: 1px; background: var(--rr-parchment); margin: 4px 0; }
</style></head><body>
<div class="surface">Right-click an appointment</div>
<div class="menu" role="menu">
  <div class="sub">Appointment</div>
  <div class="item">View patient<span class="kbd">↵</span></div>
  <div class="item">Reschedule<span class="kbd">⌘R</span></div>
  <div class="item">Send reminder<span class="kbd">⌘B</span></div>
  <div class="sep"></div>
  <div class="sub">Outcomes</div>
  <div class="item">Mark completed</div>
  <div class="item">Mark no-show</div>
  <div class="sep"></div>
  <div class="item danger">Cancel appointment<span class="kbd">⌫</span></div>
</div>
</body></html>
