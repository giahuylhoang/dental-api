<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Form · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: var(--rr-off-white); font-family: var(--font-ui); }
  .form { background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; padding: 32px; max-width: 580px; box-shadow: var(--shadow-sm); }
  .form h3 { font-family: var(--font-display); font-weight: 700; font-size: 1.4rem; color: var(--rr-navy-800); letter-spacing: -.02em; margin-bottom: 6px; }
  .form .sub { font-size: .82rem; color: var(--rr-slate-dark); margin-bottom: 22px; }
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .lbl { font-size: .78rem; font-weight: 600; color: var(--rr-ink); }
  .req { color: var(--rr-error); margin-left: 2px; }
  .input, select, textarea {
    font-family: var(--font-ui); font-size: .9rem; color: var(--rr-ink);
    background: #fff; border: 1.5px solid var(--rr-mist); border-radius: 6px;
    padding: 10px 12px; outline: none; width: 100%;
    transition: border-color var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out);
  }
  .input:focus, select:focus, textarea:focus { border-color: hsl(var(--ring)); box-shadow: var(--shadow-ring); }
  .help { font-size: .72rem; color: var(--rr-slate-dark); }
  .err  { font-size: .72rem; color: var(--rr-error); }
  .actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 22px; padding-top: 22px; border-top: 1px solid var(--rr-parchment); }
</style></head><body>
<form class="form" onsubmit="return false">
  <h3>New patient</h3>
  <div class="sub">Records are encrypted at rest and audit-logged.</div>
  <div class="field-row">
    <div class="field"><label class="lbl">First name<span class="req">*</span></label><input class="input" placeholder="Alice"></div>
    <div class="field"><label class="lbl">Last name<span class="req">*</span></label><input class="input" placeholder="Stevens"></div>
  </div>
  <div class="field-row">
    <div class="field"><label class="lbl">Date of birth<span class="req">*</span></label><input class="input" placeholder="YYYY-MM-DD"></div>
    <div class="field"><label class="lbl">Phone</label><input class="input" placeholder="+1 (403) 555-0142"></div>
  </div>
  <div class="field"><label class="lbl">Email</label><input class="input" value="not-an-email" style="border-color:var(--rr-error)"><span class="err">Enter a valid email address.</span></div>
  <div class="field"><label class="lbl">Insurance provider</label>
    <select><option>Alberta Blue Cross</option><option>Sun Life</option><option>Manulife</option><option>None / Self-pay</option></select>
  </div>
  <div class="field"><label class="lbl">Notes</label><textarea rows="3" placeholder="Allergies, medical history, referrer…"></textarea><span class="help">Visible on the chart, never on the public booking page.</span></div>
  <div class="actions">
    <button class="btn btn-ghost btn-md" type="button">Cancel</button>
    <button class="btn btn-primary btn-md" type="submit">Create patient</button>
  </div>
</form>
</body></html>
