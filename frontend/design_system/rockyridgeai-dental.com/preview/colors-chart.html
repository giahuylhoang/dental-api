<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Chart Series · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); display: flex; flex-direction: column; gap: 24px; }
  h2 { font-size: 1rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--rr-slate-dark); margin: 0; }
  .legend { display: flex; gap: 18px; flex-wrap: wrap; }
  .pill { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-ui); font-size: .82rem; color: var(--rr-ink); }
  .dot { width: 12px; height: 12px; border-radius: 3px; }
  .bars { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; align-items: end; height: 220px; padding: 24px; background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; }
  .bar { width: 100%; border-radius: 4px 4px 0 0; }
  .bar-lbl { font-family: var(--font-ui); font-size: .7rem; color: var(--rr-slate-dark); margin-top: 8px; text-align: center; }
</style></head><body>
<h2>Chart series — calm, clinical, distinguishable in print</h2>
<div class="legend">
  <span class="pill"><span class="dot" style="background:hsl(var(--chart-1))"></span>Steel · primary</span>
  <span class="pill"><span class="dot" style="background:hsl(var(--chart-2))"></span>Navy</span>
  <span class="pill"><span class="dot" style="background:hsl(var(--chart-3))"></span>Teal · clinical</span>
  <span class="pill"><span class="dot" style="background:hsl(var(--chart-4))"></span>Amber</span>
  <span class="pill"><span class="dot" style="background:hsl(var(--chart-5))"></span>Burgundy</span>
</div>
<div>
  <div class="bars">
    <div><div class="bar" style="height:80%; background:hsl(var(--chart-1))"></div></div>
    <div><div class="bar" style="height:62%; background:hsl(var(--chart-2))"></div></div>
    <div><div class="bar" style="height:74%; background:hsl(var(--chart-3))"></div></div>
    <div><div class="bar" style="height:50%; background:hsl(var(--chart-4))"></div></div>
    <div><div class="bar" style="height:35%; background:hsl(var(--chart-5))"></div></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-top:8px;padding:0 24px">
    <div class="bar-lbl">Schedule</div>
    <div class="bar-lbl">Recall</div>
    <div class="bar-lbl">Lab</div>
    <div class="bar-lbl">Insurance</div>
    <div class="bar-lbl">Plans</div>
  </div>
</div>
</body></html>
