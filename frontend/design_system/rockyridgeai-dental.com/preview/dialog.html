<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Dialog · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: hsl(var(--background)); font-family: var(--font-ui); margin: 0; min-height: 100vh; }
  .overlay { position: fixed; inset: 0; background: rgba(10, 25, 47, 0.55); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 24px; }
  .dialog { background: #fff; border-radius: 6px; padding: 28px 32px; box-shadow: var(--shadow-xl); max-width: 540px; width: 100%; position: relative; }
  .x { position: absolute; top: 14px; right: 14px; background: none; border: none; cursor: pointer; color: var(--rr-slate-dark); padding: 8px; border-radius: 4px; }
  .x:hover { background: var(--rr-off-white); color: var(--rr-ink); }
  .header { margin-bottom: 18px; }
  .header h3 { font-family: var(--font-display); font-weight: 700; font-size: 1.4rem; color: var(--rr-navy-800); letter-spacing: -.02em; margin-bottom: 4px; }
  .header .sub { font-size: .82rem; color: var(--rr-slate-dark); }
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .lbl { font-size: .78rem; font-weight: 600; color: var(--rr-ink); }
  .input { font-family: var(--font-ui); font-size: .9rem; padding: 10px 12px; border: 1.5px solid var(--rr-mist); border-radius: 6px; }
  .input:focus { border-color: hsl(var(--ring)); box-shadow: var(--shadow-ring); outline: none; }
  .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; padding-top: 18px; border-top: 1px solid var(--rr-parchment); }
</style></head><body>
<div class="overlay">
  <div class="dialog" role="dialog">
    <button class="x">×</button>
    <div class="header">
      <h3>New appointment</h3>
      <div class="sub">Pick a patient, provider, and slot. Conflicts are flagged in real time.</div>
    </div>
    <div class="field"><label class="lbl">Patient</label><input class="input" value="Alice Stevens · P-018342"></div>
    <div class="field"><label class="lbl">Provider</label><input class="input" value="Dr Hau Le · Operatory 1"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="field"><label class="lbl">Date</label><input class="input" value="2026-05-04"></div>
      <div class="field"><label class="lbl">Time</label><input class="input" value="09:00"></div>
    </div>
    <div class="actions">
      <button class="btn btn-ghost btn-md">Cancel</button>
      <button class="btn btn-primary btn-md">Book appointment</button>
    </div>
  </div>
</div>
</body></html>
