<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Tooltip · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 64px 48px; background: hsl(var(--background)); font-family: var(--font-ui); display: flex; gap: 60px; flex-wrap: wrap; align-items: center; }
  .target { position: relative; padding: 12px 18px; background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; cursor: pointer; }
  .tip {
    position: absolute; background: var(--rr-navy-800); color: var(--rr-warm-white);
    padding: 6px 10px; border-radius: 4px; font-size: .76rem; white-space: nowrap;
    box-shadow: var(--shadow-md); pointer-events: none;
  }
  .tip::after { content: ''; position: absolute; border: 5px solid transparent; }
  .tip.top { bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); }
  .tip.top::after { top: 100%; left: 50%; margin-left: -5px; border-top-color: var(--rr-navy-800); }
  .tip.right { left: calc(100% + 8px); top: 50%; transform: translateY(-50%); }
  .tip.right::after { right: 100%; top: 50%; margin-top: -5px; border-right-color: var(--rr-navy-800); }
  .tip.bottom { top: calc(100% + 8px); left: 50%; transform: translateX(-50%); }
  .tip.bottom::after { bottom: 100%; left: 50%; margin-left: -5px; border-bottom-color: var(--rr-navy-800); }
  .tip.left { right: calc(100% + 8px); top: 50%; transform: translateY(-50%); }
  .tip.left::after { left: 100%; top: 50%; margin-top: -5px; border-left-color: var(--rr-navy-800); }
  .kbd { display: inline-block; font-family: var(--font-mono); background: rgba(255,255,255,0.12); padding: 1px 6px; border-radius: 3px; margin-left: 6px; }
</style></head><body>
<div class="target">Hover top<div class="tip top">Schedule a recall<span class="kbd">⌘R</span></div></div>
<div class="target">Hover right<div class="tip right">Patient is overdue for recall by 18 days</div></div>
<div class="target">Hover bottom<div class="tip bottom">Open chart in new tab</div></div>
<div class="target">Hover left<div class="tip left">Insurance verified 2026-04-12</div></div>
</body></html>
