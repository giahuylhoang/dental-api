<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Spacing · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); font-family: var(--font-ui); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; }
  .bar { background: var(--rr-navy-800); border-radius: 2px; height: 10px; }
  .token { font-size: 11px; font-weight: 600; letter-spacing: .04em; color: var(--rr-slate-dark); }
  .val { font-size: 10px; color: var(--rr-slate); font-family: var(--font-mono); }
</style></head><body>
<div class="grid">
  <div class="item"><div class="bar" style="width:4px"></div><span class="token">space-1</span><span class="val">4 · 0.25rem</span></div>
  <div class="item"><div class="bar" style="width:8px"></div><span class="token">space-2</span><span class="val">8 · 0.5rem</span></div>
  <div class="item"><div class="bar" style="width:12px"></div><span class="token">space-3</span><span class="val">12 · 0.75rem</span></div>
  <div class="item"><div class="bar" style="width:16px"></div><span class="token">space-4</span><span class="val">16 · 1rem</span></div>
  <div class="item"><div class="bar" style="width:20px"></div><span class="token">space-5</span><span class="val">20 · 1.25rem</span></div>
  <div class="item"><div class="bar" style="width:24px"></div><span class="token">space-6</span><span class="val">24 · 1.5rem</span></div>
  <div class="item"><div class="bar" style="width:32px"></div><span class="token">space-8</span><span class="val">32 · 2rem</span></div>
  <div class="item"><div class="bar" style="width:40px"></div><span class="token">space-10</span><span class="val">40 · 2.5rem</span></div>
  <div class="item"><div class="bar" style="width:48px"></div><span class="token">space-12</span><span class="val">48 · 3rem</span></div>
  <div class="item"><div class="bar" style="width:64px"></div><span class="token">space-16</span><span class="val">64 · 4rem</span></div>
  <div class="item"><div class="bar" style="width:80px"></div><span class="token">space-20</span><span class="val">80 · 5rem</span></div>
  <div class="item"><div class="bar" style="width:96px"></div><span class="token">space-24</span><span class="val">96 · 6rem</span></div>
</div>
</body></html>
