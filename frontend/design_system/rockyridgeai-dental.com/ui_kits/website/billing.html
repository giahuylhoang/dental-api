<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Billing · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<style>
  html, body { margin: 0; }
  body { background: var(--rr-warm-white); min-height: 100vh; }
  .shell { display: flex; min-height: 100vh; }
  .stage { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .stage > .body { padding: 28px 32px; display: flex; flex-direction: column; gap: 24px; }
  .page-header { display: flex; justify-content: space-between; align-items: center; }
  .page-title { font-family: var(--font-display); font-weight: 800; font-size: 1.8rem; color: var(--rr-navy-800); letter-spacing: -.025em; margin: 0 0 4px; }
  .page-sub { font-family: var(--font-ui); font-size: .88rem; color: var(--rr-slate-dark); }
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .panel { background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; padding: 22px 24px; box-shadow: var(--shadow-xs); }
  .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .panel-h-title { font-family: var(--font-display); font-weight: 700; font-size: 1.05rem; color: var(--rr-navy-800); }
  .panel-h-sub { font-family: var(--font-ui); font-size: .72rem; color: var(--rr-slate-dark); margin-top: 2px; }
  .panel-h-action { font-family: var(--font-ui); font-size: .82rem; color: hsl(var(--primary)); cursor: pointer; }

  .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .toolbar input[type="search"] {
    flex: 1; min-width: 220px; height: 36px; padding: 0 12px 0 36px; border-radius: 4px;
    border: 1px solid var(--rr-parchment); background: var(--rr-warm-white) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238A9BB0' stroke-width='1.6'><circle cx='11' cy='11' r='8'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>") no-repeat 12px 50%;
    font-family: var(--font-ui); font-size: .85rem; color: var(--rr-ink);
  }
  .filter-pill { display: inline-flex; align-items: center; gap: 6px; height: 32px; padding: 0 12px; border-radius: 999px; border: 1px solid var(--rr-parchment); background: #fff; font-family: var(--font-ui); font-size: .76rem; color: var(--rr-slate-dark); cursor: pointer; }
  .filter-pill.active { background: var(--rr-mist); color: var(--rr-navy-800); border-color: var(--rr-steel-200); font-weight: 600; }

  table.list { width: 100%; border-collapse: collapse; font-family: var(--font-ui); font-size: .85rem; }
  table.list th { text-align: left; padding: 12px 14px; color: var(--rr-slate-dark); font-size: .68rem; letter-spacing: .08em; text-transform: uppercase; border-bottom: 1px solid var(--rr-parchment); font-weight: 600; }
  table.list td { padding: 14px; border-bottom: 1px solid var(--rr-parchment); vertical-align: middle; }
  table.list tr:last-child td { border-bottom: none; }
  table.list tr:hover td { background: rgba(58,127,189,0.03); cursor: pointer; }
  .num { font-family: var(--font-mono); font-size: .82rem; }
  .id-cell { font-family: var(--font-mono); font-size: .76rem; color: var(--rr-slate-dark); }

  .pill { font-size: .66rem; font-weight: 600; padding: 3px 10px; border-radius: 999px; letter-spacing: .06em; text-transform: uppercase; display: inline-block; }
  .pill-paid     { background: #E8F5EE; color: #2A7D4F; }
  .pill-issued   { background: #D9EAF5; color: #2E6494; }
  .pill-partial  { background: #FDF3E5; color: #B45309; }
  .pill-draft    { background: #F5F2EC; color: #4A5568; }
  .pill-void     { background: #F8E5E8; color: #9B2335; }
  .pill-overdue  { background: #F8E5E8; color: #9B2335; }
  .pill-submitted{ background: #D9EAF5; color: #2E6494; }
  .pill-adjudicated { background: #FDF3E5; color: #B45309; }

  .aging-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .aging-cell { border: 1px solid var(--rr-parchment); border-radius: 6px; padding: 14px 16px; }
  .aging-label { font-family: var(--font-ui); font-size: .68rem; color: var(--rr-slate-dark); letter-spacing: .08em; text-transform: uppercase; }
  .aging-amount { font-family: var(--font-mono); font-size: 1.2rem; font-weight: 600; color: var(--rr-navy-800); margin-top: 4px; }
  .aging-bar-track { height: 4px; background: var(--rr-parchment); border-radius: 999px; margin-top: 10px; overflow: hidden; }
  .aging-bar-fill { height: 100%; background: var(--rr-steel-500); }
  .aging-cell.warn .aging-bar-fill { background: #B45309; }
  .aging-cell.danger .aging-bar-fill { background: #9B2335; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="TopBar.jsx"></script>
<script type="text/babel" src="KpiTile.jsx"></script>
<script type="text/babel" src="StatusPill.jsx"></script>

<script type="text/babel">
window.RRD.requireSession?.();
const fmt = new Intl.NumberFormat('en-CA', { style: 'currency', currency: 'CAD' });

const INVOICES = [
  { id: 'INV-2026-0418', patient: 'Alice Stevens',   created: '2026-04-30', subtotal: 580.00, gst: 29.00, total: 609.00, balance:   0.00, status: 'paid',    insurance: 'Alberta Blue Cross' },
  { id: 'INV-2026-0417', patient: 'Priya Khanna',    created: '2026-04-30', subtotal: 925.00, gst: 46.25, total: 971.25, balance: 314.10, status: 'partial', insurance: 'Manulife'           },
  { id: 'INV-2026-0416', patient: 'Sofía Castillo',  created: '2026-04-29', subtotal: 285.00, gst: 14.25, total: 299.25, balance: 299.25, status: 'issued',  insurance: 'Alberta Health'     },
  { id: 'INV-2026-0414', patient: 'Marcus Doan',     created: '2026-04-28', subtotal: 145.00, gst:  7.25, total: 152.25, balance:   0.00, status: 'paid',    insurance: 'Sun Life'           },
  { id: 'INV-2026-0413', patient: 'Eli Brouwer',     created: '2026-04-26', subtotal:  85.00, gst:  4.25, total:  89.25, balance:  89.25, status: 'overdue', insurance: 'Canada Life'        },
  { id: 'INV-2026-0411', patient: 'Daniel Okafor',   created: '2026-04-22', subtotal: 240.00, gst: 12.00, total: 252.00, balance: 252.00, status: 'overdue', insurance: 'Pacific Blue Cross' },
  { id: 'INV-2026-0410', patient: 'Rae Tomlinson',   created: '2026-04-21', subtotal: 312.00, gst: 15.60, total: 327.60, balance:   0.00, status: 'paid',    insurance: 'Alberta Blue Cross' },
  { id: 'INV-2026-0408', patient: 'Yuki Tanaka',     created: '2026-04-20', subtotal: 175.00, gst:  8.75, total: 183.75, balance:   0.00, status: 'draft',   insurance: 'Self pay'           },
];

const CLAIMS = [
  { id: 'CLM-9831', invoice: 'INV-2026-0417', carrier: 'Manulife',           kind: 'predetermination', status: 'submitted',   submitted: '2026-04-30', accepted: null,   codes: [] },
  { id: 'CLM-9826', invoice: 'INV-2026-0416', carrier: 'Alberta Health',     kind: 'standard',         status: 'adjudicated', submitted: '2026-04-29', accepted: 220.00, codes: ['E04', 'I02'] },
  { id: 'CLM-9821', invoice: 'INV-2026-0413', carrier: 'Canada Life',        kind: 'standard',         status: 'paid',        submitted: '2026-04-26', accepted:  72.40, codes: [] },
  { id: 'CLM-9818', invoice: 'INV-2026-0411', carrier: 'Pacific Blue Cross', kind: 'standard',         status: 'submitted',   submitted: '2026-04-23', accepted: null,   codes: [] },
  { id: 'CLM-9810', invoice: 'INV-2026-0410', carrier: 'Alberta Blue Cross', kind: 'standard',         status: 'paid',        submitted: '2026-04-21', accepted: 261.00, codes: [] },
];

const STATUS_PILL = {
  paid: 'pill pill-paid',
  issued: 'pill pill-issued',
  partial: 'pill pill-partial',
  draft: 'pill pill-draft',
  void: 'pill pill-void',
  overdue: 'pill pill-overdue',
  submitted: 'pill pill-submitted',
  adjudicated: 'pill pill-adjudicated',
};

const FILTERS = ['All', 'Issued', 'Partial', 'Paid', 'Overdue', 'Draft'];

const BillingPage = () => {
  const [filter, setFilter] = React.useState('All');
  const [query, setQuery] = React.useState('');

  const rows = INVOICES.filter(i => {
    if (filter !== 'All' && i.status !== filter.toLowerCase()) return false;
    if (query && !`${i.id} ${i.patient} ${i.insurance}`.toLowerCase().includes(query.toLowerCase())) return false;
    return true;
  });

  const outstanding = INVOICES.filter(i => i.status === 'issued' || i.status === 'partial' || i.status === 'overdue').reduce((s, i) => s + i.balance, 0);
  const overdue = INVOICES.filter(i => i.status === 'overdue').reduce((s, i) => s + i.balance, 0);
  const collected30 = INVOICES.filter(i => i.status === 'paid').reduce((s, i) => s + i.total, 0);

  return (
    <div className="shell">
      <Sidebar active="billing" />
      <div className="stage">
        <TopBar clinicName="Oak Dental · Calgary" breadcrumb={['Billing', 'Invoices']} />
        <div className="body">
          <div className="page-header">
            <div>
              <h1 className="page-title">Billing</h1>
              <div className="page-sub">{fmt.format(outstanding)} outstanding · {INVOICES.length} invoices · 5 active claims · 1 overdue</div>
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button className="btn btn-ghost btn-md">Export ledger</button>
              <button className="btn btn-ghost btn-md">+ New claim</button>
              <button className="btn btn-primary btn-md">+ New invoice</button>
            </div>
          </div>

          <div className="kpi-row">
            <KpiTile label="Outstanding"    value={fmt.format(outstanding)} delta="– 4.1%"  trend="up"   accent="steel" />
            <KpiTile label="Overdue 30+"    value={fmt.format(overdue)}     delta="+ 12%"   trend="down" accent="navy"  />
            <KpiTile label="Collected · 30d"value={fmt.format(collected30)} delta="+ 8.4%"  trend="up"   accent="steel" />
            <KpiTile label="Claims · open"  value="3"                       delta="– 2"     trend="up"   accent="steel" />
          </div>

          <div className="panel">
            <div className="panel-header">
              <div>
                <div className="panel-h-title">Accounts receivable · aging</div>
                <div className="panel-h-sub">Balance owed by bucket · across all carriers and self-pay</div>
              </div>
              <a className="panel-h-action" href="reports.html">View AR report →</a>
            </div>
            <div className="aging-grid">
              {[
                { label: 'Current', amount: 4860.20, pct: 60, kind: '' },
                { label: '1–30 days', amount: 1245.50, pct: 35, kind: '' },
                { label: '31–60 days', amount: 612.10, pct: 22, kind: 'warn' },
                { label: '61–90 days', amount: 341.25, pct: 12, kind: 'warn' },
                { label: '90+ days', amount: 252.00, pct: 8, kind: 'danger' },
              ].map(b => (
                <div key={b.label} className={`aging-cell ${b.kind}`}>
                  <div className="aging-label">{b.label}</div>
                  <div className="aging-amount">{fmt.format(b.amount)}</div>
                  <div className="aging-bar-track"><div className="aging-bar-fill" style={{ width: `${b.pct}%` }} /></div>
                </div>
              ))}
            </div>
          </div>

          <div className="panel">
            <div className="panel-header">
              <div>
                <div className="panel-h-title">Invoices</div>
                <div className="panel-h-sub">Showing {rows.length} of {INVOICES.length}</div>
              </div>
              <a className="panel-h-action" href="billing.html">Open in editor →</a>
            </div>
            <div className="toolbar" style={{ marginBottom: 16 }}>
              <input type="search" placeholder="Search by invoice #, patient, or carrier…" value={query} onChange={e => setQuery(e.target.value)} />
              {FILTERS.map(f => (
                <button key={f} className={`filter-pill${filter === f ? ' active' : ''}`} onClick={() => setFilter(f)}>{f}</button>
              ))}
            </div>
            <table className="list">
              <thead>
                <tr>
                  <th>Invoice #</th>
                  <th>Patient</th>
                  <th>Insurance</th>
                  <th>Created</th>
                  <th style={{ textAlign: 'right' }}>Total</th>
                  <th style={{ textAlign: 'right' }}>Balance</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                {rows.map(i => (
                  <tr key={i.id} style={{ cursor: 'pointer' }} onClick={() => { window.location = `invoice-detail.html?id=${i.id}`; }}>
                    <td className="id-cell" style={{ color: '#3A7FBD', fontWeight: 600 }}>{i.id}</td>
                    <td style={{ fontWeight: 600, color: '#1C2333' }}>{i.patient}</td>
                    <td>{i.insurance}</td>
                    <td className="id-cell">{i.created}</td>
                    <td style={{ textAlign: 'right' }} className="num">{fmt.format(i.total)}</td>
                    <td style={{ textAlign: 'right', color: i.balance > 0 ? '#B45309' : '#4A5568' }} className="num">{fmt.format(i.balance)}</td>
                    <td><StatusPill kind="invoice" value={i.status} /></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 18, alignItems: 'flex-start' }}>
            <div className="panel">
              <div className="panel-header">
                <div>
                  <div className="panel-h-title">Insurance claims</div>
                  <div className="panel-h-sub">Last 14 days · Draft → Submitted → Adjudicated → Paid</div>
                </div>
                <a className="panel-h-action" href="billing.html">All claims →</a>
              </div>
              <table className="list">
                <thead>
                  <tr>
                    <th>Claim #</th>
                    <th>Invoice</th>
                    <th>Carrier</th>
                    <th>Kind</th>
                    <th>Submitted</th>
                    <th style={{ textAlign: 'right' }}>Accepted</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {CLAIMS.map(c => (
                    <tr key={c.id} style={{ cursor: 'pointer' }} onClick={() => { window.location = `invoice-detail.html?id=${c.invoice}#claim`; }}>
                      <td className="id-cell" style={{ color: '#3A7FBD', fontWeight: 600 }}>{c.id}</td>
                      <td className="id-cell">{c.invoice}</td>
                      <td>{c.carrier}</td>
                      <td style={{ color: '#4A5568' }}>{c.kind}</td>
                      <td className="id-cell">{c.submitted}</td>
                      <td style={{ textAlign: 'right' }} className="num">{c.accepted == null ? '—' : fmt.format(c.accepted)}</td>
                      <td><StatusPill kind="claim" value={c.status} /></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div className="panel">
              <div className="panel-header">
                <div>
                  <div className="panel-h-title">Adjudicate next claim</div>
                  <div className="panel-h-sub">CLM-9831 · Manulife · INV-2026-0417 · Priya Khanna</div>
                </div>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10, fontFamily: 'Inter, sans-serif', fontSize: '.85rem' }}>
                <label style={{ color: '#4A5568', fontSize: '.74rem', textTransform: 'uppercase', letterSpacing: '.08em', fontWeight: 600 }}>Outcome</label>
                <select style={{ height: 36, padding: '0 10px', border: '1px solid #EDE9E0', borderRadius: 4, color: '#1C2333' }}>
                  <option>Accepted in full</option>
                  <option>Accepted partial</option>
                  <option>Rejected — patient liability</option>
                  <option>Rejected — needs predetermination</option>
                </select>

                <label style={{ color: '#4A5568', fontSize: '.74rem', textTransform: 'uppercase', letterSpacing: '.08em', fontWeight: 600 }}>Accepted amount</label>
                <input type="text" defaultValue="$657.15" style={{ height: 36, padding: '0 10px', border: '1px solid #EDE9E0', borderRadius: 4, color: '#1C2333', fontFamily: "'JetBrains Mono', monospace" }} />

                <label style={{ color: '#4A5568', fontSize: '.74rem', textTransform: 'uppercase', letterSpacing: '.08em', fontWeight: 600 }}>Response codes</label>
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                  {['E04', 'I02', 'X11'].map(c => (
                    <span key={c} className="pill" style={{ background: '#F5F2EC', color: '#4A5568', fontFamily: "'JetBrains Mono', monospace", letterSpacing: 0, textTransform: 'none' }}>{c}</span>
                  ))}
                </div>

                <label style={{ color: '#4A5568', fontSize: '.74rem', textTransform: 'uppercase', letterSpacing: '.08em', fontWeight: 600 }}>Notes</label>
                <textarea rows="3" placeholder="Carrier remarks…" style={{ padding: 10, border: '1px solid #EDE9E0', borderRadius: 4, fontFamily: 'Inter, sans-serif', fontSize: '.85rem', color: '#1C2333', resize: 'vertical' }}></textarea>

                <div style={{ display: 'flex', gap: 8, marginTop: 6 }}>
                  <button className="btn btn-ghost btn-sm">Save draft</button>
                  <button className="btn btn-primary btn-sm">Save adjudication</button>
                </div>
              </div>
            </div>
          </div>

          <div style={{ textAlign: 'center', padding: '20px 0', fontFamily: "'Inter', sans-serif", fontSize: '.72rem', color: 'var(--rr-slate)', letterSpacing: '.06em' }}>
            ROCKYRIDGE · DENTAL AI · v1
          </div>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<BillingPage />);
</script>
</body>
</html>
