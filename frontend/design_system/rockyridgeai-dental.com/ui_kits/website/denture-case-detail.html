<!DOCTYPE html>
<html lang="en" class="">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Denture Case Detail · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<style>
  html, body { margin: 0; }
  body { background: var(--rr-warm-white); min-height: 100vh; }
  .shell { display: flex; min-height: 100vh; }
  .stage { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .stage > .body { padding: 28px 32px; display: flex; flex-direction: column; gap: 24px; }
  .panel { background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; padding: 22px 24px; box-shadow: var(--shadow-xs); }
  .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .panel-h-title { font-family: var(--font-display); font-weight: 700; font-size: 1.05rem; color: var(--rr-navy-800); }
  .panel-h-sub { font-family: var(--font-ui); font-size: .72rem; color: var(--rr-slate-dark); margin-top: 2px; }
  table.list { width: 100%; border-collapse: collapse; font-family: var(--font-ui); font-size: .85rem; }
  table.list th { text-align: left; padding: 10px 12px; color: var(--rr-slate-dark); font-size: .68rem; letter-spacing: .08em; text-transform: uppercase; border-bottom: 1px solid var(--rr-parchment); font-weight: 600; }
  table.list td { padding: 12px; border-bottom: 1px solid var(--rr-parchment); vertical-align: middle; }
  table.list tr:last-child td { border-bottom: none; }
  .num { font-family: var(--font-mono); font-size: .82rem; }
  .id-cell { font-family: var(--font-mono); font-size: .76rem; color: var(--rr-slate-dark); }
  .pill { font-size: .66rem; font-weight: 600; padding: 3px 10px; border-radius: 999px; letter-spacing: .06em; text-transform: uppercase; display: inline-block; }
  .pill-open   { background: #D9EAF5; color: #2E6494; }
  .pill-closed { background: #E8F5EE; color: #2A7D4F; }
  .stage-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .stage-chip { padding: 6px 14px; border-radius: 999px; border: 1px solid var(--rr-parchment); font-family: var(--font-ui); font-size: .76rem; font-weight: 500; color: var(--rr-slate-dark); background: #fff; }
  .stage-chip.current { background: hsl(var(--primary)); color: #fff; border-color: hsl(var(--primary)); font-weight: 600; }
  .stage-chip.done { background: #E8F5EE; color: #2A7D4F; border-color: #2A7D4F; }
  .detail-row { display: grid; grid-template-columns: 140px 1fr; gap: 14px; padding: 10px 0; border-bottom: 1px solid var(--rr-parchment); }
  .detail-row:last-child { border-bottom: none; }
  .detail-k { font-family: var(--font-ui); font-size: .72rem; font-weight: 600; color: var(--rr-slate-dark); letter-spacing: .04em; text-transform: uppercase; padding-top: 2px; }
  .detail-v { font-family: var(--font-ui); font-size: .9rem; color: var(--rr-ink); }
</style>
</head>
<body>
<div id="root"></div>
<script src="../../lib/query.js"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="TopBar.jsx"></script>
<script type="text/babel" src="EmptyState.jsx"></script>
<script type="text/babel">
window.RRD.requireSession?.();

const STAGES_COMPLETE = ['Impression','Try-in','Processing','Delivery','Follow-up'];
const STAGES_PARTIAL  = ['Impression','Try-in','Processing','Delivery','Implant placement','Abutment','Final restoration'];

const FALLBACK_DENTURE_CASES = [
  { id: 'DC-0018', arch: 'upper', case_type: 'complete', status: 'open', opened_at: '2026-04-20', current_stage: 'Processing',
    implants: [],
    notes: 'Patient has significant bone resorption. Requires extended try-in phase.',
    lab_cases: [{ id: 'LC-0041', case_number: 'LC-0041', status: 'in_progress', vendor: 'Calgary Dental Lab' }],
  },
  { id: 'DC-0019', arch: 'lower', case_type: 'implant_retained', status: 'open', opened_at: '2026-03-10', current_stage: 'Implant placement',
    implants: [
      { tooth_position: '33', vendor: 'Nobel Biocare', model: 'NobelActive 3.5', lot_number: 'NB-2025-0441', surface_treatment: 'TiUnite', abutment_type: 'Locator', placed_date: '2026-03-15' },
      { tooth_position: '43', vendor: 'Nobel Biocare', model: 'NobelActive 3.5', lot_number: 'NB-2025-0442', surface_treatment: 'TiUnite', abutment_type: 'Locator', placed_date: '2026-03-15' },
    ],
    notes: 'Two implants placed. Osseointegration check at 12 weeks.',
    lab_cases: [{ id: 'LC-0041', case_number: 'LC-0041', status: 'in_progress', vendor: 'Calgary Dental Lab' }],
  },
];

const PILL_STATUS = { open: 'pill-open', closed: 'pill-closed' };

const DentureCaseDetailPage = () => {
  const id = window.RRD.query('id');
  const collection = (typeof window.DENTURE_CASES !== 'undefined' && window.DENTURE_CASES) || FALLBACK_DENTURE_CASES;
  const dc = id ? window.RRD.findById(collection, id) : collection[0];

  if (!dc) return (
    <div className="shell">
      <Sidebar active="lab" />
      <div className="stage">
        <TopBar breadcrumb={['Lab','Not found']} />
        <div className="body"><EmptyState icon="clipboard-list" title="Denture case not found" sub="No denture case matches this ID." /></div>
      </div>
    </div>
  );

  const stages = dc.case_type === 'implant_retained' ? STAGES_PARTIAL : STAGES_COMPLETE;
  const currentIdx = stages.indexOf(dc.current_stage);

  return (
    <div className="shell">
      <Sidebar active="lab" />
      <div className="stage">
        <TopBar breadcrumb={['Lab', dc.id]} />
        <div className="body">
          {/* Header */}
          <div className="panel" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
            <div>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: '.76rem', color: 'var(--rr-slate-dark)', marginBottom: 4 }}>{dc.id}</div>
              <div style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: '1.5rem', color: 'var(--rr-navy-800)', letterSpacing: '-.025em', textTransform: 'capitalize' }}>
                {dc.arch} · {dc.case_type.replace(/_/g, ' ')}
              </div>
              <div style={{ display: 'flex', gap: 10, alignItems: 'center', marginTop: 6, flexWrap: 'wrap' }}>
                <span className={`pill ${PILL_STATUS[dc.status]}`}>{dc.status}</span>
                <span style={{ fontFamily: 'var(--font-ui)', fontSize: '.82rem', color: 'var(--rr-slate-dark)' }}>Opened {dc.opened_at}</span>
              </div>
            </div>
          </div>

          {/* Stage progression */}
          <div className="panel">
            <div className="panel-header"><div className="panel-h-title">Stage progression</div></div>
            <div className="stage-chips">
              {stages.map((s, i) => (
                <span key={s} className={`stage-chip${i < currentIdx ? ' done' : i === currentIdx ? ' current' : ''}`}>{s}</span>
              ))}
            </div>
          </div>

          {/* Implants */}
          {dc.implants?.length > 0 && (
            <div className="panel">
              <div className="panel-header"><div className="panel-h-title">Implants</div></div>
              <table className="list">
                <thead><tr><th>Tooth</th><th>Vendor</th><th>Model</th><th>Lot #</th><th>Surface</th><th>Abutment</th><th>Placed</th></tr></thead>
                <tbody>
                  {dc.implants.map((imp, i) => (
                    <tr key={i}>
                      <td className="id-cell">{imp.tooth_position}</td>
                      <td>{imp.vendor}</td>
                      <td>{imp.model}</td>
                      <td className="id-cell">{imp.lot_number}</td>
                      <td>{imp.surface_treatment}</td>
                      <td>{imp.abutment_type}</td>
                      <td className="id-cell">{imp.placed_date}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* Notes */}
          <div className="panel">
            <div className="panel-header"><div className="panel-h-title">Notes</div></div>
            <p style={{ fontFamily: 'var(--font-ui)', fontSize: '.9rem', color: 'var(--rr-ink)', margin: 0, lineHeight: 1.6 }}>{dc.notes || 'No notes recorded.'}</p>
          </div>

          {/* Related lab cases */}
          <div className="panel">
            <div className="panel-header"><div className="panel-h-title">Related lab cases</div></div>
            <table className="list">
              <thead><tr><th>Case #</th><th>Vendor</th><th>Status</th></tr></thead>
              <tbody>
                {(dc.lab_cases || []).map(lc => (
                  <tr key={lc.id}>
                    <td><a href={`lab-case-detail.html?id=${lc.id}`} className="id-cell" style={{ color: 'hsl(var(--primary))' }}>{lc.case_number}</a></td>
                    <td>{lc.vendor}</td>
                    <td><span className="pill" style={{ background: '#FDF3E5', color: '#B45309' }}>{lc.status.replace('_', ' ')}</span></td>
                  </tr>
                ))}
                {!(dc.lab_cases?.length) && <tr><td colSpan={3} style={{ textAlign: 'center', color: 'var(--rr-slate-dark)', padding: 20 }}>No lab cases linked.</td></tr>}
              </tbody>
            </table>
          </div>

          <div style={{ textAlign: 'center', padding: '20px 0', fontFamily: "'Inter', sans-serif", fontSize: '.72rem', color: 'var(--rr-slate)', letterSpacing: '.06em' }}>
            ROCKYRIDGE · DENTAL AI · v1
          </div>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<DentureCaseDetailPage />);
</script>
</body>
</html>
