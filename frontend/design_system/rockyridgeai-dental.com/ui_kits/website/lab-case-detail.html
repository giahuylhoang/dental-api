<!DOCTYPE html>
<html lang="en" class="">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lab Case Detail · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<style>
  html, body { margin: 0; }
  body { background: var(--rr-warm-white); min-height: 100vh; }
  .shell { display: flex; min-height: 100vh; }
  .stage { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .stage > .body { padding: 28px 32px; display: flex; flex-direction: column; gap: 24px; }
  .panel { background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; padding: 22px 24px; box-shadow: var(--shadow-xs); }
  .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .panel-h-title { font-family: var(--font-display); font-weight: 700; font-size: 1.05rem; color: var(--rr-navy-800); }
  .panel-h-sub { font-family: var(--font-ui); font-size: .72rem; color: var(--rr-slate-dark); margin-top: 2px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  table.list { width: 100%; border-collapse: collapse; font-family: var(--font-ui); font-size: .85rem; }
  table.list th { text-align: left; padding: 10px 12px; color: var(--rr-slate-dark); font-size: .68rem; letter-spacing: .08em; text-transform: uppercase; border-bottom: 1px solid var(--rr-parchment); font-weight: 600; }
  table.list td { padding: 12px; border-bottom: 1px solid var(--rr-parchment); vertical-align: middle; }
  table.list tr:last-child td { border-bottom: none; }
  .num { font-family: var(--font-mono); font-size: .82rem; }
  .id-cell { font-family: var(--font-mono); font-size: .76rem; color: var(--rr-slate-dark); }
  .pill { font-size: .66rem; font-weight: 600; padding: 3px 10px; border-radius: 999px; letter-spacing: .06em; text-transform: uppercase; display: inline-block; }
  .pill-draft       { background: #F5F2EC; color: #4A5568; }
  .pill-sent        { background: #D9EAF5; color: #2E6494; }
  .pill-in_progress { background: #FDF3E5; color: #B45309; }
  .pill-returned    { background: #E8F5EE; color: #2A7D4F; }
  .pill-remake      { background: #F8E5E8; color: #9B2335; }
  .pill-cancelled   { background: #F8E5E8; color: #9B2335; }
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .tl-row { display: flex; gap: 14px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--rr-parchment); }
  .tl-row:last-child { border-bottom: none; }
  .tl-dot { width: 10px; height: 10px; border-radius: 999px; background: hsl(var(--primary)); margin-top: 5px; flex-shrink: 0; }
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .photo-cell { border: 1px dashed var(--rr-parchment); border-radius: 6px; height: 100px; display: flex; align-items: center; justify-content: center; font-family: var(--font-ui); font-size: .72rem; color: var(--rr-slate-dark); }
</style>
</head>
<body>
<div id="root"></div>
<script src="../../lib/query.js"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="TopBar.jsx"></script>
<script type="text/babel" src="EmptyState.jsx"></script>
<script type="text/babel">
window.RRD.requireSession?.();

const fmt = new Intl.NumberFormat('en-CA', { style: 'currency', currency: 'CAD' });

const FALLBACK_LAB_CASES = [
  { id: 'LC-0041', case_number: 'LC-0041', status: 'in_progress', vendor: 'Calgary Dental Lab', sent_at: '2026-04-28', due_back_at: '2026-05-07', returned_at: null, lab_fee: 420.00, courier_tracking: 'TRK-88421-CA',
    events: [
      { stage: 'Created',     occurred_at: '2026-04-27 09:00', note: 'Case opened by Dr. Hau Le' },
      { stage: 'Sent to lab', occurred_at: '2026-04-28 14:00', note: 'Courier pickup confirmed' },
      { stage: 'In progress', occurred_at: '2026-04-29 10:30', note: 'Lab acknowledged receipt' },
    ],
    materials: [
      { item: 'Acrylic resin — pink', lot: 'LOT-2024-AR-09', qty: 2, unit_cost: 18.00 },
      { item: 'Denture teeth set',    lot: 'LOT-2025-DT-14', qty: 1, unit_cost: 85.00 },
    ],
    photos: [],
  },
];

const PILL_CLASS = { draft: 'pill-draft', sent: 'pill-sent', in_progress: 'pill-in_progress', returned: 'pill-returned', remake: 'pill-remake', cancelled: 'pill-cancelled' };

const LabCaseDetailPage = () => {
  const id = window.RRD.query('id');
  const collection = (typeof window.LAB_CASES !== 'undefined' && window.LAB_CASES) || FALLBACK_LAB_CASES;
  const lc = id ? window.RRD.findById(collection, id) : collection[0];

  if (!lc) return (
    <div className="shell">
      <Sidebar active="lab" />
      <div className="stage">
        <TopBar breadcrumb={['Lab','Not found']} />
        <div className="body"><EmptyState icon="flask-conical" title="Lab case not found" sub="No lab case matches this ID." /></div>
      </div>
    </div>
  );

  return (
    <div className="shell">
      <Sidebar active="lab" />
      <div className="stage">
        <TopBar breadcrumb={['Lab', lc.case_number]} />
        <div className="body">
          {/* Header */}
          <div className="panel" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
            <div>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: '.76rem', color: 'var(--rr-slate-dark)', marginBottom: 4 }}>{lc.case_number}</div>
              <div style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: '1.5rem', color: 'var(--rr-navy-800)', letterSpacing: '-.025em' }}>{lc.vendor}</div>
              <div style={{ display: 'flex', gap: 10, alignItems: 'center', marginTop: 6, flexWrap: 'wrap' }}>
                <span className={`pill ${PILL_CLASS[lc.status]}`}>{lc.status.replace('_', ' ')}</span>
                <span style={{ fontFamily: 'var(--font-ui)', fontSize: '.82rem', color: 'var(--rr-slate-dark)' }}>Sent {lc.sent_at} · Due {lc.due_back_at}</span>
                {lc.returned_at && <span style={{ fontFamily: 'var(--font-ui)', fontSize: '.82rem', color: 'var(--rr-slate-dark)' }}>Returned {lc.returned_at}</span>}
                <span className="num">{fmt.format(lc.lab_fee)}</span>
                <span className="id-cell">{lc.courier_tracking}</span>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn btn-ghost btn-sm">Mark sent</button>
              <button className="btn btn-ghost btn-sm">Mark returned</button>
              <button className="btn btn-ghost btn-sm">Open remake</button>
            </div>
          </div>

          <div className="grid-2">
            {/* Stage timeline */}
            <div className="panel">
              <div className="panel-header"><div className="panel-h-title">Stage timeline</div></div>
              <div className="timeline">
                {lc.events.map((e, i) => (
                  <div key={i} className="tl-row">
                    <div className="tl-dot" />
                    <div>
                      <div style={{ fontFamily: 'var(--font-ui)', fontWeight: 600, fontSize: '.88rem', color: 'var(--rr-navy-800)' }}>{e.stage}</div>
                      <div style={{ fontFamily: 'var(--font-ui)', fontSize: '.76rem', color: 'var(--rr-slate-dark)', marginTop: 2 }}>{e.note}</div>
                      <div className="id-cell" style={{ marginTop: 2 }}>{e.occurred_at}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Materials */}
            <div className="panel">
              <div className="panel-header"><div className="panel-h-title">Materials</div></div>
              <table className="list">
                <thead><tr><th>Item</th><th>Lot</th><th>Qty</th><th>Unit cost</th></tr></thead>
                <tbody>
                  {lc.materials.map((m, i) => (
                    <tr key={i}>
                      <td>{m.item}</td>
                      <td className="id-cell">{m.lot}</td>
                      <td className="num">{m.qty}</td>
                      <td className="num">{fmt.format(m.unit_cost)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* Photos */}
          <div className="panel">
            <div className="panel-header"><div className="panel-h-title">Photos</div></div>
            {lc.photos?.length > 0 ? (
              <div className="photo-grid">
                {lc.photos.map((p, i) => <img key={i} src={p} style={{ borderRadius: 6, width: '100%', height: 100, objectFit: 'cover' }} />)}
              </div>
            ) : (
              <div className="photo-grid">
                {[1,2,3].map(i => <div key={i} className="photo-cell">No image</div>)}
              </div>
            )}
          </div>

          <div style={{ textAlign: 'center', padding: '20px 0', fontFamily: "'Inter', sans-serif", fontSize: '.72rem', color: 'var(--rr-slate)', letterSpacing: '.06em' }}>
            ROCKYRIDGE · DENTAL AI · v1
          </div>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<LabCaseDetailPage />);
</script>
</body>
</html>
