<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Schedule · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="../../lib/console-tap.js"></script>
<style>
  html, body { margin: 0; }
  body { background: var(--rr-warm-white); min-height: 100vh; }
  .shell { display: flex; min-height: 100vh; }
  .stage { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .stage > .body { padding: 24px 28px; display: flex; flex-direction: column; gap: 18px; max-width: 1280px; margin: 0 auto; width: 100%; box-sizing: border-box; }
  .page-header { display: flex; justify-content: space-between; align-items: flex-end; }
  .page-title { font-family: var(--font-display); font-weight: 800; font-size: 1.8rem; color: var(--rr-navy-800); letter-spacing: -.025em; margin: 0 0 4px; }
  .page-sub   { font-family: var(--font-ui); font-size: .88rem; color: var(--rr-slate-dark); }
  .panel { background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; box-shadow: var(--shadow-xs); }
  .day-toolbar { display: flex; gap: 12px; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--rr-parchment); }
  .nav-btn { width: 32px; height: 32px; border-radius: 4px; border: 1px solid var(--rr-parchment); background: #fff; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; color: var(--rr-slate-dark); }
  .day-label { font-family: var(--font-display); font-weight: 700; font-size: 1rem; color: var(--rr-navy-800); margin: 0 6px; }
  .day-pills { display: inline-flex; gap: 6px; margin-left: 14px; }
  .day-pill {
    height: 32px; padding: 0 12px; border-radius: 4px; border: 1px solid var(--rr-parchment); background: #fff; cursor: pointer;
    font-family: var(--font-ui); font-size: .78rem; color: var(--rr-slate-dark);
  }
  .day-pill.active { background: var(--rr-navy-800); color: #fff; border-color: var(--rr-navy-800); font-weight: 600; }
  .grid-wrap { padding: 14px 18px 22px; }
  .schedule-grid {
    display: grid; gap: 1px; background: #EDE9E0; border: 1px solid #EDE9E0; border-radius: 4px; overflow: hidden;
  }
  .schedule-grid > .cell { background: #fff; min-height: 36px; padding: 4px 6px; position: relative; }
  .col-head { background: var(--rr-warm-white); padding: 10px 12px; font-family: var(--font-ui); font-size: .72rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--rr-slate-dark); }
  .time-col { background: var(--rr-warm-white); padding: 4px 10px; font-family: var(--font-mono); font-size: .7rem; color: var(--rr-slate-dark); display: flex; align-items: flex-start; }
  .appt-block {
    position: absolute; left: 4px; right: 4px; border-radius: 4px; padding: 6px 8px;
    box-shadow: 0 1px 2px rgba(10,25,47,0.08); cursor: pointer; overflow: hidden;
    transition: transform 200ms cubic-bezier(0.16,1,0.3,1);
  }
  .appt-block:hover { transform: translateY(-1px); }
  .appt-block .t { font-family: var(--font-mono); font-size: .68rem; opacity: .8; }
  .appt-block .p { font-family: var(--font-ui); font-weight: 600; font-size: .82rem; line-height: 1.2; margin-top: 2px; }
  .appt-block .k { font-family: var(--font-ui); font-size: .72rem; opacity: .82; margin-top: 2px; }
  .now-line { position: absolute; left: 0; right: 0; height: 2px; background: #9B2335; z-index: 5; }
  .now-line::before { content: ''; position: absolute; left: -5px; top: -3px; width: 8px; height: 8px; border-radius: 999px; background: #9B2335; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; padding: 14px 18px; border-top: 1px solid var(--rr-parchment); font-family: var(--font-ui); font-size: .74rem; color: var(--rr-slate-dark); }
  .legend .sw { width: 12px; height: 12px; border-radius: 3px; display: inline-block; margin-right: 6px; vertical-align: middle; }
  .side-panel { display: flex; flex-direction: column; gap: 14px; }
  .panel-pad { padding: 18px 20px; }
  .panel-h-title { font-family: var(--font-display); font-weight: 700; font-size: 1rem; color: var(--rr-navy-800); margin-bottom: 4px; }
  .panel-h-sub { font-family: var(--font-ui); font-size: .72rem; color: var(--rr-slate-dark); margin-bottom: 14px; }
  .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--rr-parchment); font-family: var(--font-ui); font-size: .82rem; color: var(--rr-ink); }
  .row:last-child { border: none; }
  .toast-ctr { position: fixed; bottom: 24px; right: 24px; z-index: 100; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
  .toast-msg { background: var(--rr-navy-800); color: var(--rr-warm-white); padding: 12px 18px; border-radius: 6px; font-family: var(--font-ui); font-size: .85rem; box-shadow: 0 4px 16px rgba(10,25,47,0.22); pointer-events: auto; animation: toast-in 240ms cubic-bezier(0.16,1,0.3,1); max-width: 380px; }
  @keyframes toast-in { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>

<script src="../../lib/query.js"></script>
<script src="../../lib/auth.js"></script>
<script src="../../data/clinics.js"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="TopBar.jsx"></script>

<script src="../../data/appointments.js"></script>

<script type="text/babel">
window.RRD.requireSession?.();
const PROVIDERS = [
  { id: '1', name: 'Dr Hau Le',   color: '#3A7FBD', bg: '#D9EAF5' },
  { id: '2', name: 'Dr Sara Lim', color: '#2E6494', bg: '#A8CCE8' },
  { id: '3', name: 'Hyg. Renu',   color: '#B45309', bg: '#FDF3E5' },
];

// op = chair number → column
const OPS = ['Op 1', 'Op 2', 'Op 3', 'Op 4'];
const HOURS = ['08:00','08:30','09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00'];

const STATUS_BG = {
  confirmed: { bg: '#D9EAF5', border: '#3A7FBD', fg: '#0A192F' },
  pending:   { bg: '#FDF3E5', border: '#B45309', fg: '#7C3F0A' },
  no_show:   { bg: '#F8E5E8', border: '#9B2335', fg: '#5C1620' },
  completed: { bg: '#F5F2EC', border: '#8A9BB0', fg: '#4A5568' },
};

// Convert HH:MM → row index in HOURS (each row = 30 min)
const timeToRow = t => HOURS.indexOf(t);

const SchedulePage = () => {
  const [activeDay, setActiveDay] = React.useState('Sat');
  const [toasts, setToasts] = React.useState([]);
  const addToast = (msg) => { const id = Date.now(); setToasts(t => [...t, {id, msg}]); setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000); };

  return (
    <>
    <div className="shell">
      <Sidebar active="schedule" />
      <div className="stage">
        <TopBar clinicName="Oak Dental · Calgary" breadcrumb={['Schedule', 'Saturday · May 4']} />
        <div className="body">
          <div className="page-header">
            <div>
              <h1 className="page-title">Schedule</h1>
              <div className="page-sub">Saturday · May 4 · 2026 — 8 appointments · 6 confirmed · 1 pending · 1 no-show</div>
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button className="btn btn-ghost btn-md" onClick={() => addToast('Jumped to today.')}>Today</button>
              <button className="btn btn-ghost btn-md" onClick={() => addToast('Day schedule printed.')}>Print day</button>
              <button className="btn btn-primary btn-md" onClick={() => addToast('Booking drawer would open here.')}>+ Book appointment</button>
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 320px', gap: 18, alignItems: 'flex-start' }}>
            <div className="panel">
              <div className="day-toolbar">
                <button className="nav-btn">‹</button>
                <span className="day-label">May 4 · Saturday</span>
                <button className="nav-btn">›</button>
                <div className="day-pills">
                  {['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d => (
                    <button key={d} className={`day-pill${d === activeDay ? ' active' : ''}`} onClick={() => setActiveDay(d)}>{d}</button>
                  ))}
                </div>
                <div style={{ marginLeft: 'auto', display: 'flex', gap: 8, alignItems: 'center' }}>
                  <span style={{ fontFamily: "'Inter', sans-serif", fontSize: '.74rem', color: '#4A5568' }}>Provider</span>
                  <select style={{ height: 32, borderRadius: 4, border: '1px solid #EDE9E0', padding: '0 10px', fontSize: '.78rem', color: '#1C2333', background: '#fff' }}>
                    <option>All providers</option>
                    {PROVIDERS.map(p => <option key={p.id}>{p.name}</option>)}
                  </select>
                </div>
              </div>

              <div className="grid-wrap">
                <div className="schedule-grid" style={{ gridTemplateColumns: '64px repeat(4, 1fr)' }}>
                  <div className="col-head">Time</div>
                  {OPS.map(o => <div key={o} className="col-head">{o}</div>)}

                  {HOURS.map((h, hi) => (
                    <React.Fragment key={h}>
                      <div className="time-col">{h}</div>
                      {OPS.map((op, oi) => {
                        const chair = String(oi + 1);
                        const appts = window.APPOINTMENTS.filter(a => a.chair === chair && a.time === h);
                        return (
                          <div key={op + h} className="cell">
                            {appts.map(a => {
                              const rows = Math.max(1, Math.round(a.duration / 30));
                              const tone = STATUS_BG[a.status] || STATUS_BG.confirmed;
                              const provider = PROVIDERS.find(p => a.provider.startsWith(p.name.split(' ')[0])) || PROVIDERS[0];
                              return (
                                <a key={a.id} href={`appointment-detail.html?id=${a.id}`} className="appt-block row-link" style={{
                                  top: 4, height: rows * 36 - 8,
                                  background: tone.bg, border: `1px solid ${tone.border}`, color: tone.fg,
                                  borderLeft: `3px solid ${provider.color}`,
                                  textDecoration: 'none', display: 'block',
                                }}>
                                  <div className="t">{a.time} · {a.duration}m</div>
                                  <div className="p">{a.patient}</div>
                                  <div className="k">{a.kind}</div>
                                </a>
                              );
                            })}
                            {hi === 6 && oi === 0 && <div className="now-line" style={{ top: 18 }} />}
                          </div>
                        );
                      })}
                    </React.Fragment>
                  ))}
                </div>
              </div>

              <div className="legend">
                <span><span className="sw" style={{ background: '#D9EAF5', border: '1px solid #3A7FBD' }} /> Confirmed</span>
                <span><span className="sw" style={{ background: '#FDF3E5', border: '1px solid #B45309' }} /> Pending</span>
                <span><span className="sw" style={{ background: '#F8E5E8', border: '1px solid #9B2335' }} /> No-show</span>
                <span><span className="sw" style={{ background: '#F5F2EC', border: '1px solid #8A9BB0' }} /> Completed</span>
                <span style={{ marginLeft: 'auto', color: '#9B2335', fontWeight: 600 }}>● Now · 11:09</span>
              </div>
            </div>

            <div className="side-panel">
              <div className="panel panel-pad">
                <div className="panel-h-title">Providers today</div>
                <div className="panel-h-sub">Working hours · current load</div>
                {PROVIDERS.map(p => {
                  const load = window.APPOINTMENTS.filter(a => a.provider.startsWith(p.name.split(' ')[0])).length;
                  return (
                    <div key={p.id} className="row">
                      <a href="settings.html#providers" style={{ display: 'inline-flex', alignItems: 'center', gap: 10, textDecoration: 'none', color: 'inherit' }}>
                        <span style={{ width: 10, height: 10, borderRadius: 999, background: p.color }} />
                        {p.name}
                      </a>
                      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '.78rem', color: '#1C2333' }}>{load} appts</span>
                    </div>
                  );
                })}
              </div>

              <div className="panel panel-pad">
                <div className="panel-h-title">Open slots</div>
                <div className="panel-h-sub">Next 90 minutes · book in one click</div>
                {[
                  { t: '11:30', op: 'Op 2', dur: '30m' },
                  { t: '12:00', op: 'Op 3', dur: '60m' },
                  { t: '12:30', op: 'Op 1', dur: '30m' },
                  { t: '13:00', op: 'Op 4', dur: '90m' },
                ].map(s => (
                  <div key={s.t + s.op} className="row">
                    <span>
                      <span style={{ fontFamily: "'JetBrains Mono', monospace", color: '#0A192F', fontWeight: 600 }}>{s.t}</span>
                      <span style={{ marginLeft: 10, color: '#4A5568' }}>{s.op} · {s.dur}</span>
                    </span>
                    <button className="btn btn-ghost btn-sm" onClick={() => addToast(`Booking started for ${s.op} at ${s.t}.`)}>Book</button>
                  </div>
                ))}
              </div>

              <div className="panel panel-pad">
                <div className="panel-h-title">Waitlist</div>
                <div className="panel-h-sub">Patients ready for a sooner slot</div>
                {[
                  { name: 'Rae Tomlinson',  reason: 'Crown seat' },
                  { name: 'Dimitri Voss',   reason: 'Hygiene'    },
                  { name: 'Yuki Tanaka',    reason: 'Recall'     },
                ].map(w => (
                  <div key={w.name} className="row">
                    <span>{w.name}<span style={{ color: '#8A9BB0', marginLeft: 8, fontSize: '.72rem' }}>{w.reason}</span></span>
                    <button className="btn btn-ghost btn-sm" onClick={() => addToast(`Slot offered to ${w.name}.`)}>Offer</button>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div style={{ textAlign: 'center', padding: '20px 0', fontFamily: "'Inter', sans-serif", fontSize: '.72rem', color: 'var(--rr-slate)', letterSpacing: '.06em' }}>
            ROCKYRIDGE · DENTAL AI · v1
          </div>
        </div>
      </div>
    </div>
    {toasts.length > 0 && (
      <div className="toast-ctr">
        {toasts.map(t => <div key={t.id} className="toast-msg">{t.msg}</div>)}
      </div>
    )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<SchedulePage />);

// console-tap render beacon — deferred so React 18 mount completes
setTimeout(function () {
  try {
    var root = document.getElementById('root');
    var rootChildren = root ? root.children.length : -1;
    var firstTag = (root && root.firstElementChild) ? root.firstElementChild.tagName : null;
    var bodyBg = getComputedStyle(document.body).backgroundColor;
    fetch('/__log__', { method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ kind: 'render-reached', url: location.pathname,
        rootChildren: rootChildren, firstTag: firstTag, bodyBg: bodyBg,
        title: document.title, readyState: document.readyState }) });
  } catch(_){}
}, 250);

</script>
</body>
</html>
