<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lab · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="../../lib/console-tap.js"></script>
<style>
  html, body { margin: 0; }
  body { background: var(--rr-warm-white); min-height: 100vh; }
  .shell { display: flex; min-height: 100vh; }
  .stage { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .stage > .body { padding: 28px 32px; display: flex; flex-direction: column; gap: 24px; max-width: 1280px; margin: 0 auto; width: 100%; box-sizing: border-box; }
  .page-header { display: flex; justify-content: space-between; align-items: center; }
  .page-title { font-family: var(--font-display); font-weight: 800; font-size: 1.8rem; color: var(--rr-navy-800); letter-spacing: -.025em; margin: 0 0 4px; }
  .page-sub { font-family: var(--font-ui); font-size: .88rem; color: var(--rr-slate-dark); }
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .panel { background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; padding: 22px 24px; box-shadow: var(--shadow-xs); }
  .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .panel-h-title { font-family: var(--font-display); font-weight: 700; font-size: 1.05rem; color: var(--rr-navy-800); }
  .panel-h-sub { font-family: var(--font-ui); font-size: .72rem; color: var(--rr-slate-dark); margin-top: 2px; }
  .panel-h-action { font-family: var(--font-ui); font-size: .82rem; color: hsl(var(--primary)); text-decoration: none; cursor: pointer; }

  .vendor-card { border: 1px solid var(--rr-parchment); border-radius: 6px; padding: 16px 18px; display: flex; flex-direction: column; gap: 8px; }
  .vendor-name { font-family: var(--font-display); font-weight: 700; font-size: .95rem; color: var(--rr-navy-800); }
  .vendor-meta { font-family: var(--font-ui); font-size: .74rem; color: var(--rr-slate-dark); }
  .vendor-stats { display: flex; gap: 16px; margin-top: 6px; }
  .vendor-stat-k { font-family: var(--font-mono); font-size: .9rem; color: #0A192F; font-weight: 600; }
  .vendor-stat-v { font-family: var(--font-ui); font-size: .68rem; color: var(--rr-slate-dark); letter-spacing: .04em; text-transform: uppercase; }

  table.cases { width: 100%; border-collapse: collapse; font-family: var(--font-ui); font-size: .85rem; }
  table.cases th { text-align: left; padding: 12px 14px; color: var(--rr-slate-dark); font-size: .68rem; letter-spacing: .08em; text-transform: uppercase; border-bottom: 1px solid var(--rr-parchment); font-weight: 600; }
  table.cases td { padding: 14px; border-bottom: 1px solid var(--rr-parchment); vertical-align: middle; }
  table.cases tr:last-child td { border-bottom: none; }
  table.cases tr:hover td { background: rgba(58,127,189,0.03); }
  .id-cell { font-family: var(--font-mono); font-size: .76rem; color: var(--rr-slate-dark); }
  .pill { font-size: .66rem; font-weight: 600; padding: 3px 10px; border-radius: 999px; letter-spacing: .06em; text-transform: uppercase; display: inline-block; }
  .pill-sent     { background: #FDF3E5; color: #B45309; }
  .pill-progress { background: #D9EAF5; color: #2E6494; }
  .pill-returned { background: #E8F5EE; color: #2A7D4F; }
  .pill-overdue  { background: #F8E5E8; color: #9B2335; }

  .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .filter-pill {
    display: inline-flex; align-items: center; gap: 6px; height: 32px; padding: 0 12px; border-radius: 999px;
    border: 1px solid var(--rr-parchment); background: #fff; font-family: var(--font-ui); font-size: .76rem; color: var(--rr-slate-dark); cursor: pointer;
  }
  .filter-pill.active { background: var(--rr-mist); color: var(--rr-navy-800); border-color: var(--rr-steel-200); font-weight: 600; }

  .timeline-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--rr-parchment); }
  .timeline-row:last-child { border: none; }
  .ts-dot { width: 10px; height: 10px; border-radius: 999px; flex-shrink: 0; }
  .toast-ctr { position: fixed; bottom: 24px; right: 24px; z-index: 100; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
  .toast-msg { background: var(--rr-navy-800); color: var(--rr-warm-white); padding: 12px 18px; border-radius: 6px; font-family: var(--font-ui); font-size: .85rem; box-shadow: 0 4px 16px rgba(10,25,47,0.22); pointer-events: auto; animation: toast-in 240ms cubic-bezier(0.16,1,0.3,1); max-width: 380px; }
  @keyframes toast-in { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>

<script src="../../lib/query.js"></script>
<script src="../../lib/auth.js"></script>
<script src="../../data/clinics.js"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="TopBar.jsx"></script>
<script type="text/babel" src="KpiTile.jsx"></script>
<script type="text/babel" src="LabPipeline.jsx"></script>
<script type="text/babel" src="StatusPill.jsx"></script>

<script type="text/babel">
window.RRD.requireSession?.();
const ALL_CASES = [
  { id: 'LC-2026-0481', patient: 'Alice Stevens',  vendor: 'Pinnacle Dental Lab',   item: 'Crown · #36',            sent: '2026-04-28', eta: '2026-05-12', status: 'sent'     },
  { id: 'LC-2026-0476', patient: 'Sofía Castillo', vendor: 'Crown City Lab',        item: 'Implant abutment · #11', sent: '2026-04-26', eta: '2026-05-18', status: 'sent'     },
  { id: 'LC-2026-0479', patient: 'Marcus Doan',    vendor: 'Mountain Lab Services', item: 'Reline · upper denture', sent: '2026-04-25', eta: '2026-05-08', status: 'progress' },
  { id: 'LC-2026-0474', patient: 'Marcus Doan',    vendor: 'Mountain Lab Services', item: 'Night guard · soft',     sent: '2026-04-22', eta: '2026-05-04', status: 'progress' },
  { id: 'LC-2026-0469', patient: 'Priya Khanna',   vendor: 'Pinnacle Dental Lab',   item: 'Crown · #36',            sent: '2026-04-15', eta: '2026-05-04', status: 'returned' },
  { id: 'LC-2026-0467', patient: 'Eli Brouwer',    vendor: 'Apex Ortho Lab',        item: 'Retainer · upper',       sent: '2026-04-12', eta: '2026-05-04', status: 'returned' },
  { id: 'LC-2026-0463', patient: 'Daniel Okafor',  vendor: 'Crown City Lab',        item: 'Onlay · #14',            sent: '2026-04-08', eta: '2026-05-02', status: 'returned' },
  { id: 'LC-2026-0455', patient: 'Yuki Tanaka',    vendor: 'Pinnacle Dental Lab',   item: 'Bridge · #14–#16',       sent: '2026-04-01', eta: '2026-04-29', status: 'overdue'  },
];

const VENDORS = [
  { name: 'Pinnacle Dental Lab',   city: 'Calgary, AB',   active: 9, on_time: '94%', avg_days: '8.2', focus: 'Crowns · bridges · onlays' },
  { name: 'Crown City Lab',        city: 'Edmonton, AB',  active: 4, on_time: '88%', avg_days: '11.0', focus: 'Implant restorations'      },
  { name: 'Mountain Lab Services', city: 'Calgary, AB',   active: 3, on_time: '96%', avg_days: '6.1', focus: 'Removables · relines'      },
  { name: 'Apex Ortho Lab',        city: 'Vancouver, BC', active: 2, on_time: '92%', avg_days: '9.4', focus: 'Retainers · aligners'       },
];

const STATUS_PILL = {
  sent:     'pill pill-sent',
  progress: 'pill pill-progress',
  returned: 'pill pill-returned',
  overdue:  'pill pill-overdue',
};

const STATUS_LABEL = {
  sent: 'Sent · waiting',
  progress: 'In progress',
  returned: 'Returned',
  overdue: 'Overdue',
};

const FILTERS = ['All', 'Sent', 'In progress', 'Returned', 'Overdue'];

const LabPage = () => {
  const [filter, setFilter] = React.useState('All');
  const [toasts, setToasts] = React.useState([]);
  const addToast = (msg) => { const id = Date.now(); setToasts(t => [...t, {id, msg}]); setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000); };

  const filtered = ALL_CASES.filter(c => {
    if (filter === 'All') return true;
    if (filter === 'Sent') return c.status === 'sent';
    if (filter === 'In progress') return c.status === 'progress';
    if (filter === 'Returned') return c.status === 'returned';
    if (filter === 'Overdue') return c.status === 'overdue';
    return true;
  });

  return (
    <>
    <div className="shell">
      <Sidebar active="lab" />
      <div className="stage">
        <TopBar clinicName="Oak Dental · Calgary" breadcrumb={['Lab', 'Pipeline']} />
        <div className="body">
          <div className="page-header">
            <div>
              <h1 className="page-title">Lab pipeline</h1>
              <div className="page-sub">{ALL_CASES.length} cases in flight · 3 ready to seat · 1 overdue · 4 vendors active</div>
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button className="btn btn-ghost btn-md" onClick={() => addToast('Pipeline exported — lab_pipeline_2026-05-03.csv')}>Export pipeline</button>
              <button className="btn btn-primary btn-md" onClick={() => addToast('New lab case drawer would open here.')}>+ New lab case</button>
            </div>
          </div>

          <div className="kpi-row">
            <KpiTile label="In flight"        value="18"   delta="+ 3"     trend="up"   accent="steel" />
            <KpiTile label="Returned · ready" value="3"    delta="– 1"     trend="up"   accent="steel" />
            <KpiTile label="Overdue"          value="1"    delta="+ 1"     trend="down" accent="navy"  />
            <KpiTile label="On-time rate"     value="93%"  delta="+ 2.1%"  trend="up"   accent="steel" />
          </div>

          <div className="panel">
            <div className="panel-header">
              <div>
                <div className="panel-h-title">Pipeline · Kanban</div>
                <div className="panel-h-sub">Drag-style status flow · sent → in progress → returned</div>
              </div>
              <a className="panel-h-action" href="lab.html">Switch to list →</a>
            </div>
            <LabPipeline />
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1.6fr 1fr', gap: 18, alignItems: 'flex-start' }}>
            <div className="panel">
              <div className="panel-header">
                <div>
                  <div className="panel-h-title">All lab cases</div>
                  <div className="panel-h-sub">Showing {filtered.length} of {ALL_CASES.length}</div>
                </div>
                <div className="toolbar">
                  {FILTERS.map(f => (
                    <button key={f} className={`filter-pill${filter === f ? ' active' : ''}`} onClick={() => setFilter(f)}>{f}</button>
                  ))}
                </div>
              </div>
              <table className="cases">
                <thead>
                  <tr>
                    <th>Case</th>
                    <th>Patient</th>
                    <th>Item</th>
                    <th>Vendor</th>
                    <th>Sent</th>
                    <th>ETA</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(c => (
                    <tr key={c.id} style={{ cursor: 'pointer' }} onClick={() => { window.location = `lab-case-detail.html?id=${c.id}`; }}>
                      <td className="id-cell">{c.id}</td>
                      <td style={{ fontWeight: 600, color: '#1C2333' }}>{c.patient}</td>
                      <td>{c.item}</td>
                      <td style={{ color: '#4A5568' }}>{c.vendor}</td>
                      <td className="id-cell">{c.sent}</td>
                      <td className="id-cell" style={{ color: c.status === 'overdue' ? '#9B2335' : '#1C2333' }}>{c.eta}</td>
                      <td><StatusPill kind="lab_case" value={c.status === 'progress' ? 'in_progress' : c.status} /></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              <div className="panel">
                <div className="panel-header">
                  <div>
                    <div className="panel-h-title">Recent activity</div>
                    <div className="panel-h-sub">Pipeline events · last 24h</div>
                  </div>
                </div>
                <div>
                  {[
                    { dot: '#2A7D4F', t: '08:42', ev: 'Pinnacle Dental Lab returned',  tail: 'LC-2026-0469 · Crown #36 · Priya Khanna' },
                    { dot: '#3A7FBD', t: '08:14', ev: 'Crown City Lab acknowledged',   tail: 'LC-2026-0463 · Onlay #14 · Daniel Okafor' },
                    { dot: '#B45309', t: 'Yest', ev: 'Mountain Lab Services in progress', tail: 'LC-2026-0479 · Reline upper · Marcus Doan' },
                    { dot: '#9B2335', t: 'Yest', ev: 'Bridge marked overdue',          tail: 'LC-2026-0455 · Bridge #14–#16 · Yuki Tanaka' },
                    { dot: '#3A7FBD', t: '2 d',   ev: 'Apex Ortho Lab shipped',         tail: 'LC-2026-0467 · Retainer · Eli Brouwer'    },
                  ].map((e, i) => (
                    <div key={i} className="timeline-row">
                      <span className="ts-dot" style={{ background: e.dot }} />
                      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '.72rem', color: '#8A9BB0', width: 42 }}>{e.t}</span>
                      <div style={{ display: 'flex', flexDirection: 'column' }}>
                        <span style={{ fontFamily: "'Inter', sans-serif", fontSize: '.84rem', color: '#1C2333', fontWeight: 600 }}>{e.ev}</span>
                        <span style={{ fontFamily: "'Inter', sans-serif", fontSize: '.74rem', color: '#4A5568' }}>{e.tail}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>

          <div className="panel">
            <div className="panel-header">
              <div>
                <div className="panel-h-title">Vendors</div>
                <div className="panel-h-sub">Active labs · on-time performance · turnaround</div>
              </div>
              <a className="panel-h-action" href="settings.html#vendors">Manage vendors →</a>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
              {VENDORS.map(v => (
                <a key={v.name} href="settings.html#vendors" className="vendor-card row-link" style={{ textDecoration: 'none', color: 'inherit', display: 'flex', flexDirection: 'column', gap: 8 }}>
                  <div className="vendor-name">{v.name}</div>
                  <div className="vendor-meta">{v.city} · {v.focus}</div>
                  <div className="vendor-stats">
                    <div>
                      <div className="vendor-stat-k">{v.active}</div>
                      <div className="vendor-stat-v">Active cases</div>
                    </div>
                    <div>
                      <div className="vendor-stat-k">{v.on_time}</div>
                      <div className="vendor-stat-v">On-time</div>
                    </div>
                    <div>
                      <div className="vendor-stat-k">{v.avg_days}</div>
                      <div className="vendor-stat-v">Avg days</div>
                    </div>
                  </div>
                </a>
              ))}
            </div>
          </div>

          <div style={{ textAlign: 'center', padding: '20px 0', fontFamily: "'Inter', sans-serif", fontSize: '.72rem', color: 'var(--rr-slate)', letterSpacing: '.06em' }}>
            ROCKYRIDGE · DENTAL AI · v1
          </div>
        </div>
      </div>
    </div>
    {toasts.length > 0 && (
      <div className="toast-ctr">
        {toasts.map(t => <div key={t.id} className="toast-msg">{t.msg}</div>)}
      </div>
    )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<LabPage />);

// console-tap render beacon — deferred so React 18 mount completes
setTimeout(function () {
  try {
    var root = document.getElementById('root');
    var rootChildren = root ? root.children.length : -1;
    var firstTag = (root && root.firstElementChild) ? root.firstElementChild.tagName : null;
    var bodyBg = getComputedStyle(document.body).backgroundColor;
    fetch('/__log__', { method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ kind: 'render-reached', url: location.pathname,
        rootChildren: rootChildren, firstTag: firstTag, bodyBg: bodyBg,
        title: document.title, readyState: document.readyState }) });
  } catch(_){}
}, 250);

</script>
</body>
</html>
