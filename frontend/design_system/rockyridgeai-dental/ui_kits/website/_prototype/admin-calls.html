<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calls · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../../../colors_and_type.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="../../../lib/console-tap.js"></script>
<style>
  html, body { margin: 0; }
  body { background: var(--rr-warm-white); min-height: 100vh; }
  .shell { display: flex; min-height: 100vh; }
  .stage { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .stage > .body { padding: 28px 32px; display: flex; flex-direction: column; gap: 20px; max-width: 1280px; margin: 0 auto; width: 100%; box-sizing: border-box; }

  .topbar-stub { height: 64px; padding: 0 28px; background: #fff; border-bottom: 1px solid var(--rr-parchment); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; font-family: var(--font-ui); }
  .topbar-clinic { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: .9rem; color: var(--rr-navy-800); letter-spacing: -.01em; }
  .topbar-crumb { display: inline-flex; align-items: center; gap: 8px; font-size: .82rem; color: var(--rr-slate-dark); }
  .topbar-crumb .sep { color: #C8CCCC; }
  .topbar-crumb .last { color: var(--rr-ink); font-weight: 500; }
  .topbar-pill { font-family: var(--font-mono); font-size: .68rem; color: var(--rr-slate-dark); padding: 3px 10px; border-radius: 999px; background: var(--rr-off-white); border: 1px solid var(--rr-parchment); letter-spacing: .04em; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .topbar-avatar { width: 32px; height: 32px; border-radius: 999px; background: hsl(var(--primary)); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; font-size: .72rem; }

  .page-title { font-family: var(--font-display); font-weight: 800; font-size: 1.8rem; color: var(--rr-navy-800); letter-spacing: -.025em; margin: 0 0 4px; }
  .page-sub { font-family: var(--font-ui); font-size: .9rem; color: var(--rr-slate-dark); max-width: 64ch; line-height: 1.5; margin: 0; }
  .overline { font-family: var(--font-ui); font-size: .68rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--rr-slate-dark); }

  /* Filter bar */
  .filter-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 12px 0; }
  .filter-group { display: flex; align-items: center; gap: 4px; }
  .chip { font-family: var(--font-ui); font-size: .78rem; font-weight: 500; padding: 5px 12px; border-radius: 999px; border: 1.5px solid var(--rr-parchment); background: #fff; color: var(--rr-ink); cursor: pointer; transition: all 200ms ease; white-space: nowrap; }
  .chip:hover { border-color: hsl(var(--primary)); color: hsl(var(--primary)); }
  .chip.active { background: hsl(var(--primary)); border-color: hsl(var(--primary)); color: #fff; }
  .chip-outcome { font-size: .72rem; padding: 4px 10px; }
  .filter-sep { width: 1px; height: 20px; background: var(--rr-parchment); margin: 0 4px; flex-shrink: 0; }
  .filter-search { font-family: var(--font-ui); font-size: .82rem; padding: 6px 12px; border: 1.5px solid var(--rr-mist); border-radius: 6px; background: #fff; color: var(--rr-ink); min-width: 180px; }
  .filter-search:focus { border-color: hsl(var(--ring)); outline: none; box-shadow: 0 0 0 3px hsl(var(--primary) / 0.12); }
  .filter-search::placeholder { color: var(--rr-slate-dark); }
  .filter-toggle { display: flex; align-items: center; gap: 6px; font-family: var(--font-ui); font-size: .78rem; color: var(--rr-ink); cursor: pointer; white-space: nowrap; }
  .filter-toggle input { accent-color: hsl(var(--primary)); }
  .counter { font-family: var(--font-ui); font-size: .78rem; color: var(--rr-slate-dark); margin-left: auto; white-space: nowrap; }
  .date-input { font-family: var(--font-mono); font-size: .78rem; padding: 4px 8px; border: 1.5px solid var(--rr-mist); border-radius: 6px; background: #fff; color: var(--rr-ink); }
  .date-input:focus { border-color: hsl(var(--ring)); outline: none; box-shadow: 0 0 0 3px hsl(var(--primary) / 0.12); }

  /* Table */
  .calls-panel { background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; box-shadow: var(--shadow-xs); overflow: hidden; }
  .calls-table { width: 100%; border-collapse: collapse; font-family: var(--font-ui); font-size: .85rem; }
  .calls-table th { text-align: left; padding: 10px 14px; font-size: .72rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--rr-slate-dark); border-bottom: 1px solid var(--rr-parchment); background: var(--rr-off-white); }
  .calls-table td { padding: 12px 14px; border-bottom: 1px solid var(--rr-parchment); vertical-align: top; color: var(--rr-ink); }
  .calls-table tr.row:hover { background: var(--rr-off-white); cursor: pointer; }
  .calls-table tr.row:hover .view-link { opacity: 1; }
  .mono { font-family: var(--font-mono); font-size: .82rem; }
  .sub { font-size: .72rem; color: var(--rr-slate-dark); margin-top: 2px; }
  .tag-new { font-size: .66rem; font-weight: 600; color: hsl(var(--primary)); background: hsl(var(--primary) / 0.08); padding: 1px 6px; border-radius: 999px; }
  .tag-returning { font-size: .66rem; font-weight: 600; color: var(--rr-slate-dark); background: var(--rr-off-white); padding: 1px 6px; border-radius: 999px; border: 1px solid var(--rr-parchment); }

  /* Outcome pills */
  .pill { font-family: var(--font-ui); font-size: .72rem; font-weight: 600; padding: 3px 10px; border-radius: 999px; display: inline-block; white-space: nowrap; }
  .pill-booked { background: #E8F5EE; color: #1A5E35; }
  .pill-transferred { background: #EEF4FB; color: #2B6CB0; }
  .pill-voicemail { background: #FFF8EC; color: #92600A; }
  .pill-missed { background: #FDF2F2; color: #9B2335; }
  .pill-agent_handled { background: #E8F5EE; color: #2A7D4F; }
  .pill-routing_gate { background: #FFF8EC; color: #B45309; }
  .pill-error { background: #FDF2F2; color: #9B2335; }
  .pill-default { background: var(--rr-off-white); color: var(--rr-slate-dark); border: 1px solid var(--rr-parchment); }

  /* Listen button */
  .listen-btn { width: 28px; height: 28px; border-radius: 999px; border: 1.5px solid var(--rr-parchment); background: #fff; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; transition: border-color 200ms ease; flex-shrink: 0; }
  .listen-btn:hover { border-color: hsl(var(--primary)); }
  .listen-cell { display: flex; align-items: center; gap: 8px; }
  .waveform-stub { display: flex; align-items: center; gap: 1px; height: 16px; }
  .waveform-stub span { display: block; width: 2px; border-radius: 1px; background: var(--rr-parchment); }
  .view-link { font-size: .76rem; color: hsl(var(--primary)); opacity: 0; transition: opacity 150ms ease; white-space: nowrap; }

  /* Empty / skeleton */
  .empty-state { padding: 48px 24px; text-align: center; }
  .empty-title { font-family: var(--font-display); font-weight: 700; font-size: 1.05rem; color: var(--rr-navy-800); margin: 0 0 6px; }
  .empty-sub { font-family: var(--font-ui); font-size: .85rem; color: var(--rr-slate-dark); max-width: 44ch; margin: 0 auto; line-height: 1.5; }
  .skel { background: var(--rr-off-white); border-radius: 4px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

  /* Pagination */
  .pagination { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-top: 1px solid var(--rr-parchment); }
  .pagination .info { font-family: var(--font-ui); font-size: .78rem; color: var(--rr-slate-dark); }
  .pagination .btns { display: flex; gap: 8px; }
  .pg-btn { font-family: var(--font-ui); font-size: .78rem; font-weight: 500; padding: 6px 14px; border-radius: 6px; border: 1.5px solid var(--rr-mist); background: #fff; color: var(--rr-ink); cursor: pointer; transition: border-color 200ms ease; }
  .pg-btn:hover:not(:disabled) { border-color: hsl(var(--primary)); color: hsl(var(--primary)); }
  .pg-btn:disabled { opacity: .4; cursor: not-allowed; }
</style>
</head>
<body>
<div id="root"></div>

<script src="../../../data/clinics.js"></script>
<script src="../../../data/admin_mock.js"></script>
<script src="../../../data/ai_config.js"></script>
<script src="../../../lib/query.js"></script>
<script src="../../../lib/auth.js"></script>
<script type="text/babel" src="AdminSidebar.jsx"></script>
<script type="text/babel" src="../TopBar.jsx"></script>
<script type="text/babel">
window.RRD?.requireSession?.();

const { CLINIC, CALLS, APPOINTMENTS, PATIENTS } = window.ADMIN_MOCK;
const PAGE_SIZE = 20;

const OUTCOME_ALL = ['booked','transferred','voicemail','missed','agent_handled','routing_gate*','error'];
const DATE_CHIPS = ['Today','7 days','30 days','Custom'];

function outcomeClass(o) {
  if (!o) return 'pill pill-default';
  if (o === 'booked') return 'pill pill-booked';
  if (o === 'transferred') return 'pill pill-transferred';
  if (o === 'voicemail') return 'pill pill-voicemail';
  if (o === 'missed') return 'pill pill-missed';
  if (o === 'agent_handled') return 'pill pill-agent_handled';
  if (o.startsWith('routing_gate')) return 'pill pill-routing_gate';
  if (o === 'error') return 'pill pill-error';
  return 'pill pill-default';
}

function fmtDuration(s) {
  if (s == null) return '\u2014';
  var m = Math.floor(s / 60);
  var sec = s % 60;
  return m > 0 ? m + 'm ' + sec + 's' : sec + 's';
}

function fmtPhone(e164) {
  if (!e164) return '\u2014';
  var d = e164.replace(/\D/g, '');
  if (d.length === 11 && d[0] === '1') return '+1 (' + d.slice(1,4) + ') ' + d.slice(4,7) + '-' + d.slice(7);
  return e164;
}

function relativeTime(iso) {
  if (!iso) return '';
  var diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + ' minutes ago';
  if (diff < 86400) return Math.floor(diff / 3600) + ' hours ago';
  return Math.floor(diff / 86400) + ' days ago';
}

function fmtDate(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  return d.toLocaleDateString('en-CA') + ' ' + d.toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit' });
}

function matchesOutcome(call, selected) {
  if (selected.length === 0) return true;
  return selected.some(function(s) {
    if (s === 'routing_gate*') return call.outcome && call.outcome.startsWith('routing_gate');
    return call.outcome === s;
  });
}

function daysAgo(n) {
  var d = new Date(); d.setDate(d.getDate() - n); d.setHours(0,0,0,0); return d;
}

function WaveformStub() {
  var bars = [4,8,12,6,10,14,8,5,11,7,13,6,9];
  return React.createElement('div', { className: 'waveform-stub' },
    bars.map(function(h, i) { return React.createElement('span', { key: i, style: { height: h } }); })
  );
}

function SkeletonRows() {
  return Array.from({ length: 8 }).map(function(_, i) {
    return React.createElement('tr', { key: i },
      [120,100,50,80,130,90].map(function(w, j) {
        return React.createElement('td', { key: j },
          React.createElement('div', { className: 'skel', style: { width: w, height: 14 } })
        );
      })
    );
  });
}

const OwnerPill = () => {
  const session = (window.RRD && window.RRD.getSession && window.RRD.getSession()) || {};
  const userName = session.full_name || 'Demo User';
  const userEmail = session.email || '';
  const role = session.role || 'Demo';
  const initials = userName.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
  const [menuOpen, setMenuOpen] = React.useState(false);
  React.useEffect(() => {
    if (!menuOpen) return undefined;
    const handler = (e) => {
      const pill = document.getElementById('rrd-profile-pill');
      const menu = document.getElementById('rrd-profile-menu');
      if (pill && pill.contains(e.target)) return;
      if (menu && menu.contains(e.target)) return;
      setMenuOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [menuOpen]);
  const handleSignOut = () => {
    try { if (window.RRD && window.RRD.logout) window.RRD.logout(); } catch (_) {}
    window.location.href = '/ui_kits/website/login.html?logout=1';
  };
  return (
    <div style={{ position: 'relative' }}>
      <button id="rrd-profile-pill" type="button" title={userEmail} aria-expanded={menuOpen} aria-controls="rrd-profile-menu" onClick={() => setMenuOpen(o => !o)} style={{ width: 32, height: 32, borderRadius: 999, background: '#3A7FBD', color: '#fff', border: 'none', cursor: 'pointer', fontWeight: 600, fontSize: '0.72rem' }}>{initials}</button>
      {menuOpen && (
        <div id="rrd-profile-menu" role="menu" style={{ position: 'absolute', top: '100%', right: 0, marginTop: 6, width: 240, background: '#fff', border: '1px solid #EDE9E0', borderRadius: 6, boxShadow: '0 8px 24px rgba(10,25,47,0.18)', zIndex: 30, padding: 4 }}>
          <div style={{ padding: '12px 14px 8px' }}>
            <div style={{ fontFamily: "'Inter', sans-serif", fontWeight: 600, fontSize: '0.95rem', color: '#1C2333' }}>{userName}</div>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '0.74rem', color: '#4A5568', marginTop: 2 }}>{userEmail}</div>
            <span style={{ display: 'inline-block', marginTop: 8, background: role === 'Owner' ? '#D9EAF5' : '#F5F2EC', color: role === 'Owner' ? '#2E6494' : '#4A5568', padding: '3px 10px', borderRadius: 999, fontSize: '0.66rem', fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase' }}>{role}</span>
          </div>
          <div style={{ height: 1, background: '#EDE9E0', margin: '4px 0' }} />
          <a role="menuitem" href="#" onClick={(e) => e.preventDefault()} style={{ display: 'block', padding: '10px 14px', color: '#1C2333', fontFamily: "'Inter', sans-serif", fontSize: '0.85rem', textDecoration: 'none', borderRadius: 4 }} onMouseEnter={e => e.currentTarget.style.background = '#F5F2EC'} onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>Account</a>
          <a role="menuitem" href="/ui_kits/website/login.html?logout=1" onClick={(e) => { e.preventDefault(); handleSignOut(); }} style={{ display: 'block', padding: '10px 14px', color: '#9B2335', fontFamily: "'Inter', sans-serif", fontSize: '0.85rem', textDecoration: 'none', borderRadius: 4 }} onMouseEnter={e => e.currentTarget.style.background = '#F5F2EC'} onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>Sign out</a>
        </div>
      )}
    </div>
  );
};

function AdminTopBar(props) {
  return (
    <TopBar breadcrumb={breadcrumb} clinicName={CLINIC.name} homeHref="../dashboard.html" mode="AI Receptionist" />
  );
}

function Body() {
  var _s = React.useState;
  var dateRange = _s('7 days'); var setDateRange = dateRange[1]; dateRange = dateRange[0];
  var customFrom = _s(''); var setCustomFrom = customFrom[1]; customFrom = customFrom[0];
  var customTo = _s(''); var setCustomTo = customTo[1]; customTo = customTo[0];
  var selectedOutcomes = _s([]); var setSelectedOutcomes = selectedOutcomes[1]; selectedOutcomes = selectedOutcomes[0];
  var afterHoursOnly = _s(false); var setAfterHoursOnly = afterHoursOnly[1]; afterHoursOnly = afterHoursOnly[0];
  var search = _s(''); var setSearch = search[1]; search = search[0];
  var debouncedSearch = _s(''); var setDebouncedSearch = debouncedSearch[1]; debouncedSearch = debouncedSearch[0];
  var page = _s(0); var setPage = page[1]; page = page[0];
  var loading = _s(false); var setLoading = loading[1]; loading = loading[0];

  // Debounce search
  React.useEffect(function() {
    var t = setTimeout(function() { setDebouncedSearch(search); }, 200);
    return function() { clearTimeout(t); };
  }, [search]);

  // Reset page on filter change
  React.useEffect(function() { setPage(0); }, [dateRange, customFrom, customTo, selectedOutcomes, afterHoursOnly, debouncedSearch]);

  function toggleOutcome(o) {
    setSelectedOutcomes(function(prev) {
      return prev.includes(o) ? prev.filter(function(x) { return x !== o; }) : prev.concat(o);
    });
  }

  // Build patient lookup
  var patientMap = {};
  PATIENTS.forEach(function(p) { patientMap[p.patient_id] = p; });
  var apptMap = {};
  APPOINTMENTS.forEach(function(a) { apptMap[a.id] = a; });

  // Filter calls
  var filtered = CALLS.filter(function(c) {
    // Date range
    if (dateRange !== 'Custom') {
      var days = dateRange === 'Today' ? 0 : dateRange === '7 days' ? 7 : 30;
      var cutoff = daysAgo(days);
      if (new Date(c.started_at) < cutoff) return false;
    } else {
      if (customFrom && new Date(c.started_at) < new Date(customFrom)) return false;
      if (customTo && new Date(c.started_at) > new Date(customTo + 'T23:59:59')) return false;
    }
    // Outcome
    if (!matchesOutcome(c, selectedOutcomes)) return false;
    // After-hours
    if (afterHoursOnly && !c.after_hours) return false;
    // Search
    if (debouncedSearch) {
      var q = debouncedSearch.toLowerCase();
      var name = (c.caller_name || '').toLowerCase();
      var phone = fmtPhone(c.caller_e164).toLowerCase();
      var raw = (c.caller_e164 || '').toLowerCase();
      if (name.indexOf(q) === -1 && phone.indexOf(q) === -1 && raw.indexOf(q) === -1) return false;
    }
    return true;
  });

  var totalFiltered = filtered.length;
  var totalAll = CALLS.length;
  var paged = filtered.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);
  var hasNext = (page + 1) * PAGE_SIZE < totalFiltered;
  var hasPrev = page > 0;

  function navTo(callId) {
    window.location.href = 'admin-call-detail.html?call_id=' + encodeURIComponent(callId);
  }

  return (
    <div className="shell">
      <AdminSidebar active="calls" clinicName={CLINIC.name} clinicSlug={CLINIC.slug} />
      <div className="stage">
        <TopBar breadcrumb={['Dental AI', 'Calls']} clinicName={CLINIC.name} homeHref="../dashboard.html" mode="AI Receptionist" />
        <div className="body">
          <div>
            <div className="overline">Reception</div>
            <h1 className="page-title">The Call Log</h1>
            <p className="page-sub">Recent calls and transcripts.</p>
          </div>

          {/* Filter bar */}
          <div className="filter-bar">
            <div className="filter-group">
              {DATE_CHIPS.map(function(d) {
                return React.createElement('button', {
                  key: d, className: 'chip' + (dateRange === d ? ' active' : ''),
                  onClick: function() { setDateRange(d); }
                }, d);
              })}
              {dateRange === 'Custom' && React.createElement(React.Fragment, null,
                React.createElement('input', { type: 'date', className: 'date-input', value: customFrom, onChange: function(e) { setCustomFrom(e.target.value); } }),
                React.createElement('span', { style: { color: 'var(--rr-slate-dark)', fontSize: '.78rem' } }, '\u2013'),
                React.createElement('input', { type: 'date', className: 'date-input', value: customTo, onChange: function(e) { setCustomTo(e.target.value); } })
              )}
            </div>
            <div className="filter-sep" />
            <div className="filter-group" style={{ flexWrap: 'wrap' }}>
              {OUTCOME_ALL.map(function(o) {
                return React.createElement('button', {
                  key: o, className: 'chip chip-outcome' + (selectedOutcomes.includes(o) ? ' active' : ''),
                  onClick: function() { toggleOutcome(o); }
                }, o.replace(/_/g, ' '));
              })}
            </div>
            <div className="filter-sep" />
            <label className="filter-toggle">
              <input type="checkbox" checked={afterHoursOnly} onChange={function(e) { setAfterHoursOnly(e.target.checked); }} />
              Show only after-hours calls
            </label>
            <div className="filter-sep" />
            <input
              className="filter-search"
              placeholder="Search name or phone"
              value={search}
              onChange={function(e) { setSearch(e.target.value); }}
            />
            <span className="counter">Showing {totalFiltered} of {totalAll}</span>
          </div>

          {/* Table */}
          <div className="calls-panel">
            {loading ? (
              <table className="calls-table">
                <thead><tr>
                  <th>Time</th><th>Caller</th><th>Duration</th><th>Outcome</th><th>Appointment</th><th>Listen</th>
                </tr></thead>
                <tbody><SkeletonRows /></tbody>
              </table>
            ) : totalAll === 0 ? (
              <div className="empty-state">
                <div className="empty-title">No calls yet</div>
                <p className="empty-sub">No calls yet. The first call AI takes will land here.</p>
              </div>
            ) : totalFiltered === 0 ? (
              <div className="empty-state">
                <div className="empty-title">No matching calls</div>
                <p className="empty-sub">No calls match these filters. Widen the date range or clear an outcome to see more.</p>
              </div>
            ) : (
              <React.Fragment>
                <table className="calls-table">
                  <thead><tr>
                    <th>Time</th><th>Caller</th><th>Duration</th><th>Outcome</th><th>Appointment</th><th style={{ width: 120 }}>Listen</th>
                  </tr></thead>
                  <tbody>
                    {paged.map(function(c) {
                      var appt = c.appointment_id ? apptMap[c.appointment_id] : null;
                      var patient = c.patient_id ? patientMap[c.patient_id] : null;
                      return (
                        <tr key={c.call_id} className="row" onClick={function() { navTo(c.call_id); }}>
                          <td>
                            <div className="mono">{fmtDate(c.started_at)}</div>
                            <div className="sub">{relativeTime(c.started_at)}</div>
                          </td>
                          <td>
                            <div>{c.caller_name || React.createElement('span', { className: 'mono' }, fmtPhone(c.caller_e164))}</div>
                            <div className="sub">
                              {c.patient_id
                                ? React.createElement('span', { className: 'tag-returning' }, 'Returning')
                                : React.createElement('span', { className: 'tag-new' }, 'New patient')}
                            </div>
                          </td>
                          <td><span className="mono">{fmtDuration(c.duration_seconds)}</span></td>
                          <td><span className={outcomeClass(c.outcome)}>{(c.outcome || '\u2014').replace(/_/g, ' ')}</span></td>
                          <td>
                            {appt
                              ? React.createElement('div', null,
                                  React.createElement('span', { className: 'mono', style: { fontSize: '.78rem' } }, fmtDate(appt.time_start)),
                                  appt.provider ? React.createElement('span', { style: { fontSize: '.78rem', color: 'var(--rr-slate-dark)', marginLeft: 6 } }, '\u00B7 ' + appt.provider) : null
                                )
                              : '\u2014'}
                          </td>
                          <td>
                            <div className="listen-cell">
                              <button className="listen-btn" onClick={function(e) { e.stopPropagation(); navTo(c.call_id); }} aria-label="Play call recording">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="hsl(var(--primary))" stroke="none"><polygon points="6,3 20,12 6,21" /></svg>
                              </button>
                              <WaveformStub />
                              <span className="view-link">View transcript &rarr;</span>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                <div className="pagination">
                  <span className="info">Page {page + 1} of {Math.max(1, Math.ceil(totalFiltered / PAGE_SIZE))}</span>
                  <div className="btns">
                    <button className="pg-btn" disabled={!hasPrev} onClick={function() { setPage(0); }}>Back to first page</button>
                    <button className="pg-btn" disabled={!hasNext} onClick={function() { setPage(page + 1); }}>Next page</button>
                  </div>
                </div>
              </React.Fragment>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Body />);

// console-tap render beacon — deferred so React 18 mount completes
setTimeout(function () {
  try {
    var root = document.getElementById('root');
    var rootChildren = root ? root.children.length : -1;
    var firstTag = (root && root.firstElementChild) ? root.firstElementChild.tagName : null;
    var bodyBg = getComputedStyle(document.body).backgroundColor;
    fetch('/__log__', { method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ kind: 'render-reached', url: location.pathname,
        rootChildren: rootChildren, firstTag: firstTag, bodyBg: bodyBg,
        title: document.title, readyState: document.readyState }) });
  } catch(_){}
}, 250);

</script>
</body>
</html>
