<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Call Detail · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../../../colors_and_type.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="../../../lib/console-tap.js"></script>
<style>
html,body{margin:0}
body{background:var(--rr-warm-white);min-height:100vh}
.shell{display:flex;min-height:100vh}
.stage{flex:1;min-width:0;display:flex;flex-direction:column}

/* Topbar */
.topbar{height:64px;padding:0 28px;background:#fff;border-bottom:1px solid var(--rr-parchment);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;font-family:var(--font-ui)}
.topbar-clinic{font-family:'Montserrat',sans-serif;font-weight:700;font-size:.9rem;color:var(--rr-navy-800);letter-spacing:-.01em}
.topbar-crumb{display:inline-flex;align-items:center;gap:8px;font-size:.82rem;color:var(--rr-slate-dark)}
.topbar-crumb .sep{color:#C8CCCC}
.topbar-crumb .last{color:var(--rr-ink);font-weight:500}
.topbar-pill{font-family:var(--font-mono);font-size:.68rem;color:var(--rr-slate-dark);padding:3px 10px;border-radius:999px;background:var(--rr-off-white);border:1px solid var(--rr-parchment);letter-spacing:.04em}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-avatar{width:32px;height:32px;border-radius:999px;background:hsl(var(--primary));color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:600;font-size:.72rem}

/* Three-pane layout */
.detail-body{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.three-pane{display:grid;grid-template-columns:240px minmax(0,1fr) auto;gap:20px;align-items:start}
@media(max-width:1024px){.three-pane{grid-template-columns:1fr;}}

/* Panels */
.panel{background:#fff;border:1px solid var(--rr-parchment);border-radius:6px;padding:18px 20px;box-shadow:0 1px 2px rgba(10,25,47,.04)}
.panel+.panel{margin-top:12px}
.panel-title{font-family:var(--font-display);font-weight:700;font-size:.92rem;color:var(--rr-navy-800);margin:0 0 10px}
.overline{font-family:var(--font-ui);font-size:.68rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--rr-slate-dark);margin-bottom:4px}
.page-title{font-family:var(--font-display);font-weight:800;font-size:1.5rem;color:var(--rr-navy-800);letter-spacing:-.025em;margin:0}
.back-link{font-family:var(--font-ui);font-size:.82rem;color:hsl(var(--primary));text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.back-link:hover{text-decoration:underline}

/* Left rail */
.left-rail{min-width:240px}
.caller-avatar{width:48px;height:48px;border-radius:999px;background:var(--rr-off-white);border:1.5px solid var(--rr-parchment);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:.9rem;color:var(--rr-navy-800);flex-shrink:0}
.caller-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.caller-name{font-family:var(--font-ui);font-weight:600;font-size:.92rem;color:var(--rr-ink)}
.caller-phone{font-family:var(--font-mono);font-size:.78rem;color:var(--rr-slate-dark)}
.meta-row{display:flex;justify-content:space-between;align-items:center;font-family:var(--font-ui);font-size:.78rem;color:var(--rr-slate-dark);padding:4px 0}
.meta-label{color:var(--rr-slate-dark)}
.meta-val{color:var(--rr-ink);font-weight:500}
.meta-val.mono{font-family:var(--font-mono);font-size:.76rem}
.status-pill{display:inline-block;font-family:var(--font-ui);font-size:.68rem;font-weight:600;padding:2px 10px;border-radius:999px;letter-spacing:.03em}
.pill-booked{background:#E8F5EE;color:#2A7D4F}
.pill-transferred{background:#FFF8EC;color:#B45309}
.pill-voicemail{background:#F0F4F8;color:#3D4D61}
.pill-missed{background:#FDE8EB;color:#9B2335}
.pill-agent_handled{background:#E8F0FA;color:#3A7FBD}
.outcome-link{font-family:var(--font-ui);font-size:.78rem;color:hsl(var(--primary));text-decoration:none}
.outcome-link:hover{text-decoration:underline}

/* Action menu */
.action-menu{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.action-btn{font-family:var(--font-ui);font-size:.76rem;padding:5px 10px;border-radius:6px;background:#fff;color:var(--rr-ink);border:1px solid var(--rr-parchment);cursor:pointer;transition:border-color 200ms}
.action-btn:hover{border-color:hsl(var(--primary));color:hsl(var(--primary))}

/* Waveform */
.waveform-wrap{background:#fff;border:1px solid var(--rr-parchment);border-radius:6px;padding:16px 20px}
.waveform-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:12px;flex-wrap:wrap}
.waveform-time{font-family:var(--font-mono);font-size:.82rem;color:var(--rr-ink)}
.waveform-controls{display:flex;align-items:center;gap:8px}
.play-btn{width:32px;height:32px;border-radius:999px;background:hsl(var(--primary));color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.speed-pills{display:flex;gap:4px}
.speed-pill{font-family:var(--font-mono);font-size:.68rem;padding:3px 8px;border-radius:999px;border:1px solid var(--rr-parchment);background:#fff;color:var(--rr-slate-dark);cursor:pointer;transition:all 150ms}
.speed-pill.active{background:hsl(var(--primary));color:#fff;border-color:hsl(var(--primary))}
.waveform-svg{width:100%;height:64px;cursor:pointer;display:block}

/* Transcript */
.transcript-wrap{margin-top:16px}
.confidence-chip{font-family:var(--font-ui);font-size:.76rem;color:var(--rr-slate-dark);padding:4px 12px;border-radius:999px;background:var(--rr-off-white);border:1px solid var(--rr-parchment);display:inline-block;margin-bottom:12px}
.turn{display:flex;flex-direction:column;margin-bottom:10px}
.turn.caller{align-items:flex-end}
.turn.agent{align-items:flex-start}
.bubble{max-width:80%;padding:10px 14px;border-radius:6px;font-family:var(--font-ui);font-size:.85rem;line-height:1.5;color:var(--rr-ink);cursor:pointer;transition:box-shadow 150ms}
.bubble:hover{box-shadow:0 0 0 2px hsl(var(--primary)/.18)}
.turn.caller .bubble{border:1.5px solid hsl(var(--primary)/.3);background:#fff}
.turn.agent .bubble{border:1.5px solid var(--rr-parchment);background:var(--rr-off-white)}
.bubble-meta{display:flex;gap:8px;align-items:center;margin-top:4px;font-size:.72rem}
.bubble-speaker{font-family:var(--font-ui);font-weight:600;color:var(--rr-slate-dark)}
.bubble-ts{font-family:var(--font-mono);color:var(--rr-slate-dark)}
.conf-warn{font-family:var(--font-ui);font-size:.66rem;padding:1px 6px;border-radius:999px;background:#FFF8EC;color:#B45309;border:1px solid #F0E2C8}
.empty-transcript{font-family:var(--font-ui);font-size:.85rem;color:var(--rr-slate-dark);font-style:italic;padding:20px 0}

/* Right rail — engineer view */
.right-rail{width:320px;min-width:0}
@media(max-width:1024px){.right-rail{width:100%}}
.eng-tab{font-family:var(--font-ui);font-size:.82rem;font-weight:500;color:var(--rr-slate-dark);padding:10px 16px;background:#fff;border:1px solid var(--rr-parchment);border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:border-color 200ms;width:100%;box-sizing:border-box;text-align:left}
.eng-tab:hover{border-color:hsl(var(--primary));color:hsl(var(--primary))}
.eng-panel{background:#fff;border:1px solid var(--rr-parchment);border-radius:6px;padding:18px 20px;margin-top:8px}
.eng-intro{font-family:var(--font-ui);font-size:.82rem;color:var(--rr-slate-dark);line-height:1.5;margin:0 0 14px}

/* Accordion sections */
.acc-section{border-bottom:1px solid var(--rr-parchment);padding:10px 0}
.acc-section:last-child{border-bottom:none}
.acc-header{font-family:var(--font-ui);font-size:.82rem;font-weight:600;color:var(--rr-navy-800);cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:4px 0;background:none;border:none;width:100%;text-align:left}
.acc-header:hover{color:hsl(var(--primary))}
.acc-arrow{font-size:.7rem;color:var(--rr-slate-dark);transition:transform 200ms}
.acc-arrow.open{transform:rotate(90deg)}
.acc-body{padding:10px 0 4px;font-family:var(--font-ui);font-size:.8rem;color:var(--rr-ink);line-height:1.5}

/* Latency bars */
.lat-turn{margin-bottom:8px}
.lat-label{font-family:var(--font-mono);font-size:.7rem;color:var(--rr-slate-dark);margin-bottom:3px}
.lat-bars{display:flex;height:14px;border-radius:3px;overflow:hidden;background:var(--rr-off-white)}
.lat-seg{height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:.58rem;color:#fff;min-width:2px}
.lat-stt{background:#3A7FBD}
.lat-llm{background:#0A192F}
.lat-tool{background:#B45309}
.lat-tts{background:#2A7D4F}
.lat-total{font-family:var(--font-mono);font-size:.68rem;color:var(--rr-slate-dark);margin-left:6px}

/* Intent bars */
.intent-turn{margin-bottom:8px}
.intent-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.intent-name{font-family:var(--font-ui);font-size:.72rem;color:var(--rr-ink);width:100px;flex-shrink:0;text-align:right}
.intent-bar-bg{flex:1;height:10px;background:var(--rr-off-white);border-radius:3px;overflow:hidden}
.intent-bar{height:100%;background:hsl(var(--primary));border-radius:3px;transition:width 200ms}
.intent-pct{font-family:var(--font-mono);font-size:.66rem;color:var(--rr-slate-dark);width:36px}

/* Flow */
.flow-svg{width:100%;max-width:280px}

/* Logs */
.log-row{display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--rr-off-white);font-size:.76rem;cursor:pointer}
.log-row:last-child{border-bottom:none}
.log-ts{font-family:var(--font-mono);font-size:.68rem;color:var(--rr-slate-dark);flex-shrink:0;width:70px}
.log-level{font-family:var(--font-ui);font-size:.62rem;font-weight:600;padding:1px 6px;border-radius:999px;flex-shrink:0}
.log-info{background:#E8F0FA;color:#3A7FBD}
.log-warn{background:#FFF8EC;color:#B45309}
.log-error{background:#FDE8EB;color:#9B2335}
.log-msg{font-family:var(--font-ui);color:var(--rr-ink);flex:1;min-width:0;word-break:break-word}
.log-json{font-family:var(--font-mono);font-size:.7rem;color:var(--rr-slate-dark);background:var(--rr-off-white);padding:8px 10px;border-radius:4px;margin-top:4px;white-space:pre-wrap;word-break:break-all}

/* Dialog stub */
.stub-dialog{position:fixed;inset:0;background:rgba(10,25,47,.4);display:flex;align-items:center;justify-content:center;z-index:100}
.stub-dialog-box{background:#fff;border-radius:6px;padding:28px 32px;max-width:360px;width:90%;box-shadow:0 8px 24px rgba(10,25,47,.12)}
.stub-dialog-box h3{font-family:var(--font-display);font-weight:700;font-size:1rem;color:var(--rr-navy-800);margin:0 0 8px}
.stub-dialog-box p{font-family:var(--font-ui);font-size:.85rem;color:var(--rr-slate-dark);margin:0 0 16px;line-height:1.5}
.stub-dialog-close{font-family:var(--font-ui);font-size:.82rem;padding:7px 16px;border-radius:6px;background:var(--rr-navy);color:#fff;border:none;cursor:pointer}
</style>
</head>
<body>
<div id="root"></div>

<script src="../../../data/clinics.js"></script>
<script src="../../../data/admin_mock.js"></script>
<script src="../../../data/ai_config.js"></script>
<script src="../../../lib/query.js"></script>
<script src="../../../lib/auth.js"></script>
<script type="text/babel" src="AdminSidebar.jsx"></script>
<script type="text/babel" src="../TopBar.jsx"></script>
<script type="text/babel">
window.RRD?.requireSession?.();

const { CLINIC, CALLS, TRANSCRIPTS, APPOINTMENTS, PATIENTS } = window.ADMIN_MOCK;

/* ── Deterministic hash from string ── */
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = ((h << 5) - h + s.charCodeAt(i)) | 0; }
  return Math.abs(h);
}

/* ── Seeded PRNG ── */
function seededRandom(seed) {
  let s = seed;
  return function() { s = (s * 16807 + 0) % 2147483647; return s / 2147483647; };
}

/* ── Format phone ── */
function fmtPhone(e164) {
  if (!e164) return 'Unknown';
  const d = e164.replace(/\D/g, '');
  if (d.length === 11 && d[0] === '1') return '+1 (' + d.slice(1,4) + ') ' + d.slice(4,7) + '-' + d.slice(7);
  return e164;
}

/* ── Format duration ── */
function fmtDur(sec) {
  if (!sec || sec <= 0) return '0s';
  const m = Math.floor(sec / 60), s = sec % 60;
  return m > 0 ? m + 'm ' + s + 's' : s + 's';
}

/* ── Format datetime ── */
function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('en-CA', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true });
}

/* ── Generate fallback transcript ── */
function generateFallback(callId, callerName, durationSec) {
  const rand = seededRandom(hashStr(callId));
  const name = callerName || 'the caller';
  const turns = [
    { speaker: 'agent', text: 'Good morning, Northeast Denture Clinic. How can I help you today?', ts_ms: 0, confidence: 0.95 },
    { speaker: 'caller', text: 'Hi, I would like to book an appointment for a consultation.', ts_ms: 3200, confidence: 0.88 },
    { speaker: 'agent', text: 'Of course. Can I get your full name and a callback number?', ts_ms: 7400, confidence: 0.92 },
    { speaker: 'caller', text: 'It is ' + name + '. You can reach me at this number.', ts_ms: 12000, confidence: 0.72 },
    { speaker: 'agent', text: 'Thank you. I have availability this Thursday at 10:00 AM with Dr. Chen. Does that work for you?', ts_ms: 18500, confidence: 0.90 },
    { speaker: 'caller', text: 'Thursday at ten works. Thank you.', ts_ms: 25000, confidence: 0.85 },
  ];
  const totalMs = (durationSec || 45) * 1000;
  const logs = [
    { ts_ms: 0, level: 'info', message: 'Call connected', payload: { call_id: callId } },
    { ts_ms: 200, level: 'info', message: 'STT stream started', payload: { engine: 'deepgram' } },
    { ts_ms: 3400, level: 'info', message: 'Intent classified: schedule_appointment (0.91)', payload: { top: 'schedule_appointment', score: 0.91 } },
    { ts_ms: 12200, level: 'info', message: 'Patient lookup initiated', payload: { query: name } },
    { ts_ms: 18000, level: 'info', message: 'Schedule query: next available slot', payload: { provider: 'Dr. Chen', date: '2026-05-07' } },
    { ts_ms: totalMs, level: 'info', message: 'Call ended normally', payload: { duration_ms: totalMs } },
  ];
  const latency = turns.map(function(t, i) {
    var r = seededRandom(hashStr(callId + i));
    return { turn: i + 1, stt_ms: Math.round(80 + r() * 120), llm_ms: Math.round(150 + r() * 300), tool_ms: i === 4 ? Math.round(50 + r() * 100) : 0, tts_ms: Math.round(100 + r() * 150) };
  });
  const intents = turns.filter(function(t) { return t.speaker === 'caller'; }).map(function(t, i) {
    var r = seededRandom(hashStr(callId + 'intent' + i));
    var primary = i === 0 ? 'schedule_appointment' : i === 1 ? 'provide_info' : 'confirm';
    return { turn_text: t.text.slice(0, 30), intents: [
      { name: primary, confidence: 0.7 + r() * 0.25 },
      { name: 'general_inquiry', confidence: 0.1 + r() * 0.15 },
      { name: 'cancel', confidence: r() * 0.05 },
    ]};
  });
  var flow_path = ['greet', 'identify', 'check_schedule', 'book'];
  return { turns: turns, logs: logs, latency: latency, intents: intents, flow_path: flow_path };
}

/* ── Generate waveform path ── */
function waveformPath(callId, width, height) {
  var rand = seededRandom(hashStr(callId || 'default'));
  var mid = height / 2;
  var bars = Math.floor(width / 3);
  var d = '';
  for (var i = 0; i < bars; i++) {
    var x = (i / bars) * width;
    var amp = 4 + rand() * (mid - 6);
    d += 'M' + x.toFixed(1) + ',' + (mid - amp).toFixed(1) + 'L' + x.toFixed(1) + ',' + (mid + amp).toFixed(1) + ' ';
  }
  return d;
}

/* ── OwnerPill ── */
const OwnerPill = () => {
  const session = (window.RRD && window.RRD.getSession && window.RRD.getSession()) || {};
  const userName = session.full_name || 'Demo User';
  const userEmail = session.email || '';
  const role = session.role || 'Demo';
  const initials = userName.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
  const [menuOpen, setMenuOpen] = React.useState(false);
  React.useEffect(() => {
    if (!menuOpen) return undefined;
    const handler = (e) => {
      const pill = document.getElementById('rrd-profile-pill');
      const menu = document.getElementById('rrd-profile-menu');
      if (pill && pill.contains(e.target)) return;
      if (menu && menu.contains(e.target)) return;
      setMenuOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [menuOpen]);
  const handleSignOut = () => {
    try { if (window.RRD && window.RRD.logout) window.RRD.logout(); } catch (_) {}
    window.location.href = '/ui_kits/website/login.html?logout=1';
  };
  return (
    <div style={{ position: 'relative' }}>
      <button id="rrd-profile-pill" type="button" title={userEmail} aria-expanded={menuOpen} aria-controls="rrd-profile-menu" onClick={() => setMenuOpen(o => !o)} style={{ width: 32, height: 32, borderRadius: 999, background: '#3A7FBD', color: '#fff', border: 'none', cursor: 'pointer', fontWeight: 600, fontSize: '0.72rem' }}>{initials}</button>
      {menuOpen && (
        <div id="rrd-profile-menu" role="menu" style={{ position: 'absolute', top: '100%', right: 0, marginTop: 6, width: 240, background: '#fff', border: '1px solid #EDE9E0', borderRadius: 6, boxShadow: '0 8px 24px rgba(10,25,47,0.18)', zIndex: 30, padding: 4 }}>
          <div style={{ padding: '12px 14px 8px' }}>
            <div style={{ fontFamily: "'Inter', sans-serif", fontWeight: 600, fontSize: '0.95rem', color: '#1C2333' }}>{userName}</div>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '0.74rem', color: '#4A5568', marginTop: 2 }}>{userEmail}</div>
            <span style={{ display: 'inline-block', marginTop: 8, background: role === 'Owner' ? '#D9EAF5' : '#F5F2EC', color: role === 'Owner' ? '#2E6494' : '#4A5568', padding: '3px 10px', borderRadius: 999, fontSize: '0.66rem', fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase' }}>{role}</span>
          </div>
          <div style={{ height: 1, background: '#EDE9E0', margin: '4px 0' }} />
          <a role="menuitem" href="#" onClick={(e) => e.preventDefault()} style={{ display: 'block', padding: '10px 14px', color: '#1C2333', fontFamily: "'Inter', sans-serif", fontSize: '0.85rem', textDecoration: 'none', borderRadius: 4 }} onMouseEnter={e => e.currentTarget.style.background = '#F5F2EC'} onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>Account</a>
          <a role="menuitem" href="/ui_kits/website/login.html?logout=1" onClick={(e) => { e.preventDefault(); handleSignOut(); }} style={{ display: 'block', padding: '10px 14px', color: '#9B2335', fontFamily: "'Inter', sans-serif", fontSize: '0.85rem', textDecoration: 'none', borderRadius: 4 }} onMouseEnter={e => e.currentTarget.style.background = '#F5F2EC'} onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>Sign out</a>
        </div>
      )}
    </div>
  );
};

/* ── TopBar ── */
function AdminTopBar(props) {
  return (
    React.createElement('header', { className: 'topbar' },
      React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 14 } },
        React.createElement('span', { className: 'topbar-clinic' }, CLINIC.name),
        React.createElement('span', { style: { width: 1, height: 18, background: 'var(--rr-parchment)' } }),
        React.createElement('nav', { className: 'topbar-crumb' },
          props.breadcrumb.map(function(b, i) {
            return React.createElement(React.Fragment, { key: i },
              i > 0 && React.createElement('span', { className: 'sep' }, '\u203A'),
              React.createElement('span', { className: i === props.breadcrumb.length - 1 ? 'last' : undefined }, b)
            );
          })
        )
      ),
      React.createElement('div', { className: 'topbar-right' },
        React.createElement('span', { className: 'topbar-pill' }, 'Production \u00B7 ' + CLINIC.slug),
        React.createElement(OwnerPill, null)
      )
    )
  );
}

/* ── Stub Dialog ── */
function StubDialog(props) {
  if (!props.open) return null;
  return React.createElement('div', { className: 'stub-dialog', onClick: props.onClose },
    React.createElement('div', { className: 'stub-dialog-box', onClick: function(e) { e.stopPropagation(); } },
      React.createElement('h3', null, props.title || 'Coming soon'),
      React.createElement('p', null, 'This action is not yet wired in the prototype. It will be available in the production release.'),
      React.createElement('button', { className: 'stub-dialog-close', onClick: props.onClose }, 'Close')
    )
  );
}

/* ── Waveform Player ── */
