<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Services · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../../../colors_and_type.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="../../../lib/console-tap.js"></script>
<style>
  html, body { margin: 0; }
  body { background: var(--rr-warm-white); min-height: 100vh; }
  .shell { display: flex; min-height: 100vh; }
  .stage { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .stage > .body { padding: 28px 32px; display: flex; flex-direction: column; gap: 20px; max-width: 1280px; margin: 0 auto; width: 100%; box-sizing: border-box; }

  .topbar-stub { height: 64px; padding: 0 28px; background: #fff; border-bottom: 1px solid var(--rr-parchment); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; font-family: var(--font-ui); }
  .topbar-clinic { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: .9rem; color: var(--rr-navy-800); letter-spacing: -.01em; }
  .topbar-crumb { display: inline-flex; align-items: center; gap: 8px; font-size: .82rem; color: var(--rr-slate-dark); }
  .topbar-crumb .sep { color: #C8CCCC; }
  .topbar-crumb .last { color: var(--rr-ink); font-weight: 500; }
  .topbar-pill { font-family: var(--font-mono); font-size: .68rem; color: var(--rr-slate-dark); padding: 3px 10px; border-radius: 999px; background: var(--rr-off-white); border: 1px solid var(--rr-parchment); letter-spacing: .04em; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }

  .page-title { font-family: var(--font-display); font-weight: 800; font-size: 1.8rem; color: var(--rr-navy-800); letter-spacing: -.025em; margin: 0 0 4px; }
  .page-sub { font-family: var(--font-ui); font-size: .9rem; color: var(--rr-slate-dark); max-width: 64ch; line-height: 1.5; }
  .overline { font-family: var(--font-ui); font-size: .68rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--rr-slate-dark); }

  .panel { background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; box-shadow: var(--shadow-xs); }

  .svc-table { width: 100%; border-collapse: collapse; font-family: var(--font-ui); font-size: .88rem; }
  .svc-table th { text-align: left; padding: 12px 16px; font-size: .72rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--rr-slate-dark); border-bottom: 1px solid var(--rr-parchment); }
  .svc-table td { padding: 14px 16px; border-bottom: 1px solid var(--rr-parchment); color: var(--rr-ink); }
  .svc-table tr:last-child td { border-bottom: none; }
  .svc-table .mono { font-family: var(--font-mono); font-size: .82rem; }

  .switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; display: inline-block; }
  .switch input { opacity: 0; width: 0; height: 0; position: absolute; }
  .switch-track { position: absolute; inset: 0; background: var(--rr-mist); border-radius: 999px; cursor: pointer; transition: background-color 200ms ease; }
  .switch-track::before { content: ''; position: absolute; left: 2px; top: 2px; width: 16px; height: 16px; background: #fff; border-radius: 999px; box-shadow: var(--shadow-xs); transition: transform 200ms ease; }
  .switch input:checked + .switch-track { background: hsl(var(--primary)); }
  .switch input:checked + .switch-track::before { transform: translateX(16px); }

  .toggle-cell { display: flex; align-items: center; gap: 8px; }
  .toggle-label-on { font-weight: 500; color: hsl(var(--primary)); }
  .toggle-label-off { font-weight: 500; color: var(--rr-slate-dark); }

  .save-bar { background: rgba(255,255,255,0.96); border-top: 1px solid var(--rr-parchment); padding: 14px 24px; display: flex; align-items: center; justify-content: flex-end; border-radius: 0 0 6px 6px; }
  .btn-primary { font-family: var(--font-ui); font-size: .88rem; font-weight: 500; padding: 9px 18px; border-radius: 6px; background: var(--rr-navy); color: #fff; border: none; cursor: pointer; transition: background-color 200ms ease; }
  .btn-primary:hover { background: var(--rr-navy-800); }
</style>
</head>
<body>
<div id="root"></div>

<script src="../../../data/clinics.js"></script>
<script src="../../../data/admin_mock.js"></script>
<script src="../../../data/ai_config.js"></script>
<script src="../../../data/services.js"></script>
<script src="../../../lib/query.js"></script>
<script src="../../../lib/auth.js"></script>
<script type="text/babel" src="AdminSidebar.jsx"></script>
<script type="text/babel" src="../TopBar.jsx"></script>
<script type="text/babel">
window.RRD?.requireSession?.();

const OwnerPill = () => {
  const session = (window.RRD && window.RRD.getSession && window.RRD.getSession()) || {};
  const userName = session.full_name || 'Demo User';
  const userEmail = session.email || '';
  const role = session.role || 'Demo';
  const initials = userName.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
  const [menuOpen, setMenuOpen] = React.useState(false);
  React.useEffect(() => {
    if (!menuOpen) return undefined;
    const handler = (e) => {
      const pill = document.getElementById('rrd-profile-pill');
      const menu = document.getElementById('rrd-profile-menu');
      if (pill && pill.contains(e.target)) return;
      if (menu && menu.contains(e.target)) return;
      setMenuOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [menuOpen]);
  const handleSignOut = () => {
    try { if (window.RRD && window.RRD.logout) window.RRD.logout(); } catch (_) {}
    window.location.href = '/ui_kits/website/login.html?logout=1';
  };
  return (
    <div style={{ position: 'relative' }}>
      <button id="rrd-profile-pill" type="button" title={userEmail} aria-expanded={menuOpen} aria-controls="rrd-profile-menu" onClick={() => setMenuOpen(o => !o)} style={{ width: 32, height: 32, borderRadius: 999, background: '#3A7FBD', color: '#fff', border: 'none', cursor: 'pointer', fontWeight: 600, fontSize: '0.72rem' }}>{initials}</button>
      {menuOpen && (
        <div id="rrd-profile-menu" role="menu" style={{ position: 'absolute', top: '100%', right: 0, marginTop: 6, width: 240, background: '#fff', border: '1px solid #EDE9E0', borderRadius: 6, boxShadow: '0 8px 24px rgba(10,25,47,0.18)', zIndex: 30, padding: 4 }}>
          <div style={{ padding: '12px 14px 8px' }}>
            <div style={{ fontFamily: "'Inter', sans-serif", fontWeight: 600, fontSize: '0.95rem', color: '#1C2333' }}>{userName}</div>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '0.74rem', color: '#4A5568', marginTop: 2 }}>{userEmail}</div>
            <span style={{ display: 'inline-block', marginTop: 8, background: role === 'Owner' ? '#D9EAF5' : '#F5F2EC', color: role === 'Owner' ? '#2E6494' : '#4A5568', padding: '3px 10px', borderRadius: 999, fontSize: '0.66rem', fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase' }}>{role}</span>
          </div>
          <div style={{ height: 1, background: '#EDE9E0', margin: '4px 0' }} />
          <a role="menuitem" href="#" onClick={(e) => e.preventDefault()} style={{ display: 'block', padding: '10px 14px', color: '#1C2333', fontFamily: "'Inter', sans-serif", fontSize: '0.85rem', textDecoration: 'none', borderRadius: 4 }} onMouseEnter={e => e.currentTarget.style.background = '#F5F2EC'} onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>Account</a>
          <a role="menuitem" href="/ui_kits/website/login.html?logout=1" onClick={(e) => { e.preventDefault(); handleSignOut(); }} style={{ display: 'block', padding: '10px 14px', color: '#9B2335', fontFamily: "'Inter', sans-serif", fontSize: '0.85rem', textDecoration: 'none', borderRadius: 4 }} onMouseEnter={e => e.currentTarget.style.background = '#F5F2EC'} onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>Sign out</a>
        </div>
      )}
    </div>
  );
};

function Body() {
  const clinicId = (window.RRD && window.RRD.getCurrentClinicId && window.RRD.getCurrentClinicId()) || 'northeast-denture-clinic';
  const clinics = window.CLINICS || {};
  const CLINIC = (clinics || []).find(c => c.id === clinicId) || { name: 'Northeast Denture Clinic', slug: 'northeast-denture-clinic' };
  const config = (window.AI_CONFIG && window.AI_CONFIG[clinicId]) || {};
  const services = window.SERVICES || [];

  const [bookableIds, setBookableIds] = React.useState(() => new Set(config.ai_bookable_service_ids || []));

  // Re-sync when clinic changes
  React.useEffect(() => {
    const handler = () => {
      const newId = window.RRD.getCurrentClinicId();
      const newConfig = (window.AI_CONFIG && window.AI_CONFIG[newId]) || {};
      setBookableIds(new Set(newConfig.ai_bookable_service_ids || []));
    };
    window.addEventListener('clinic-changed', handler);
    return () => window.removeEventListener('clinic-changed', handler);
  }, []);

  const toggle = (svcId) => {
    setBookableIds(prev => {
      const next = new Set(prev);
      if (next.has(svcId)) next.delete(svcId); else next.add(svcId);
      return next;
    });
  };

  const fmt = (price) => '$' + price.toFixed(2);

  const breadcrumb = ['Dental AI', 'Configuration', 'Services'];

  return (
    <div className="shell">
      <AdminSidebar active="services" clinicName={CLINIC.name} clinicSlug={CLINIC.slug} />
      <div className="stage">
        <TopBar breadcrumb={breadcrumb} clinicName={CLINIC.name} homeHref="../dashboard.html" mode="AI Receptionist" />

        <div className="body">
          <div>
            <div className="overline">Configuration</div>
            <h1 className="page-title">The Service catalogue</h1>
            <p className="page-sub">Pick which of your services the AI is allowed to book over the phone. Anything left off stays front-desk only.</p>
          </div>

          <div className="panel">
            {/* Service catalogue — first row is SVC-001 Recall Exam */}
            <table className="svc-table">
              <thead>
                <tr>
                  <th>Service ID</th>
                  <th>Name</th>
                  <th>Duration</th>
                  <th>Base price</th>
                  <th>AI Bookable</th>
                </tr>
              </thead>
              <tbody>
                {services.map(svc => {
                  const on = bookableIds.has(svc.id);
                  return (
                    <tr key={svc.id}>
                      <td className="mono">{svc.id}</td>
                      <td>{svc.name}</td>
                      <td>{svc.duration_min} min</td>
                      <td>{fmt(svc.base_price)}</td>
                      <td>
                        <div className="toggle-cell">
                          <label className="switch">
                            <input type="checkbox" checked={on} onChange={() => toggle(svc.id)} aria-label={`Toggle AI bookable for ${svc.name}`} />
                            <span className="switch-track" />
                          </label>
                          <span className={on ? 'toggle-label-on' : 'toggle-label-off'}>{on ? 'AI Bookable' : 'Front-desk only'}</span>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            <div className="save-bar">
              <button type="button" className="btn-primary">Save service catalogue</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Body />);

// console-tap render beacon — deferred so React 18 mount completes
setTimeout(function () {
  try {
    var root = document.getElementById('root');
    var rootChildren = root ? root.children.length : -1;
    var firstTag = (root && root.firstElementChild) ? root.firstElementChild.tagName : null;
    var bodyBg = getComputedStyle(document.body).backgroundColor;
    fetch('/__log__', { method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ kind: 'render-reached', url: location.pathname,
        rootChildren: rootChildren, firstTag: firstTag, bodyBg: bodyBg,
        title: document.title, readyState: document.readyState }) });
  } catch(_){}
}, 250);

</script>
</body>
</html>
