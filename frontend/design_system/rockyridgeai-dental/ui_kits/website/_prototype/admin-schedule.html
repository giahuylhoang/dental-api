<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Schedule · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../../../colors_and_type.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="../../../lib/console-tap.js"></script>
<style>
  html, body { margin: 0; }
  body { background: var(--rr-warm-white); min-height: 100vh; }
  .shell { display: flex; min-height: 100vh; }
  .stage { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .stage > .body { padding: 28px 32px; display: flex; flex-direction: column; gap: 20px; max-width: 1280px; margin: 0 auto; width: 100%; box-sizing: border-box; }

  .topbar-stub { height: 64px; padding: 0 28px; background: #fff; border-bottom: 1px solid var(--rr-parchment); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; font-family: var(--font-ui); }
  .topbar-clinic { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: .9rem; color: var(--rr-navy-800); letter-spacing: -.01em; }
  .topbar-crumb { display: inline-flex; align-items: center; gap: 8px; font-size: .82rem; color: var(--rr-slate-dark); }
  .topbar-crumb .sep { color: #C8CCCC; }
  .topbar-crumb .last { color: var(--rr-ink); font-weight: 500; }
  .topbar-pill { font-family: var(--font-mono); font-size: .68rem; color: var(--rr-slate-dark); padding: 3px 10px; border-radius: 999px; background: var(--rr-off-white); border: 1px solid var(--rr-parchment); letter-spacing: .04em; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .topbar-avatar { width: 32px; height: 32px; border-radius: 999px; background: hsl(var(--primary)); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; font-size: .72rem; }

  .overline { font-family: var(--font-ui); font-size: .68rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--rr-slate-dark); }
  .page-title { font-family: var(--font-display); font-weight: 800; font-size: 1.8rem; color: var(--rr-navy-800); letter-spacing: -.025em; margin: 0 0 4px; }
  .page-sub { font-family: var(--font-ui); font-size: .9rem; color: var(--rr-slate-dark); max-width: 64ch; line-height: 1.5; margin: 0; }
  .page-helper { font-family: var(--font-ui); font-size: .85rem; color: var(--rr-slate-dark); line-height: 1.5; margin: 0; }

  .panel { background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; padding: 22px 24px; box-shadow: var(--shadow-xs); }

  .date-row { display: flex; align-items: center; gap: 12px; }
  .d-input { font-family: var(--font-ui); font-size: .9rem; padding: 9px 12px; border: 1.5px solid var(--rr-mist); border-radius: 6px; background: #fff; color: var(--rr-ink); }
  .d-input:focus { border-color: hsl(var(--ring)); outline: none; box-shadow: 0 0 0 3px hsl(var(--primary) / 0.12); }

  .cache-line { font-family: var(--font-mono); font-size: .75rem; color: var(--rr-slate-dark); margin: 0; }

  .empty-state { font-family: var(--font-ui); font-size: .9rem; color: var(--rr-slate-dark); text-align: center; padding: 48px 24px; }

  /* Day grid */
  .day-grid-wrap { overflow-x: auto; }
  .day-grid { display: grid; gap: 0; min-width: 600px; border: 1px solid var(--rr-parchment); border-radius: 6px; overflow: hidden; }
  .day-grid-header { display: contents; }
  .day-grid-header > div { background: var(--rr-off-white); font-family: var(--font-ui); font-size: .78rem; font-weight: 600; color: var(--rr-navy-800); padding: 10px 12px; border-bottom: 1px solid var(--rr-parchment); }
  .time-col { background: var(--rr-off-white); font-family: var(--font-mono); font-size: .72rem; color: var(--rr-slate-dark); padding: 4px 10px; border-right: 1px solid var(--rr-parchment); border-bottom: 1px solid var(--rr-parchment); display: flex; align-items: flex-start; min-height: 48px; }
  .provider-col { position: relative; border-bottom: 1px solid var(--rr-parchment); min-height: 48px; }
  .provider-col:not(:last-child) { border-right: 1px solid var(--rr-parchment); }

  .appt-card { position: absolute; left: 4px; right: 4px; border-radius: 4px; padding: 6px 8px; overflow: hidden; cursor: default; z-index: 1; border: 1px solid var(--rr-parchment); }
  .appt-card.ai { background: #EBF4FA; border-color: #B8D4E8; }
  .appt-card.front-desk { background: #F5F3EF; border-color: #DDD8CE; }
  .appt-card.clickable { cursor: pointer; }
  .appt-card.clickable:hover { box-shadow: 0 2px 8px rgba(10,25,47,0.12); }
  .appt-name { font-family: var(--font-ui); font-size: .78rem; font-weight: 600; color: var(--rr-navy-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .appt-proc { font-family: var(--font-ui); font-size: .7rem; color: var(--rr-slate-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .appt-pill { position: absolute; top: 4px; right: 6px; font-family: var(--font-ui); font-size: .6rem; font-weight: 600; letter-spacing: .04em; padding: 2px 6px; border-radius: 999px; white-space: nowrap; }
  .appt-pill.ai { background: #D6EAF5; color: #1A5276; }
  .appt-pill.front-desk { background: #E8E5DF; color: #3D4D61; }

  /* Stub dialog */
  .dialog-overlay { position: fixed; inset: 0; background: rgba(10,25,47,0.35); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .dialog-box { background: #fff; border-radius: 6px; padding: 24px 28px; max-width: 400px; width: 90%; box-shadow: 0 8px 32px rgba(10,25,47,0.18); }
  .dialog-box h3 { font-family: var(--font-display); font-weight: 700; font-size: 1rem; color: var(--rr-navy-800); margin: 0 0 8px; }
  .dialog-box p { font-family: var(--font-ui); font-size: .88rem; color: var(--rr-slate-dark); margin: 0 0 16px; line-height: 1.5; }
  .dialog-close { font-family: var(--font-ui); font-size: .85rem; padding: 8px 16px; border-radius: 6px; background: var(--rr-navy); color: #fff; border: none; cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>

<script src="../../../data/clinics.js"></script>
<script src="../../../data/admin_mock.js"></script>
<script src="../../../data/ai_config.js"></script>
<script src="../../../lib/query.js"></script>
<script src="../../../lib/auth.js"></script>
<script type="text/babel" src="AdminSidebar.jsx"></script>
<script type="text/babel" src="../TopBar.jsx"></script>
<script type="text/babel">
window.RRD?.requireSession?.();

const { CLINIC, APPOINTMENTS } = window.ADMIN_MOCK;

const OwnerPill = () => {
  const session = (window.RRD && window.RRD.getSession && window.RRD.getSession()) || {};
  const userName = session.full_name || 'Demo User';
  const userEmail = session.email || '';
  const role = session.role || 'Demo';
  const initials = userName.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
  const [menuOpen, setMenuOpen] = React.useState(false);
  React.useEffect(() => {
    if (!menuOpen) return undefined;
    const handler = (e) => {
      const pill = document.getElementById('rrd-profile-pill');
      const menu = document.getElementById('rrd-profile-menu');
      if (pill && pill.contains(e.target)) return;
      if (menu && menu.contains(e.target)) return;
      setMenuOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [menuOpen]);
  const handleSignOut = () => {
    try { if (window.RRD && window.RRD.logout) window.RRD.logout(); } catch (_) {}
    window.location.href = '/ui_kits/website/login.html?logout=1';
  };
  return (
    <div style={{ position: 'relative' }}>
      <button id="rrd-profile-pill" type="button" title={userEmail} aria-expanded={menuOpen} aria-controls="rrd-profile-menu" onClick={() => setMenuOpen(o => !o)} style={{ width: 32, height: 32, borderRadius: 999, background: '#3A7FBD', color: '#fff', border: 'none', cursor: 'pointer', fontWeight: 600, fontSize: '0.72rem' }}>{initials}</button>
      {menuOpen && (
        <div id="rrd-profile-menu" role="menu" style={{ position: 'absolute', top: '100%', right: 0, marginTop: 6, width: 240, background: '#fff', border: '1px solid #EDE9E0', borderRadius: 6, boxShadow: '0 8px 24px rgba(10,25,47,0.18)', zIndex: 30, padding: 4 }}>
          <div style={{ padding: '12px 14px 8px' }}>
            <div style={{ fontFamily: "'Inter', sans-serif", fontWeight: 600, fontSize: '0.95rem', color: '#1C2333' }}>{userName}</div>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '0.74rem', color: '#4A5568', marginTop: 2 }}>{userEmail}</div>
            <span style={{ display: 'inline-block', marginTop: 8, background: role === 'Owner' ? '#D9EAF5' : '#F5F2EC', color: role === 'Owner' ? '#2E6494' : '#4A5568', padding: '3px 10px', borderRadius: 999, fontSize: '0.66rem', fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase' }}>{role}</span>
          </div>
          <div style={{ height: 1, background: '#EDE9E0', margin: '4px 0' }} />
          <a role="menuitem" href="#" onClick={(e) => e.preventDefault()} style={{ display: 'block', padding: '10px 14px', color: '#1C2333', fontFamily: "'Inter', sans-serif", fontSize: '0.85rem', textDecoration: 'none', borderRadius: 4 }} onMouseEnter={e => e.currentTarget.style.background = '#F5F2EC'} onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>Account</a>
          <a role="menuitem" href="/ui_kits/website/login.html?logout=1" onClick={(e) => { e.preventDefault(); handleSignOut(); }} style={{ display: 'block', padding: '10px 14px', color: '#9B2335', fontFamily: "'Inter', sans-serif", fontSize: '0.85rem', textDecoration: 'none', borderRadius: 4 }} onMouseEnter={e => e.currentTarget.style.background = '#F5F2EC'} onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>Sign out</a>
        </div>
      )}
    </div>
  );
};

function AdminTopBar({ breadcrumb }) {
  return (
    <TopBar breadcrumb={breadcrumb} clinicName={CLINIC.name} homeHref="../dashboard.html" mode="AI Receptionist" />
  );
}

function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function parseTime(t) {
  var p = t.split(':');
  return parseInt(p[0],10) * 60 + parseInt(p[1],10);
}

function fmtTime(mins) {
  return String(Math.floor(mins/60)).padStart(2,'0') + ':' + String(mins%60).padStart(2,'0');
}

function Body() {
  var _s = React.useState;
  var dateRef = _s(todayStr());
  var date = dateRef[0]; var setDate = dateRef[1];
  var dialogRef = _s(null);
  var dialog = dialogRef[0]; var setDialog = dialogRef[1];

  var filtered = APPOINTMENTS.filter(function(a) {
    return a.time_start && a.time_start.slice(0,10) === date;
  });

  var providers = [];
  var seen = {};
  filtered.forEach(function(a) {
    if (a.provider && !seen[a.provider]) { seen[a.provider] = true; providers.push(a.provider); }
  });

  var gridStart = 9 * 60;
  var gridEnd = 19 * 60;
  filtered.forEach(function(a) {
    var s = parseTime(a.time_start.slice(11,16));
    var e = parseTime(a.time_end.slice(11,16));
    if (s < gridStart) gridStart = Math.floor(s / 30) * 30;
    if (e > gridEnd) gridEnd = Math.ceil(e / 30) * 30;
  });

  var slots = [];
  for (var m = gridStart; m < gridEnd; m += 30) slots.push(m);
  var rowH = 48;

  var now = new Date();
  var fetchedAt = now.toISOString().replace('T',' ').slice(0,19);

  function handleClick(appt) {
    if (appt.booked_by === 'ai' && appt.source_call_id) {
      window.location.href = 'admin-call-detail.html?call_id=' + encodeURIComponent(appt.source_call_id);
    } else {
      setDialog(appt);
    }
  }

  var colCount = providers.length || 1;
  var gridCols = '60px ' + providers.map(function() { return '1fr'; }).join(' ');
  if (!providers.length) gridCols = '60px 1fr';

  return (
    <div className="shell">
      <AdminSidebar active="schedule" clinicName={CLINIC.name} clinicSlug={CLINIC.slug} />
      <div className="stage">
        <TopBar breadcrumb={['Dental AI', 'Practice', 'Schedule']} clinicName={CLINIC.name} homeHref="../dashboard.html" mode="AI Receptionist" />
        <div className="body">
          <div>
            <div className="overline">Practice</div>
            <h1 className="page-title">The Schedule</h1>
            <p className="page-sub">A read-only mirror of the day's appointments, showing what the AI booked alongside what the front desk entered.</p>
          </div>

          <p className="page-helper">Today's appointments (read-only). Your practice management system is the source of truth.</p>

          <div className="date-row">
            <label style={{ fontFamily: 'var(--font-ui)', fontSize: '.82rem', fontWeight: 600, color: 'var(--rr-ink)' }}>Date</label>
            <input className="d-input" type="date" value={date} onChange={function(e){ setDate(e.target.value); }} />
          </div>

          <div className="panel" style={{ padding: 0, overflow: 'hidden' }}>
            {filtered.length === 0 ? (
              <div className="empty-state">
                {APPOINTMENTS.length === 0 && providers.length === 0
                  ? 'Nothing on the books for this day.'
                  : 'Nothing on the books for this day.'}
              </div>
            ) : (
              <div className="day-grid-wrap">
                <div className="day-grid" style={{ gridTemplateColumns: gridCols }}>
                  {/* Header row */}
                  <div style={{ background: 'var(--rr-off-white)', borderBottom: '1px solid var(--rr-parchment)', borderRight: '1px solid var(--rr-parchment)', padding: '10px 12px' }}></div>
                  {providers.map(function(p) {
                    return <div key={p} className="day-grid-header"><div>{p}</div></div>;
                  })}

                  {/* Time rows */}
                  {slots.map(function(slotMin) {
                    return (
                      <React.Fragment key={slotMin}>
                        <div className="time-col">{fmtTime(slotMin)}</div>
                        {providers.map(function(prov) {
                          var cellAppts = filtered.filter(function(a) {
                            var s = parseTime(a.time_start.slice(11,16));
                            return a.provider === prov && s >= slotMin && s < slotMin + 30;
                          });
                          return (
                            <div key={prov} className="provider-col">
                              {cellAppts.map(function(appt) {
                                var s = parseTime(appt.time_start.slice(11,16));
                                var e = parseTime(appt.time_end.slice(11,16));
                                var top = ((s - slotMin) / 30) * rowH;
                                var h = Math.max(((e - s) / 30) * rowH - 4, 24);
                                var isAi = appt.booked_by === 'ai';
                                var clickable = isAi && appt.source_call_id;
                                return (
                                  <div
                                    key={appt.id}
                                    className={'appt-card ' + (isAi ? 'ai' : 'front-desk') + (clickable ? ' clickable' : '')}
                                    style={{ top: top, height: h }}
                                    onClick={function(){ handleClick(appt); }}
                                    role={clickable ? 'link' : undefined}
                                    tabIndex={0}
                                  >
                                    <span className={'appt-pill ' + (isAi ? 'ai' : 'front-desk')}>{isAi ? 'AI' : 'Front desk'}</span>
                                    <div className="appt-name">{appt.patient_name}</div>
                                    <div className="appt-proc">{appt.procedure}</div>
                                  </div>
                                );
                              })}
                            </div>
                          );
                        })}
                      </React.Fragment>
                    );
                  })}
                </div>
              </div>
            )}
          </div>

          <p className="cache-line">Fetched at {fetchedAt} · cache 30s</p>
        </div>
      </div>

      {dialog && (
        <div className="dialog-overlay" onClick={function(){ setDialog(null); }}>
          <div className="dialog-box" onClick={function(e){ e.stopPropagation(); }}>
            <h3>{dialog.patient_name}</h3>
            <p>This appointment was booked by the front desk.</p>
            <button className="dialog-close" onClick={function(){ setDialog(null); }}>Close</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Body />);

// console-tap render beacon — deferred so React 18 mount completes
setTimeout(function () {
  try {
    var root = document.getElementById('root');
    var rootChildren = root ? root.children.length : -1;
    var firstTag = (root && root.firstElementChild) ? root.firstElementChild.tagName : null;
    var bodyBg = getComputedStyle(document.body).backgroundColor;
    fetch('/__log__', { method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ kind: 'render-reached', url: location.pathname,
        rootChildren: rootChildren, firstTag: firstTag, bodyBg: bodyBg,
        title: document.title, readyState: document.readyState }) });
  } catch(_){}
}, 250);

</script>
</body>
</html>
