<!DOCTYPE html>
<html lang="en" class="">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Settings · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="../../lib/console-tap.js"></script>
<style>
  html, body { margin: 0; }
  body { background: var(--rr-warm-white); min-height: 100vh; }
  .shell { display: flex; min-height: 100vh; }
  .stage { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .stage > .body { padding: 28px 32px; display: flex; flex-direction: column; gap: 24px; max-width: 1280px; margin: 0 auto; width: 100%; box-sizing: border-box; }
  .page-header { display: flex; justify-content: space-between; align-items: center; }
  .page-title { font-family: var(--font-display); font-weight: 800; font-size: 1.8rem; color: var(--rr-navy-800); letter-spacing: -.025em; margin: 0 0 4px; }
  .page-sub { font-family: var(--font-ui); font-size: .88rem; color: var(--rr-slate-dark); }
  .panel { background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; padding: 22px 24px; box-shadow: var(--shadow-xs); }
  .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .panel-h-title { font-family: var(--font-display); font-weight: 700; font-size: 1.05rem; color: var(--rr-navy-800); }
  .tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--rr-parchment); margin-bottom: 0; overflow-x: auto; }
  .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; padding: 10px 16px; font-family: var(--font-ui); font-size: .82rem; font-weight: 500; color: var(--rr-slate-dark); cursor: pointer; white-space: nowrap; }
  .tab-btn.active { color: hsl(var(--primary)); border-bottom-color: hsl(var(--primary)); font-weight: 600; }
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .lbl { font-family: var(--font-ui); font-size: .78rem; font-weight: 600; color: var(--rr-ink); }
  .d-input { font-family: var(--font-ui); font-size: .9rem; padding: 10px 12px; border: 1.5px solid var(--rr-mist); border-radius: 6px; width: 100%; box-sizing: border-box; background: #fff; color: var(--rr-ink); }
  .d-input:focus { border-color: hsl(var(--ring)); outline: none; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  table.list { width: 100%; border-collapse: collapse; font-family: var(--font-ui); font-size: .85rem; }
  table.list th { text-align: left; padding: 10px 12px; color: var(--rr-slate-dark); font-size: .68rem; letter-spacing: .08em; text-transform: uppercase; border-bottom: 1px solid var(--rr-parchment); font-weight: 600; }
  table.list td { padding: 12px; border-bottom: 1px solid var(--rr-parchment); vertical-align: middle; }
  table.list tr:last-child td { border-bottom: none; }
  .pill { font-size: .66rem; font-weight: 600; padding: 3px 10px; border-radius: 999px; letter-spacing: .06em; text-transform: uppercase; display: inline-block; }
  .pill-active { background: #E8F5EE; color: #2A7D4F; }
  .pill-inactive { background: #F5F2EC; color: #4A5568; }
  .pill-connected { background: #E8F5EE; color: #2A7D4F; }
  .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--rr-parchment); }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-label { font-family: var(--font-ui); font-size: .88rem; color: var(--rr-ink); }
  .toggle-sub { font-family: var(--font-ui); font-size: .74rem; color: var(--rr-slate-dark); margin-top: 2px; }
  .int-card { border: 1px solid var(--rr-parchment); border-radius: 6px; padding: 16px 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .int-name { font-family: var(--font-ui); font-weight: 600; font-size: .9rem; color: var(--rr-navy-800); }
  .int-desc { font-family: var(--font-ui); font-size: .76rem; color: var(--rr-slate-dark); margin-top: 2px; }
  .id-cell { font-family: var(--font-mono); font-size: .76rem; color: var(--rr-slate-dark); }
  .toast-ctr { position: fixed; bottom: 24px; right: 24px; z-index: 100; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
  .toast-msg { background: var(--rr-navy-800); color: var(--rr-warm-white); padding: 12px 18px; border-radius: 6px; font-family: var(--font-ui); font-size: .85rem; box-shadow: 0 4px 16px rgba(10,25,47,0.22); pointer-events: auto; animation: toast-in 240ms cubic-bezier(0.16,1,0.3,1); max-width: 380px; }
  @keyframes toast-in { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>
<script src="../../data/clinics.js"></script>
<script src="../../data/ai_config.js"></script>
<script src="../../data/services.js"></script>
<script src="../../lib/query.js"></script>
<script src="../../lib/auth.js"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="TopBar.jsx"></script>
<script type="text/babel">
window.RRD.requireSession?.();

const CURRENT_CLINIC_ID = (window.RRD?.getCurrentClinicId?.()) || (window.CLINICS?.[0]?.id) || null;
const AI_CONFIG_FOR_CURRENT = (CURRENT_CLINIC_ID && window.AI_CONFIG?.[CURRENT_CLINIC_ID]) || null;

const TABS = ['Clinic info','Working hours','Operatories','Providers','Users & roles','Integrations','Notifications','Audit log','AI Greeting','AI Routing','AI Services','AI Knowledge'];

const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

const OPERATORIES = [
  { name: 'Op 1', tags: ['chair','x-ray'], active: true },
  { name: 'Op 2', tags: ['chair','panoramic'], active: true },
  { name: 'Op 3', tags: ['chair'], active: false },
];

const PROVIDERS_DATA = (typeof window.PROVIDERS !== 'undefined' && window.PROVIDERS) || [
  { name: 'Dr. Hau Le',    title: 'Denturist',  specialty: 'Complete dentures', active: true },
  { name: 'Dr. Sara Osei', title: 'Dentist',    specialty: 'General dentistry', active: true },
  { name: 'Dr. Raj Patel', title: 'Hygienist',  specialty: 'Periodontics',      active: true },
];

const USERS_DATA = (typeof window.USERS !== 'undefined' && window.USERS) || [
  { full_name: 'Hau Le',       email: 'hau@oakdental.ca',   role: 'admin' },
  { full_name: 'Sara Osei',    email: 'sara@oakdental.ca',  role: 'provider' },
  { full_name: 'Mia Tran',     email: 'mia@oakdental.ca',   role: 'receptionist' },
];

const AUDIT_DATA = (typeof window.AUDIT_LOG !== 'undefined' && window.AUDIT_LOG) || [
  { action: 'UPDATE', entity: 'Patient #P-1042', user: 'Hau Le',  when: '2026-05-02 14:32' },
  { action: 'CREATE', entity: 'Invoice INV-2026-0418', user: 'Mia Tran', when: '2026-05-02 11:10' },
  { action: 'DELETE', entity: 'Appointment #A-0091', user: 'Sara Osei', when: '2026-05-01 09:44' },
];

const ROLE_COLORS = { admin: '#D9EAF5', provider: '#E8F5EE', receptionist: '#F5F2EC' };
const ROLE_TEXT   = { admin: '#2E6494', provider: '#2A7D4F', receptionist: '#4A5568' };

const SettingsPage = () => {
  const [tab, setTab] = React.useState(0);
  const [toasts, setToasts] = React.useState([]);
  const addToast = (msg) => { const id = Date.now(); setToasts(t => [...t, {id, msg}]); setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000); };

  return (
    <>
    <div className="shell">
      <Sidebar active="settings" />
      <div className="stage">
        <TopBar breadcrumb={['Settings']} />
        <div className="body">
          <div className="page-header">
            <div>
              <h1 className="page-title">Settings</h1>
              <p className="page-sub">Clinic configuration and system preferences</p>
            </div>
          </div>

          <div className="panel" style={{ padding: 0 }}>
            <div className="tab-bar" style={{ padding: '0 24px' }}>
              {TABS.map((t, i) => (
                <button key={t} className={`tab-btn${tab === i ? ' active' : ''}`} onClick={() => setTab(i)}>{t}</button>
              ))}
            </div>

            <div style={{ padding: '24px' }}>
              {tab === 0 && (
                <div style={{ maxWidth: 560 }}>
                  <div className="field-row">
                    <div className="field"><label className="lbl">Clinic name</label><input className="d-input" defaultValue="Oak Dental Calgary" /></div>
                    <div className="field"><label className="lbl">Display name</label><input className="d-input" defaultValue="Oak Dental" /></div>
                  </div>
                  <div className="field"><label className="lbl">Timezone</label><input className="d-input" defaultValue="America/Edmonton" /></div>
                  <div className="field"><label className="lbl">Address</label><input className="d-input" defaultValue="1234 Macleod Trail SE, Calgary, AB T2G 0A1" /></div>
                  <div className="field-row">
                    <div className="field"><label className="lbl">Contact phone</label><input className="d-input" defaultValue="+1 403 555 0100" /></div>
                    <div className="field"><label className="lbl">Booking notification email</label><input className="d-input" defaultValue="bookings@oakdental.ca" /></div>
                  </div>
                  <button className="btn btn-primary btn-sm" style={{ marginTop: 8 }} onClick={() => addToast('Clinic info saved.')}>Save changes</button>
                </div>
              )}

              {tab === 1 && (
                <table className="list">
                  <thead><tr><th>Day</th><th>Open</th><th>Close</th><th>Lunch start</th><th>Lunch end</th><th>Closed</th></tr></thead>
                  <tbody>
                    {DAYS.map((d, i) => (
                      <tr key={d}>
                        <td>{d}</td>
                        <td><input className="d-input" style={{ width: 80 }} defaultValue={i === 0 || i === 6 ? '—' : '08:00'} /></td>
                        <td><input className="d-input" style={{ width: 80 }} defaultValue={i === 0 || i === 6 ? '—' : '17:00'} /></td>
                        <td><input className="d-input" style={{ width: 80 }} defaultValue={i === 0 || i === 6 ? '—' : '12:00'} /></td>
                        <td><input className="d-input" style={{ width: 80 }} defaultValue={i === 0 || i === 6 ? '—' : '13:00'} /></td>
                        <td><input type="checkbox" defaultChecked={i === 0 || i === 6} /></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}

              {tab === 2 && (
                <table className="list">
                  <thead><tr><th>Name</th><th>Equipment tags</th><th>Active</th></tr></thead>
                  <tbody>
                    {OPERATORIES.map(o => (
                      <tr key={o.name}>
                        <td>{o.name}</td>
                        <td>{o.tags.map(t => <span key={t} className="pill" style={{ background: 'var(--rr-mist)', color: 'var(--rr-steel-700)', marginRight: 4 }}>{t}</span>)}</td>
                        <td><span className={o.active ? 'pill pill-active' : 'pill pill-inactive'}>{o.active ? 'Active' : 'Inactive'}</span></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}

              {tab === 3 && (
                <table className="list">
                  <thead><tr><th>Name</th><th>Title</th><th>Specialty</th><th>Status</th></tr></thead>
                  <tbody>
                    {PROVIDERS_DATA.map(p => (
                      <tr key={p.name}>
                        <td>{p.name}</td>
                        <td>{p.title}</td>
                        <td>{p.specialty}</td>
                        <td><span className={p.active ? 'pill pill-active' : 'pill pill-inactive'}>{p.active ? 'Active' : 'Inactive'}</span></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}

              {tab === 4 && (
                <table className="list">
                  <thead><tr><th>Name</th><th>Email</th><th>Role</th></tr></thead>
                  <tbody>
                    {USERS_DATA.map(u => (
                      <tr key={u.email}>
                        <td>{u.full_name}</td>
                        <td className="id-cell">{u.email}</td>
                        <td><span className="pill" style={{ background: ROLE_COLORS[u.role] || '#F5F2EC', color: ROLE_TEXT[u.role] || '#4A5568' }}>{u.role}</span></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}

              {tab === 5 && (
                <div>
                  {[
                    { name: 'Twilio', desc: 'SMS reminders and two-way messaging', connected: true },
                    { name: 'SMTP', desc: 'Outbound email notifications', connected: true },
                    { name: 'CDAnet', desc: 'Electronic dental claims (insurance)', connected: false },
                  ].map(int => (
                    <div key={int.name} className="int-card">
                      <div>
                        <div className="int-name">{int.name}</div>
                        <div className="int-desc">{int.desc}</div>
                      </div>
                      {int.connected
                        ? <span className="pill pill-connected">Connected</span>
                        : <button className="btn btn-ghost btn-sm" onClick={() => addToast('Integration connected.')}>Connect</button>}
                    </div>
                  ))}
                </div>
              )}

              {tab === 6 && (
                <div>
                  {[
                    { label: 'Booking confirmations', sub: 'Send SMS + email when appointment is booked', on: true },
                    { label: 'Recall reminders', sub: 'Automated recall outreach 7 days before due date', on: true },
                    { label: 'Lab updates', sub: 'Notify provider when lab case status changes', on: false },
                  ].map(n => (
                    <div key={n.label} className="toggle-row">
                      <div>
                        <div className="toggle-label">{n.label}</div>
                        <div className="toggle-sub">{n.sub}</div>
                      </div>
                      <input type="checkbox" defaultChecked={n.on} />
                    </div>
                  ))}
                </div>
              )}

              {tab === 7 && (
                <div style={{ maxHeight: 400, overflowY: 'auto' }}>
                  <table className="list">
                    <thead><tr><th>Action</th><th>Entity</th><th>User</th><th>When</th></tr></thead>
                    <tbody>
                      {AUDIT_DATA.map((a, i) => (
                        <tr key={i}>
                          <td><span className="pill" style={{ background: '#F5F2EC', color: '#4A5568' }}>{a.action}</span></td>
                          <td>{a.entity}</td>
                          <td>{a.user}</td>
                          <td className="id-cell">{a.when}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}

              {tab === 8 && (
                <div style={{ maxWidth: 720 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 14 }}>
                    <div>
                      <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: '1.05rem', color: 'var(--rr-navy-800)', marginBottom: 4 }}>The Greeting</div>
                      <div style={{ fontFamily: 'var(--font-ui)', fontSize: '0.82rem', color: 'var(--rr-slate-dark)' }}>What the AI says when it picks up a call.</div>
                    </div>
                    <span className={`pill ${AI_CONFIG_FOR_CURRENT?.greeting?.status === 'approved' ? 'pill-active' : 'pill-inactive'}`}>
                      {AI_CONFIG_FOR_CURRENT?.greeting?.status === 'approved' ? 'Auto-approval enabled' : 'Pending review'}
                    </span>
                  </div>

                  {(!AI_CONFIG_FOR_CURRENT?.greeting?.text) && (
                    <div style={{ background: '#FFF8E6', border: '1px solid #F4D58E', borderRadius: 6, padding: '10px 12px', fontFamily: 'var(--font-ui)', fontSize: '0.82rem', color: '#7A5B0E', marginBottom: 14 }}>
                      No custom greeting persisted yet. The agent uses the YAML default until you save one.
                    </div>
                  )}

                  <div className="field">
                    <label className="lbl">Greeting message</label>
                    <textarea
                      className="d-input"
                      rows={4}
                      defaultValue={AI_CONFIG_FOR_CURRENT?.greeting?.text || ''}
                      placeholder="Welcome to … How can I help you today?"
                      maxLength={400}
                      style={{ fontFamily: 'var(--font-ui)', resize: 'vertical' }}
                      onChange={(e) => {
                        const len = e.target.value.length;
                        const counter = document.getElementById('rrd-greeting-counter');
                        if (counter) {
                          counter.textContent = `${len} / 280 characters`;
                          counter.style.color = len > 280 ? '#9B2335' : (len > 240 ? '#B45309' : 'var(--rr-slate-dark)');
                        }
                      }}
                    />
                    <div id="rrd-greeting-counter" style={{ fontFamily: 'var(--font-mono)', fontSize: '0.74rem', color: 'var(--rr-slate-dark)', marginTop: 4 }}>0 / 280 characters</div>
                  </div>

                  <button className="btn btn-primary btn-sm" style={{ marginTop: 8 }} onClick={() => addToast('Greeting saved. Pending engineer review.')}>Save greeting</button>

                  <div style={{ marginTop: 24, paddingTop: 18, borderTop: '1px solid var(--rr-parchment)' }}>
                    <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: '0.95rem', color: 'var(--rr-navy-800)', marginBottom: 6 }}>Engineer approval</div>
                    <div style={{ fontFamily: 'var(--font-ui)', fontSize: '0.82rem', color: 'var(--rr-slate-dark)', lineHeight: 1.5, marginBottom: 12 }}>
                      First-time edits land as pending_review. An engineer (email allow-listed in GREETING_APPROVERS) must call /approve once per clinic; after that, edits auto-approve.
                    </div>
                    <button className="btn btn-ghost btn-sm" disabled
                            title="Only your engineering partner can click this — they'll do it once, then you're free to edit anytime."
                            style={{ opacity: 0.55, cursor: 'not-allowed' }}>
                      Approve clinic (engineer-gated)
                    </button>
                  </div>
                </div>
              )}

              {tab === 9 && (
                <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0,1.4fr) minmax(0,1fr)', gap: 24, alignItems: 'start' }}>
                  <div>
                    <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: '1.05rem', color: 'var(--rr-navy-800)', marginBottom: 4 }}>The Routing</div>
                    <div style={{ fontFamily: 'var(--font-ui)', fontSize: '0.82rem', color: 'var(--rr-slate-dark)', marginBottom: 16 }}>How calls flow between the front desk and the AI.</div>

                    <div className="field-row">
                      <div className="field">
                        <label className="lbl">Timezone</label>
                        <select className="d-input" defaultValue={AI_CONFIG_FOR_CURRENT?.routing?.timezone || 'America/Edmonton'}>
                          <option value="America/Edmonton">America/Edmonton</option>
                          <option value="America/Vancouver">America/Vancouver</option>
                          <option value="America/Toronto">America/Toronto</option>
                        </select>
                      </div>
                      <div className="field">
                        <label className="lbl">Ring timeout (seconds)</label>
                        <input className="d-input" type="number" min={0} max={30}
                               defaultValue={AI_CONFIG_FOR_CURRENT?.routing?.ring_timeout_seconds ?? 5} />
                        <span style={{ fontSize: '0.74rem', color: 'var(--rr-slate-dark)', marginTop: 4 }}>How long the front desk rings before the AI picks up.</span>
                      </div>
                    </div>

                    <div className="field">
                      <label className="lbl">Front desk numbers (comma-separated, E.164)</label>
                      <input className="d-input"
                             defaultValue={(AI_CONFIG_FOR_CURRENT?.routing?.front_desk_numbers || []).join(', ')}
                             placeholder="+15879738089" />
                      <span style={{ fontSize: '0.74rem', color: 'var(--rr-slate-dark)', marginTop: 4 }}>Example: +15879738089</span>
                    </div>

                    <div className="field">
                      <label className="lbl">Backup number (optional)</label>
                      <input className="d-input" defaultValue={AI_CONFIG_FOR_CURRENT?.routing?.backup_number || ''} />
                      <span style={{ fontSize: '0.74rem', color: 'var(--rr-slate-dark)', marginTop: 4 }}>Used when the front desk numbers don't answer.</span>
                    </div>

                    <div className="field">
                      <label className="lbl">AI SIP URI (read-only here; engineer-managed)</label>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <input className="d-input" disabled
                               value={AI_CONFIG_FOR_CURRENT?.routing?.ai_sip_uri || ''}
                               style={{ flex: 1, background: 'var(--rr-warm-white)', cursor: 'not-allowed' }} />
                        <span className="pill pill-inactive" title="Your engineering partner sets this up. You can copy it, but only they can change it.">Engineer-managed</span>
                      </div>
                    </div>

                    <div className="field">
                      <label className="lbl">Hours per weekday</label>
                      <span style={{ fontSize: '0.74rem', color: 'var(--rr-slate-dark)', marginBottom: 6 }}>Both blank means closed that day.</span>
                      <table className="list" style={{ marginTop: 6 }}>
                        <thead><tr><th>Day</th><th>Open</th><th>Close</th></tr></thead>
                        <tbody>
                          {['mon','tue','wed','thu','fri','sat','sun'].map(d => {
                            const hr = (AI_CONFIG_FOR_CURRENT?.routing?.hours?.[d]) || [];
                            return (
                              <tr key={d}>
                                <td style={{ textTransform: 'capitalize' }}>{d}</td>
                                <td><input className="d-input" style={{ width: 90 }} defaultValue={hr[0] || ''} placeholder="--:--" /></td>
                                <td><input className="d-input" style={{ width: 90 }} defaultValue={hr[1] || ''} placeholder="--:--" /></td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>

                    <div className="field">
                      <label className="lbl">Holidays (YYYY-MM-DD, one per line)</label>
                      <textarea className="d-input" rows={3}
                                defaultValue={(AI_CONFIG_FOR_CURRENT?.routing?.holidays || []).join('\n')}
                                style={{ fontFamily: 'var(--font-mono)' }} />
                      <span style={{ fontSize: '0.74rem', color: 'var(--rr-slate-dark)', marginTop: 4 }}>Add days you're closed beyond regular hours. The AI will follow the after-hours rule on these days.</span>
                    </div>

                    <div className="toggle-row">
                      <div>
                        <div className="toggle-label">AI handles after-hours calls</div>
                        <div className="toggle-sub">When you're closed, the AI takes the call instead of voicemail.</div>
                      </div>
                      <input type="checkbox" defaultChecked={!!AI_CONFIG_FOR_CURRENT?.routing?.ai_after_hours} />
                    </div>
                    <div className="toggle-row">
                      <div>
                        <div className="toggle-label">AI handles in-hours overflow</div>
                        <div className="toggle-sub">If the front desk can't pick up in time, the AI steps in.</div>
                      </div>
                      <input type="checkbox" defaultChecked={!!AI_CONFIG_FOR_CURRENT?.routing?.ai_in_hours_overflow} />
                    </div>

                    <button className="btn btn-primary btn-sm" style={{ marginTop: 14 }} onClick={() => addToast('Routing configuration saved.')}>Save routing</button>
                  </div>

                  <aside style={{ position: 'sticky', top: 16, background: 'var(--rr-warm-white)', border: '1px solid var(--rr-parchment)', borderRadius: 6, padding: 18 }}>
                    <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: '0.95rem', color: 'var(--rr-navy-800)', marginBottom: 8 }}>Preview</div>
                    <p style={{ fontFamily: 'var(--font-ui)', fontSize: '0.82rem', color: 'var(--rr-slate-dark)', lineHeight: 1.55, marginTop: 0 }}>
                      What would the agent do at a given moment, against the currently saved rules? (Save first if you want to preview a draft.)
                    </p>
                    <div className="field">
                      <label className="lbl">When (your local TZ)</label>
                      <input className="d-input" type="datetime-local" />
                    </div>
                    <div className="toggle-row" style={{ borderBottom: 'none', padding: '6px 0' }}>
                      <div className="toggle-label">Assume AI healthy</div>
                      <input type="checkbox" defaultChecked />
                    </div>
                    <button className="btn btn-ghost btn-sm" style={{ marginTop: 8 }} onClick={() => addToast('Routing preview would open here. Access requires engineer role.')}>Preview decision</button>
                  </aside>
                </div>
              )}

              {tab === 10 && (
                <div>
                  <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: '1.05rem', color: 'var(--rr-navy-800)', marginBottom: 4 }}>The Service catalogue</div>
                  <div style={{ fontFamily: 'var(--font-ui)', fontSize: '0.82rem', color: 'var(--rr-slate-dark)', marginBottom: 14 }}>
                    Pick which of your services the AI is allowed to book over the phone. Anything left off stays front-desk only.
                  </div>
                  {/* SVC-001 is the first service in the seed */}
                  <table className="list">
                    <thead><tr>
                      <th>Service ID</th>
                      <th>Name</th>
                      <th>Duration</th>
                      <th>Base price</th>
                      <th>AI Bookable</th>
                    </tr></thead>
                    <tbody>
                      {(window.SERVICES || []).map(s => {
                        const enabledIds = AI_CONFIG_FOR_CURRENT?.ai_bookable_service_ids || [];
                        const enabled = enabledIds.includes(s.id);
                        return (
                          <tr key={s.id}>
                            <td className="id-cell">{s.id}</td>
                            <td>{s.name}</td>
                            <td className="id-cell">{s.duration_min} min</td>
                            <td className="id-cell">${s.base_price.toFixed(2)}</td>
                            <td>
                              <label style={{ display: 'inline-flex', alignItems: 'center', gap: 8, cursor: 'pointer' }}>
                                <input type="checkbox" defaultChecked={enabled} />
                                <span className={`pill ${enabled ? 'pill-active' : 'pill-inactive'}`}>{enabled ? 'AI Bookable' : 'Front-desk only'}</span>
                              </label>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                  <button className="btn btn-primary btn-sm" style={{ marginTop: 14 }} onClick={() => addToast('Service catalogue saved.')}>Save service catalogue</button>
                </div>
              )}

              {/* Knowledge docs expected: denture_faq.md, practice_info.md */}
              {tab === 11 && (() => {
                const docs = AI_CONFIG_FOR_CURRENT?.knowledge_docs || [];
                const [openId, setOpenId] = React.useState(null);
                return (
                  <div>
                    <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: '1.05rem', color: 'var(--rr-navy-800)', marginBottom: 4 }}>The Knowledge base</div>
                    <div style={{ fontFamily: 'var(--font-ui)', fontSize: '0.82rem', color: 'var(--rr-slate-dark)', marginBottom: 14 }}>
                      Edit the AI knowledge base. AI uses these files as ground truth when answering caller questions.
                    </div>

                    {docs.length === 0 && (
                      <div style={{ background: 'var(--rr-warm-white)', border: '1px solid var(--rr-parchment)', borderRadius: 6, padding: 18, textAlign: 'center', fontFamily: 'var(--font-ui)', fontSize: '0.85rem', color: 'var(--rr-slate-dark)' }}>
                        No knowledge yet. Drop a markdown file in to give the agent something to draw on.
                      </div>
                    )}

                    {docs.map(doc => {
                      const isOpen = openId === doc.filename;
                      return (
                        <div key={doc.filename} style={{ border: '1px solid var(--rr-parchment)', borderRadius: 6, marginBottom: 10, overflow: 'hidden' }}>
                          <div onClick={() => setOpenId(isOpen ? null : doc.filename)}
                               style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 18px', cursor: 'pointer', background: isOpen ? 'var(--rr-warm-white)' : '#fff' }}>
                            <div>
                              <div style={{ fontFamily: 'var(--font-mono)', fontSize: '0.78rem', color: 'var(--rr-slate-dark)' }}>{doc.filename}</div>
                              <div style={{ fontFamily: 'var(--font-ui)', fontWeight: 600, fontSize: '0.92rem', color: 'var(--rr-navy-800)', marginTop: 2 }}>{doc.title}</div>
                            </div>
                            <div style={{ display: 'flex', gap: 18, alignItems: 'center', fontFamily: 'var(--font-ui)', fontSize: '0.78rem', color: 'var(--rr-slate-dark)' }}>
                              <span>Last updated: {doc.last_updated}</span>
                              <span>Word count: {doc.word_count}</span>
                              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                   strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"
                                   style={{ transform: isOpen ? 'rotate(180deg)' : 'none', transition: 'transform 200ms' }}>
                                <polyline points="6 9 12 15 18 9"/>
                              </svg>
                            </div>
                          </div>
                          {isOpen && (
                            <div style={{ padding: '14px 18px', borderTop: '1px solid var(--rr-parchment)', background: '#fff' }}>
                              <textarea
                                className="d-input"
                                rows={10}
                                defaultValue={doc.body}
                                style={{ fontFamily: 'var(--font-mono)', fontSize: '0.82rem', resize: 'vertical' }}
                              />
                            </div>
                          )}
                        </div>
                      );
                    })}

                    <button className="btn btn-primary btn-sm" style={{ marginTop: 14 }} onClick={() => addToast('Knowledge base updated.')}>Save knowledge updates</button>
                  </div>
                );
              })()}
            </div>
          </div>

          <div style={{ textAlign: 'center', padding: '20px 0', fontFamily: "'Inter', sans-serif", fontSize: '.72rem', color: 'var(--rr-slate)', letterSpacing: '.06em' }}>
            ROCKYRIDGE · DENTAL AI · v1
          </div>
        </div>
      </div>
    </div>
    {toasts.length > 0 && (
      <div className="toast-ctr">
        {toasts.map(t => <div key={t.id} className="toast-msg">{t.msg}</div>)}
      </div>
    )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<SettingsPage />);

// console-tap render beacon — deferred so React 18 mount completes
setTimeout(function () {
  try {
    var root = document.getElementById('root');
    var rootChildren = root ? root.children.length : -1;
    var firstTag = (root && root.firstElementChild) ? root.firstElementChild.tagName : null;
    var bodyBg = getComputedStyle(document.body).backgroundColor;
    fetch('/__log__', { method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ kind: 'render-reached', url: location.pathname,
        rootChildren: rootChildren, firstTag: firstTag, bodyBg: bodyBg,
        title: document.title, readyState: document.readyState }) });
  } catch(_){}
}, 250);

</script>
</body>
</html>
