<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Collapsible · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); font-family: var(--font-ui); max-width: 640px; }
  .root { background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; padding: 18px 22px; }
  .header { display: flex; justify-content: space-between; align-items: center; }
  .header .title { font-family: var(--font-display); font-weight: 700; color: var(--rr-navy-800); font-size: 1rem; }
  .toggle { background: none; border: none; cursor: pointer; color: var(--rr-slate-dark); font-size: .82rem; display: inline-flex; align-items: center; gap: 4px; }
  .toggle:hover { color: hsl(var(--primary)); }
  .row { padding: 10px 0; border-bottom: 1px solid var(--rr-parchment); display: flex; justify-content: space-between; font-size: .88rem; }
  .row:last-child { border-bottom: none; }
  .row .k { color: var(--rr-slate-dark); }
  .row .v { color: var(--rr-ink); }
  .more { display: none; }
  .root.open .more { display: block; }
  .root.open .toggle .chev { transform: rotate(180deg); }
  .chev { transition: transform var(--duration-fast) var(--ease-out); }
</style></head><body>
<div class="root open">
  <div class="header">
    <div class="title">Allergies & medications</div>
    <button class="toggle">3 hidden <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m6 9 6 6 6-6"/></svg></button>
  </div>
  <div style="margin-top:10px">
    <div class="row"><span class="k">Penicillin</span><span class="v">Severe · noted 2018-09</span></div>
    <div class="row"><span class="k">Latex</span><span class="v">Mild · gloves only</span></div>
  </div>
  <div class="more">
    <div class="row"><span class="k">Codeine</span><span class="v">Itching · recommend non-opioid</span></div>
    <div class="row"><span class="k">Ibuprofen 200mg</span><span class="v">PRN · q6h · max 1.2 g/day</span></div>
    <div class="row"><span class="k">Atorvastatin 20mg</span><span class="v">Daily · evening</span></div>
  </div>
</div>
</body></html>
