<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Accordion · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); font-family: var(--font-ui); max-width: 680px; }
  .accordion { background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px; box-shadow: var(--shadow-xs); }
  .item { border-bottom: 1px solid var(--rr-parchment); }
  .item:last-child { border-bottom: none; }
  .trigger { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: none; border: none; cursor: pointer; font-family: var(--font-ui); font-weight: 600; font-size: .92rem; color: var(--rr-ink); text-align: left; }
  .trigger:hover { background: var(--rr-off-white); }
  .chev { color: var(--rr-slate-dark); transition: transform var(--duration-base) var(--ease-out); }
  .item.open .chev { transform: rotate(180deg); color: hsl(var(--primary)); }
  .panel { padding: 0 20px 18px; font-size: .88rem; line-height: 1.7; color: var(--rr-ink-light); display: none; }
  .item.open .panel { display: block; }
  .meta { display: inline-block; font-family: var(--font-mono); font-size: .7rem; color: var(--rr-slate); margin-left: 12px; }
</style></head><body>
<div class="accordion">
  <div class="item open">
    <button class="trigger">
      <span>Patient information<span class="meta">7 fields</span></span>
      <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
    </button>
    <div class="panel">Personal details, government ID, primary care provider, and emergency contact. Required at first visit, editable thereafter only by clinic admins.</div>
  </div>
  <div class="item">
    <button class="trigger">
      <span>Medical history</span>
      <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
    </button>
  </div>
  <div class="item">
    <button class="trigger">
      <span>Insurance & billing<span class="meta">2 plans</span></span>
      <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
    </button>
  </div>
  <div class="item">
    <button class="trigger">
      <span>Consent forms</span>
      <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
    </button>
  </div>
</div>
</body></html>
