<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Semantic Colors · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); display: flex; flex-direction: column; gap: 24px; }
  h2 { font-size: 1rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--rr-slate-dark); margin: 0; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .swatch { display: grid; grid-template-columns: 56px 1fr; gap: 14px; align-items: center; padding: 14px 18px; border-radius: 6px; }
  .swatch.success  { background: var(--rr-success-bg); border: 1px solid #BBE0CC; }
  .swatch.warning  { background: var(--rr-warning-bg); border: 1px solid #F1D6A5; }
  .swatch.error    { background: var(--rr-error-bg);   border: 1px solid #ECC8CE; }
  .swatch.info     { background: var(--rr-info-bg);    border: 1px solid var(--rr-steel-200); }
  .dot { width: 32px; height: 32px; border-radius: 999px; }
  .label { font-family: var(--font-ui); font-size: .72rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; }
  .body  { font-family: var(--font-ui); font-size: .82rem; color: var(--rr-ink); }
</style></head><body>
<h2>Semantic — Status & Feedback</h2>
<div class="grid">
  <div class="swatch success"><div class="dot" style="background:var(--rr-success)"></div><div><div class="label" style="color:var(--rr-success)">Success · #2A7D4F</div><div class="body">Booking confirmed · payment received</div></div></div>
  <div class="swatch warning"><div class="dot" style="background:var(--rr-warning)"></div><div><div class="label" style="color:var(--rr-warning)">Warning · #B45309</div><div class="body">Insurance expiring · soft conflict</div></div></div>
  <div class="swatch error"><div class="dot" style="background:var(--rr-error)"></div><div><div class="label" style="color:var(--rr-error)">Error · #9B2335</div><div class="body">Validation failed · slot unavailable</div></div></div>
  <div class="swatch info"><div class="dot" style="background:var(--rr-info)"></div><div><div class="label" style="color:var(--rr-info)">Info · #3A7FBD</div><div class="body">System note · informational toast</div></div></div>
</div>
</body></html>
