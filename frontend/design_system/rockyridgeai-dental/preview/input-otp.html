<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Input OTP · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); font-family: var(--font-ui); display: flex; flex-direction: column; gap: 16px; max-width: 480px; }
  .lbl { font-size: .82rem; font-weight: 600; color: var(--rr-ink); }
  .help { font-size: .72rem; color: var(--rr-slate-dark); }
  .otp { display: flex; gap: 8px; }
  .otp .cell {
    width: 44px; height: 52px; border: 1.5px solid var(--rr-mist); border-radius: 6px;
    background: #fff; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 1.4rem; color: var(--rr-ink);
  }
  .otp .cell.filled { border-color: hsl(var(--primary)); }
  .otp .cell.active { border-color: hsl(var(--primary)); box-shadow: var(--shadow-ring); }
  .otp .sep { display: flex; align-items: center; color: var(--rr-mist); }
</style></head><body>
<div>
  <label class="lbl">Two-factor code</label>
  <div class="help">A 6-digit code was sent to ••• 4821.</div>
</div>
<div class="otp">
  <div class="cell filled">7</div>
  <div class="cell filled">3</div>
  <div class="cell filled">2</div>
  <div class="sep">·</div>
  <div class="cell active">1</div>
  <div class="cell"></div>
  <div class="cell"></div>
</div>
<div class="help">Didn't receive a code? <a href="#" style="color:var(--rr-steel-500)">Resend</a></div>
</body></html>
