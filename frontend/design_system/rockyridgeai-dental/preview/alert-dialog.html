<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Alert Dialog · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: hsl(var(--background)); font-family: var(--font-ui); margin: 0; min-height: 100vh; }
  .overlay { position: fixed; inset: 0; background: rgba(10, 25, 47, 0.55); display: flex; align-items: center; justify-content: center; z-index: 50; }
  .dialog { background: #fff; border-radius: 6px; padding: 28px 32px; box-shadow: var(--shadow-xl); max-width: 460px; width: 100%; }
  .dialog .title { font-family: var(--font-display); font-weight: 700; font-size: 1.25rem; color: var(--rr-navy-800); margin-bottom: 8px; }
  .dialog .body  { font-size: .9rem; line-height: 1.65; color: var(--rr-ink-light); }
  .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
</style></head><body>
<div class="overlay">
  <div class="dialog" role="alertdialog">
    <div class="title">Cancel appointment?</div>
    <div class="body">This will cancel <strong>Alice Stevens</strong> · 09:00 with Dr Hau Le. The patient will receive an automated SMS within 2 minutes. This cannot be undone.</div>
    <div class="actions">
      <button class="btn btn-ghost btn-md">Keep appointment</button>
      <button class="btn btn-destructive btn-md">Cancel · notify patient</button>
    </div>
  </div>
</div>
</body></html>
