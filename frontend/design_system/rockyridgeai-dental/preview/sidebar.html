<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Sidebar · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; height: 100%; }
  body { background: hsl(var(--background)); font-family: var(--font-ui); display: flex; }
  .sidebar { width: 240px; min-height: 100vh; background: var(--rr-navy-800); color: var(--rr-warm-white); display: flex; flex-direction: column; }
  .sidebar .brand { display: flex; align-items: center; gap: 10px; padding: 18px 18px 22px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .sidebar .brand img { height: 28px; }
  .sidebar .brand .b1 { font-family: var(--font-display); font-weight: 800; font-size: .82rem; letter-spacing: .08em; text-transform: uppercase; }
  .sidebar .brand .b2 { font-family: var(--font-display); font-weight: 400; font-size: .68rem; letter-spacing: 1.6px; color: rgba(250,249,246,0.55); text-transform: uppercase; }
  .group { padding: 16px 12px 4px; }
  .group .label { font-family: var(--font-ui); font-size: .62rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--rr-slate); padding: 0 8px 4px; }
  .item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 4px; color: rgba(250,249,246,0.75); cursor: pointer; font-size: .85rem; }
  .item:hover { background: rgba(255,255,255,0.04); color: var(--rr-warm-white); }
  .item.active { background: var(--rr-steel-500); color: #fff; font-weight: 600; }
  .item .ico { width: 16px; height: 16px; }
  .footer { margin-top: auto; padding: 14px 14px 18px; border-top: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; gap: 10px; font-size: .82rem; }
  .ava { width: 32px; height: 32px; border-radius: 999px; background: var(--rr-steel-500); display: inline-flex; align-items: center; justify-content: center; font-weight: 600; }
  .stage { flex: 1; padding: 32px; color: var(--rr-slate-dark); }
</style></head><body>
<aside class="sidebar">
  <div class="brand">
    <img src="../assets/RR_logo_white.svg">
    <div><div class="b1">ROCKYRIDGE</div><div class="b2">DENTAL AI</div></div>
  </div>
  <div class="group">
    <div class="label">Care</div>
    <div class="item active"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Patients</div>
    <div class="item"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Schedule</div>
    <div class="item"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/></svg>Treatment plans</div>
    <div class="item"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2v7.31"/><path d="M14 9.3V1.99"/><path d="M8.5 2h7"/><path d="M14 9.3a6.5 6.5 0 1 1-4 0"/><path d="M5.52 16h12.96"/></svg>Lab</div>
  </div>
  <div class="group">
    <div class="label">Operations</div>
    <div class="item"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Billing</div>
    <div class="item"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Communications</div>
  </div>
  <div class="group">
    <div class="label">Insights</div>
    <div class="item"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>Dashboard</div>
  </div>
  <div class="footer">
    <div class="ava">HL</div>
    <div><div>Dr Hau Le</div><div style="font-size:.68rem;color:var(--rr-slate)">Oak Dental · Calgary</div></div>
  </div>
</aside>
<div class="stage">Sidebar — 240px collapsed to 64px below 1024px width.</div>
</body></html>
