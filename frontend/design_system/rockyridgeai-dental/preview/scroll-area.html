<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Scroll Area · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); font-family: var(--font-ui); display: flex; gap: 24px; flex-wrap: wrap; }
  .scroll {
    width: 320px; height: 240px;
    background: #fff; border: 1px solid var(--rr-parchment); border-radius: 6px;
    overflow-y: auto; padding: 16px;
    scrollbar-width: thin; scrollbar-color: var(--rr-mist) transparent;
  }
  .scroll::-webkit-scrollbar { width: 6px; }
  .scroll::-webkit-scrollbar-thumb { background: var(--rr-mist); border-radius: 3px; }
  .item { padding: 8px 0; border-bottom: 1px solid var(--rr-parchment); font-size: .85rem; color: var(--rr-ink); display: flex; justify-content: space-between; }
  .item:last-child { border-bottom: none; }
  .id { font-family: var(--font-mono); font-size: .72rem; color: var(--rr-slate-dark); }
</style></head><body>
<div class="scroll">

</div>
</body></html>
