<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Separator · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); font-family: var(--font-ui); display: flex; flex-direction: column; gap: 28px; max-width: 640px; }
  h2 { font-size: .72rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--rr-slate-dark); margin: 0; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .stack > .label { font-size: .9rem; color: var(--rr-ink); }
  .sep-h { height: 1px; background: var(--rr-parchment); }
  .sep-h-mid { height: 1px; background: var(--rr-mist); }
  .row { display: flex; align-items: center; gap: 12px; }
  .row > .label { font-size: .82rem; color: var(--rr-ink); padding: 4px 0; }
  .sep-v { width: 1px; height: 16px; background: var(--rr-parchment); }
</style></head><body>
<div><h2>Horizontal — section divider</h2>
  <div class="stack" style="margin-top:10px">
    <div class="label">Personal information</div>
    <div class="sep-h"></div>
    <div class="label">Medical history</div>
    <div class="sep-h"></div>
    <div class="label">Insurance plans</div>
  </div>
</div>
<div><h2>Vertical — inline meta</h2>
  <div class="row" style="margin-top:10px">
    <span class="label" style="color:hsl(var(--primary))">P-018342</span>
    <span class="sep-v"></span>
    <span class="label">Alice Stevens</span>
    <span class="sep-v"></span>
    <span class="label">DOB 1984-03-12</span>
    <span class="sep-v"></span>
    <span class="label">Alberta Blue Cross</span>
  </div>
</div>
</body></html>
