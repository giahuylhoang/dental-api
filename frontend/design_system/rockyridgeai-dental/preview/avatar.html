<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Avatar · Rockyridge Dental AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: hsl(var(--background)); font-family: var(--font-ui); display: flex; flex-direction: column; gap: 24px; }
  h2 { font-size: .72rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--rr-slate-dark); margin: 0; }
  .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .ava { display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; color: #fff; font-weight: 600; font-family: var(--font-ui); flex-shrink: 0; }
  .ava-xs { width: 22px; height: 22px; font-size: .62rem; }
  .ava-sm { width: 30px; height: 30px; font-size: .7rem; }
  .ava-md { width: 40px; height: 40px; font-size: .82rem; }
  .ava-lg { width: 56px; height: 56px; font-size: 1rem; }
  .ava-xl { width: 80px; height: 80px; font-size: 1.4rem; }
  .stack { display: flex; }
  .stack .ava { border: 2px solid hsl(var(--background)); margin-left: -10px; }
  .stack .ava:first-child { margin-left: 0; }
  .with-status { position: relative; }
  .status-dot { position: absolute; bottom: 1px; right: 1px; width: 10px; height: 10px; border-radius: 999px; border: 2px solid hsl(var(--background)); }
  .status-dot.online { background: var(--rr-success); }
  .status-dot.away   { background: var(--rr-warning); }
</style></head><body>
<div><h2 style="margin-bottom:12px">Sizes</h2>
  <div class="row">
    <div class="ava ava-xs" style="background:var(--rr-steel-500)">AS</div>
    <div class="ava ava-sm" style="background:var(--rr-navy-600)">PK</div>
    <div class="ava ava-md" style="background:var(--rr-warning)">MD</div>
    <div class="ava ava-lg" style="background:var(--rr-steel-600)">EB</div>
    <div class="ava ava-xl" style="background:var(--rr-navy-800)">SC</div>
  </div>
</div>
<div><h2 style="margin-bottom:12px">Status</h2>
  <div class="row">
    <div class="ava ava-md with-status" style="background:var(--rr-steel-500)">HL<div class="status-dot online"></div></div>
    <div class="ava ava-md with-status" style="background:var(--rr-navy-600)">SL<div class="status-dot away"></div></div>
  </div>
</div>
<div><h2 style="margin-bottom:12px">Stack — provider list</h2>
  <div class="stack">
    <div class="ava ava-md" style="background:var(--rr-steel-500)">HL</div>
    <div class="ava ava-md" style="background:var(--rr-navy-600)">SL</div>
    <div class="ava ava-md" style="background:var(--rr-warning)">MR</div>
    <div class="ava ava-md" style="background:var(--rr-mist);color:var(--rr-slate-dark)">+3</div>
  </div>
</div>
</body></html>
