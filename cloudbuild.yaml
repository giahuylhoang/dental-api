# Cloud Build pipeline for dental-api on Cloud Run (`dental-api-v2` service).
#
# Pipeline:
#   1. migrate     — start cloud-sql-proxy → run alembic upgrade head against
#                    dental-api-v2-database via TCP loopback. URL is rewritten
#                    from the unix-socket form (stored for Cloud Run) to TCP.
#   2. build       — docker build → :sha and :latest
#   3. push-sha    — push :${SHORT_SHA} to Artifact Registry
#   4. push-latest — push :latest pointer
#   5. deploy      — gcloud run services update: new image + clear/add
#                    cloudsql-instances + update DATABASE_URL secret binding.
#
# Trigger (future): dental-api-prod on push to main, paths
#   api/**, database/**, alembic/**, scripts/**, requirements.txt, Dockerfile,
#   cloudbuild.yaml
#
# Secrets:
#   - DATABASE_URL_V2_NEW — Postgres URL pointing at dental-api-v2-database
#     (Cloud Run unix-socket form; rewritten to TCP for the migrate step).

substitutions:
  _SHORT_SHA: 'manual'
  _REGISTRY: 'northamerica-northeast2-docker.pkg.dev/rockyridgeai-dental/dental-api'
  _IMAGE: 'dental-api'
  _SERVICE: 'dental-api-v2'
  _REGION: 'northamerica-northeast2'
  _SQL_INSTANCE: 'rockyridgeai-dental:northamerica-northeast2:dental-api-v2-database'
  _DB_SECRET: 'DATABASE_URL_V2_NEW'
  _PROXY_VERSION: 'v2.13.0'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: 'CLOUD_LOGGING_ONLY'

availableSecrets:
  secretManager:
    - versionName: projects/rockyridgeai-dental/secrets/DATABASE_URL_V2_NEW/versions/latest
      env: 'DATABASE_URL_RAW'

steps:
  # 1. Alembic migrate via Cloud SQL Auth Proxy. Cloud Build worker has
  #    cloudsql.client on the SA, so the proxy authenticates via metadata
  #    without any extra credential plumbing.
  - id: 'migrate'
    name: 'python:3.11-slim'
    entrypoint: 'bash'
    secretEnv: ['DATABASE_URL_RAW']
    args:
      - '-c'
      - |
        set -euo pipefail
        apt-get update -qq
        apt-get install -y --no-install-recommends curl ca-certificates netcat-openbsd >/dev/null
        pip install --no-cache-dir -r requirements.txt
        # alembic is a dev/deploy-time tool, not in runtime requirements.txt.
        pip install --no-cache-dir 'alembic>=1.13'
        curl -fsSL "https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/${_PROXY_VERSION}/cloud-sql-proxy.linux.amd64" -o /tmp/cloud-sql-proxy
        chmod +x /tmp/cloud-sql-proxy
        /tmp/cloud-sql-proxy ${_SQL_INSTANCE} --port 5432 &
        PROXY_PID=$$!
        for i in $$(seq 1 30); do
          nc -z 127.0.0.1 5432 && break
          sleep 1
        done
        # Rewrite unix-socket DB URL → TCP via the local proxy.
        DB_NAME=$$(echo "$$DATABASE_URL_RAW" | sed -nE 's|.*@/([^?]+).*|\1|p')
        DB_USER=$$(echo "$$DATABASE_URL_RAW" | sed -nE 's|postgresql://([^:]+):.*|\1|p')
        DB_PASS=$$(echo "$$DATABASE_URL_RAW" | sed -nE 's|postgresql://[^:]+:([^@]+)@.*|\1|p')
        export DATABASE_URL="postgresql://$$DB_USER:$$DB_PASS@127.0.0.1:5432/$$DB_NAME"
        echo "Running alembic upgrade head against $$DB_NAME (host=127.0.0.1:5432 via proxy)"
        alembic upgrade head
        kill $$PROXY_PID 2>/dev/null || true

  # 2. Build the API image.
  - id: 'build'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--tag=${_REGISTRY}/${_IMAGE}:${_SHORT_SHA}'
      - '--tag=${_REGISTRY}/${_IMAGE}:latest'
      - '.'
    waitFor: ['migrate']

  # 3 + 4. Push :sha and :latest in parallel.
  - id: 'push-sha'
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGISTRY}/${_IMAGE}:${_SHORT_SHA}']
    waitFor: ['build']

  - id: 'push-latest'
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGISTRY}/${_IMAGE}:latest']
    waitFor: ['build']

  # 5. Update Cloud Run service: new image + repoint at new Cloud SQL instance.
  - id: 'deploy'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'services'
      - 'update'
      - '${_SERVICE}'
      - '--region=${_REGION}'
      - '--image=${_REGISTRY}/${_IMAGE}:${_SHORT_SHA}'
      - '--set-cloudsql-instances=${_SQL_INSTANCE}'
      - '--update-secrets=DATABASE_URL=${_DB_SECRET}:latest'
    waitFor: ['push-sha']

images:
  - '${_REGISTRY}/${_IMAGE}:${_SHORT_SHA}'
  - '${_REGISTRY}/${_IMAGE}:latest'
